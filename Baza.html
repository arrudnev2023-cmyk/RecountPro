<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>RecountPro — База товаров</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
  :root {
    --accent: #4361ee; /* спокойный синий */
    --accent-light: #82b1ff;
    --text: #333; /* тёмный текст */
    --muted: #666; /* приглушённый текст */
    --bg: #ffffff; /* белый фон страницы */
    --card-bg: #ffffff; /* белый фон карточек */
    --border: #e0e0e0; /* светлый серый для границ */
    --maxw: 980px;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    margin: 0;
    background-color: var(--bg);
    color: var(--text);
    font-family: Inter, Segoe UI, system-ui, Arial, sans-serif;
    overflow: hidden;
  }

  header {
    position: fixed;
    left: 0;
    right: 0;
    top: 0;
    padding: 12px;
    background-color: white;
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    border-radius: 0 0 14px 14px;
  }
  header h1 {
    margin: 0;
    text-align: center;
    font-size: 1.15rem;
    color: var(--accent);
  }

  #search-wrap {
    max-width: var(--maxw);
    margin: 10px auto;
    position: relative;
  }
  #search {
    width: 100%;
    padding: 10px 56px 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background-color: white;
    color: var(--text);
    font-size: 15px;
  }
  #scan-btn,
  #clear-search {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
  }
  #clear-search {
    right: 44px;
  }

  #content {
    position: fixed;
    left: 0;
    right: 0;
    top: 96px;
    bottom: 0;
    overflow: auto;
    padding: 12px;
  }

  .item {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 8px;
    background-color: var(--card-bg);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    border-left: 4px solid transparent;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .item.found {
    border-left-color: var(--accent);
    box-shadow: 0 4px 16px rgba(67, 97, 238, 0.15);
  }
  .item.highlight-purple {
    border-left-color: #7c3aed;
    box-shadow: 0 0 0 2px #7c3aed, 0 4px 12px rgba(124, 58, 237, 0.2);
  }

  .label {
    font-weight: 700;
    color: var(--accent);
    margin-right: 6px;
  }

  #fabMenu {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    z-index: 1001;
    background-color: var(--accent);
    color: white;
    border: none;
    padding: 0.9rem 1.2rem;
    border-radius: 8px;
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
    transition: all 0.3s ease;
  }
  #fabMenu:hover {
    background-color: #3a56d6;
  }

  #sheetOverlay {
    position: fixed;
    inset: 0;
    background-color: rgba(0, 0, 0, 0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 999;
  }
  #sheetOverlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  #bottomSheet {
    position: fixed;
    left: 0;
    right: 0;
    bottom: -60vh;
    padding: 1.2rem;
    background-color: white;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
    transition: bottom 0.35s ease;
    z-index: 1002;
  }
  #bottomSheet.show {
    bottom: 0;
  }

  .sheet-content {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }
  .sheet-btn {
    background-color: #f5f5f5;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.9rem 1rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sheet-btn:hover {
    background-color: #e9e9e9;
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  .sheet-btn:active {
    transform: translateY(0);
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(12px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .preview-wrap.camera-1-3 {
    position: relative;
    width: 100%;
    max-width: var(--maxw);
    margin: 0 auto 10px;
    padding-top: 33%;
    overflow: hidden;
    border-radius: 8px;
    background-color: #f0f0f0;
    border: 1px dashed var(--border);
  }
  .preview-wrap.camera-1-3 video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

 #scannerCard.card {
  max-width: var(--maxw);
  margin: 0 auto 10px;
  padding: 10px;
  border-radius: 8px;
  background-color: white;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  margin-top: 8px;
  font-size: 13px;
}

.controls .btn {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background-color: white;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s ease;
}
.controls .btn:hover {
  background-color: #f8f8f8;
  border-color: var(--accent);
}
.controls .btn:active {
  transform: scale(0.98);
}

#bg {
  position: fixed;
  inset: 0;
  z-index: -1;
}
</style>
</head>

<body>
  <canvas id="bg"></canvas>

  <header>
    <h1>RecountPro — База товаров</h1>
    <div id="search-wrap">
      <input id="search" placeholder="Поиск по названию или коду..." autocomplete="off" />
      <button id="scan-btn">📷</button>
      <button id="clear-search">×</button>
    </div>
  </header>

  <main id="content">
    <div id="scannerCard" class="card" style="display:none">
      <div class="preview-wrap camera-1-3"><video id="preview" playsinline muted></video></div>
      <div class="controls">
        <select id="deviceSelect" class="btn" style="min-width:160px"></select>
        <button id="torchBtn" class="btn">🔦</button>
        <button id="closeScannerBtn" class="btn">Закрыть</button>
        <div id="scanResult" style="margin-left:auto;color:var(--muted)"></div>
      </div>
    </div>

    <div id="list" class="list"></div>
  </main>

  <button id="fabMenu">☰</button>

  <div id="sheetOverlay"></div>

  <div id="bottomSheet">
    <div class="sheet-content">
      <button class="sheet-btn" id="refreshBtn">🔄 Обновить</button>
      <button class="sheet-btn" id="exportBtn">📤 Выгрузить CSV</button>
      <button class="sheet-btn" id="importBtn">📥 Загрузить CSV</button>
      <button class="sheet-btn" id="clearBaseBtn">🧹 Очистить базу</button>
    </div>
  </div>

<script>
/* ============================================================
   БАЗА ТОВАРОВ
============================================================ */

let barcodeDB = {}; // { [name]: [code1, code2, ...] }
let quantities = {}; // { [name]: qty }
let allItems = [];

function loadDB() {
  try {
    const raw = localStorage.getItem("barcodeDB");
    if (raw) {
      const parsed = JSON.parse(raw);

      // Если данные уже в новом формате — используем их
      if (parsed.db && parsed.quantities) {
        barcodeDB = parsed.db;
        quantities = parsed.quantities;
      } else {
        // Конвертируем старый формат в новый
        barcodeDB = {};
        quantities = {};

        Object.entries(parsed).forEach(([code, data]) => {
          const name = typeof data === "string" ? data : data.name;
          if (!barcodeDB[name]) {
            barcodeDB[name] = [];
            quantities[name] = 0;
          }
          barcodeDB[name].push(code);
          // Сохраняем остаток, если был указан
          if (data.qty !== undefined) {
            quantities[name] = data.qty;
          }
        });
      }
    } else {
      // Инициализируем пустые объекты
      barcodeDB = {};
      quantities = {};
    }
  } catch (e) {
    console.error("Ошибка загрузки базы:", e);
    barcodeDB = {};
    quantities = {};
  }
}

function saveDB() {
  try {
    localStorage.setItem("barcodeDB", JSON.stringify({
      db: barcodeDB,
      quantities: quantities
    }));
  } catch (e) {
    console.error("Ошибка сохранения:", e);
  }
}

function buildItems() {
  allItems = [];
  Object.entries(barcodeDB).forEach(([name, codes]) => {
    codes.forEach(code => {
      allItems.push({
        code: code,
        name: name,
        qty: quantities[name] || 0
      });
    });
  });
}

function escapeHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

const listEl = document.getElementById("list");

function render(items) {
  listEl.innerHTML = "";
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.dataset.code = item.code;
    div.dataset.name = item.name; // добавляем имя для поиска

    div.innerHTML = `
      <div class="field"><span class="label">Название:</span> ${escapeHtml(item.name)}</div>
      <div class="field"><span class="label">Штрих‑код:</span> ${item.code}</div>
      <div class="field"><span class="label">Остаток:</span> ${item.qty}</div>
    `;

    listEl.appendChild(div);
  });
}

/* ============================================================
   ПОИСК
============================================================ */

const searchEl = document.getElementById("search");
const clearSearchBtn = document.getElementById("clear-search");

function normalize(s) {
  return String(s || "")
    .toLowerCase()
    .replace(/ё/g, "е")
    .replace(/\s+/g, " ")
    .trim();
}

function matchesQuery(text, query) {
  const words = query.split(" ").filter(Boolean);
  return words.every(w => text.includes(w));
}

searchEl.addEventListener("input", () => {
  const q = normalize(searchEl.value);

  document.querySelectorAll("#list .item").forEach(div => {
    const code = normalize(div.dataset.code);
    const name = normalize(div.dataset.name);

    const match = q === "" || matchesQuery(name, q) || matchesQuery(code, q);
    div.classList.toggle("hidden", !match);
  });
});

clearSearchBtn.addEventListener("click", () => {
  searchEl.value = "";
  document.querySelectorAll("#list .item").forEach(d => d.classList.remove("hidden"));
});

/* ============================================================
   ПОДСВЕТКА
============================================================ */

function highlightItem(code) {
  // Находим все карточки с этим кодом
  document.querySelectorAll(`.item[data-code="${code}"]`).forEach(card => {
    // Убираем старую подсветку
    card.classList.remove("found");
    card.classList.remove("highlight-purple");

    // Добавляем новую фиолетовую подсветку
    card.classList.add("highlight-purple");

    // Через 2 секунды убираем
    setTimeout(() => {
      card.classList.remove("highlight-purple");
    }, 2000);

    // Скроллим к первой найденной карточке
    setTimeout(() => {
      card.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 150);
  });
}

}

/* ============================================================
   СКАНЕР
============================================================ */

let codeReader = null;
let currentStream = null;
const previewEl = document.getElementById("preview");
const deviceSelectEl = document.getElementById("deviceSelect");
const torchBtnEl = document.getElementById("torchBtn");
const closeScannerBtnEl = document.getElementById("closeScannerBtn");
const scanResultEl = document.getElementById("scanResult");
const scannerCardEl = document.getElementById("scannerCard");

const DEBOUNCE_MS = 1000;
let lastDetected = { code: null, ts: 0 };

async function initScanner() {
  try {
    const codeReaderClass = ZXing.BrowserMultiFormatReader;
    codeReader = new codeReaderClass();

    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === "videoinput");

    deviceSelectEl.innerHTML = "";
    videoDevices.forEach((device, i) => {
      const option = document.createElement("option");
      option.value = device.deviceId;
      option.textContent = device.label || `Камера ${i + 1}`;
      deviceSelectEl.appendChild(option);
    });

    if (videoDevices.length > 0) {
      await startCamera(videoDevices[0].deviceId);
    }
  } catch (e) {
    console.error("Ошибка инициализации сканера:", e);
    showToast("Не удалось запустить камеру");
  }
}

async function startCamera(deviceId) {
  try {
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
    }

    const constraints = {
      video: {
        deviceId: { exact: deviceId }
      }
    };

    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    previewEl.srcObject = currentStream;

    await codeReader.decodeFromVideoElement(previewEl);
  } catch (e) {
    console.error("Ошибка запуска камеры:", e);
    showToast("Ошибка камеры");
  }
}

function stopCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
  }
  previewEl.srcObject = null;
}

function handleDetected(code) {
  const now = Date.now();
  if (code === lastDetected.code && now - lastDetected.ts < DEBOUNCE_MS) return;
  lastDetected = { code, ts: now };

  try { navigator.vibrate?.(60); } catch (e) {}

  stopCamera();

  // Ищем товар по штрих‑коду: перебираем все названия и их коды
  let foundName = null;
  for (const [name, codes] of Object.entries(barcodeDB)) {
    if (codes.includes(code)) {
      foundName = name;
      break;
    }
  }

  if (foundName) {
    const qty = quantities[foundName] || 0;

    if (qty > 0) {
      highlightItem(code);
      showToast("Найден");
      return;
    }

    // qty == 0 → показываем красную карточку на 10 секунд
    const temp = document.createElement("div");
    temp.className = "item";
    temp.style.borderLeftColor = "#ef4444";
    temp.innerHTML = `
      <div class="field"><span class="label">Название:</span> ${escapeHtml(foundName)}</div>
      <div class="field"><span class="label">Штрих‑код:</span> ${code}</div>
      <div class="field"><span class="label">Остаток:</span> 0</div>
    `;

    listEl.prepend(temp);
    temp.scrollIntoView({ behavior: "smooth", block: "center" });

    setTimeout(() => {
      temp.style.transition = "opacity .3s ease, transform .3s ease";
      temp.style.opacity = "0";
      temp.style.transform = "translateY(10px)";
    }, 9500);

    setTimeout(() => temp.remove(), 10000);

    showToast("По позиции остаток 0");
    return;
  }

  // Вообще нет в базе штрих‑кодов
  showToast("Нет в базе штрих‑кодов");
}

/* ============================================================
   ИНТЕРФЕЙС
============================================================ */

function showToast(message) {
  let toast = document.querySelector(".toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.className = "toast";
    toast.style.cssText = `
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 9999;
      font-size: 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    `;
    document.body.appendChild(toast);
  }

  toast.textContent = message;
  toast.style.opacity = "1";

  setTimeout(() => {
    toast.style.opacity = "0";
  }, 2000);
}

function closeMenu() {
  document.getElementById("sheetOverlay").classList.remove("show");
  document.getElementById("bottomSheet").classList.remove("show");
}

function createConfirm(text, onConfirm) {
  // Простая реализация подтверждения
  if (confirm(text)) {
    onConfirm();
  }
}

/* ============================================================
   ОБРАБОТЧИКИ СОБЫТИЙ
============================================================ */

document.getElementById("scan-btn").addEventListener("click", () => {
  scannerCardEl.style.display = "block";
  initScanner();
});

closeScannerBtnEl.addEventListener("click", () => {
  stopCamera();
  scannerCardEl.style.display = "none";
});

deviceSelectEl.addEventListener("change", (e) => {
  startCamera(e.target.value);
});

torchBtnEl.addEventListener("click", async () => {
  try {
    const tracks = currentStream?.getVideoTracks();
    if (tracks && tracks.length > 0) {
      const track = tracks[0];
      const capabilities = track.getCapabilities?.();
      if (capabilities?.torch) {
        await track.applyConstraints({ advanced: [{ torch: !track.getSettings().torch }] });
        torchBtnEl.style.color = track.getSettings().torch ? var(--accent) : var(--muted);
      } else {
        showToast("Фонарик не поддерживается");
      }
    }
  } catch (e) {
    console.error("Ошибка управления фонариком:", e);
  }
});

document.getElementById("fabMenu").addEventListener("click", () => {
  document.getElementById("sheetOverlay").classList.add("show");
  document.getElementById("bottomSheet").classList.add("show");
});

document.getElementById("refreshBtn").onclick = () => {
  closeMenu();
  buildItems();
  render(allItems);
  showToast("Список обновлен");
};

document.getElementById("exportBtn").onclick = () => {
  closeMenu();

  let csv = "code;name;qty\n";
  Object.entries(barcodeDB).forEach(([name, codes]) => {
    const qty = quantities[name] || 0;
    codes.forEach(code => {
      csv += `${code};${name};${qty}\n`;
    });
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "barcodeDB.csv";
  a.click();

  URL.revokeObjectURL(url);
};

document.getElementById("importBtn").onclick = () => {
  closeMenu();

  const input = document.createElement("input");
  input.type = "file";
    input.accept = ".csv";
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    try {
      const text = await file.text();
      const lines = text.split("\n").filter(line => line.trim());

      // Пропускаем заголовок
      const dataLines = lines.slice(1);

      // Очищаем текущую базу перед импортом (опционально — можно изменить логику на добавление к существующей)
      barcodeDB = {};
      quantities = {};

      dataLines.forEach(line => {
        const [code, name, qtyStr] = line.split(";");
        if (!code || !name) return;

        const qty = parseInt(qtyStr, 10) || 0;

        if (!barcodeDB[name]) {
          barcodeDB[name] = [];
          quantities[name] = qty;
        } else {
          // Если товар уже есть, обновляем остаток только если новый больше (можно изменить логику)
          quantities[name] = Math.max(quantities[name], qty);
        }

        barcodeDB[name].push(code);
      });

      saveDB();
      buildItems();
      render(allItems);
      showToast(`Импортировано ${dataLines.length} записей`);
    } catch (error) {
      console.error("Ошибка импорта CSV:", error);
      showToast("Ошибка импорта файла");
    }
  };

  input.click();
};

document.getElementById("clearBaseBtn").onclick = () => {
  closeMenu();
  createConfirm("Очистить всю базу товаров? Все остатки будут сброшены до 0.", () => {
    // Обнуляем остатки, но сохраняем структуру штрих‑кодов
    Object.keys(quantities).forEach(name => {
      quantities[name] = 0;
    });
    saveDB();
    buildItems();
    render(allItems);
    showToast("База очищена, остатки сброшены до 0");
  });
};

/* ============================================================
   ИНИЦИАЛИЗАЦИЯ
============================================================ */

function init() {
  loadDB();
  buildItems();
  render(allItems);

  // Закрытие меню по клику на оверлей
  document.getElementById("sheetOverlay").addEventListener("click", closeMenu);
}

// Запуск при загрузке страницы
window.addEventListener("DOMContentLoaded", init);

// Обработка ошибок сканера
window.addEventListener("error", (e) => {
  if (e.message.includes("zxing")) {
    console.warn("ZXing библиотека не загружена, сканер недоступен");
  }
});
</script>
</body>
</html>
