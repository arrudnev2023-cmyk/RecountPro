<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RecountPro — Меню</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1: #0b0710;
      --bg-2: #0f0b1a;

      --accent1: #7b61ff;
      --accent2: #b89bff;

      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.06);
      --text-muted: rgba(238,240,255,0.72);

      --radius-btn: 18px;
      --radius-card: 20px;

      --shadow-soft: 0 14px 40px rgba(0,0,0,0.5);
    }

    *{box-sizing:border-box}
    html,body{
      height:100%;
      margin:0;
      padding:0;
      background:
        radial-gradient(900px 500px at 8% 12%, rgba(123,97,255,0.10), transparent),
        radial-gradient(700px 400px at 92% 88%, rgba(184,155,255,0.06), transparent),
        linear-gradient(180deg,var(--bg-1),var(--bg-2));
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      color:#eef0ff;
      overflow:hidden;
    }

    #bg{ position:fixed; inset:0; z-index:-2; pointer-events:none; }

    .top-fixed{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:26px 16px 18px;
      text-align:center;
      background:linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0));
      backdrop-filter:blur(6px);
      z-index:10;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }

    h2{ margin:0 0 6px 0; font-size:24px; font-weight:700; letter-spacing:0.3px; }
    .subtitle{ font-size:13px; color:var(--text-muted); }

    .scroll-area{
      position:absolute;
      top:120px;
      left:0;
      right:0;
      bottom:0;
      overflow-y:auto;
      overflow-x:hidden;
      padding:0 18px 40px;
    }

    .menu-box{
      width:100%;
      max-width:520px;
      margin:18px auto;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-card);
      padding:22px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(8px);
    }

    .btn{
      width:100%;
      padding:16px 20px;
      margin:12px 0;
      border-radius: var(--radius-btn);
      border:none;
      color:#fff;
      font-size:17px;
      font-weight:700;
      cursor:pointer;
      transition: transform .16s ease, box-shadow .16s ease;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:14px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      position:relative;
      overflow:hidden;
      padding-left:22px;
    }

    .btn .label{
      flex:1;
      text-align:left;
    }

    .btn .icon{
      width:36px;
      height:36px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      background: rgba(255,255,255,0.06);
      border-radius:10px;
      margin-right:8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25) inset;
    }

    .btn.level1{ box-shadow: 0 14px 40px rgba(123,97,255,0.12); }
    .btn.level2{ box-shadow: 0 10px 30px rgba(184,155,255,0.10); }
    .btn.level3{ box-shadow: 0 8px 24px rgba(184,155,255,0.08); }
    .btn.level4{ box-shadow: 0 6px 18px rgba(184,155,255,0.06); }

    .btn:hover{ transform: translateY(-4px); filter:brightness(1.06); }
    .btn:active{ transform: translateY(-1px) scale(0.995); }

    a.link-btn{ display:block; text-decoration:none; color:inherit; }

    @media (max-width:420px){
      .menu-box{ padding:18px; }
      .btn{ padding:14px; font-size:16px; }
      .btn .icon{ width:34px; height:34px; font-size:16px; }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="top-fixed">
    <h2>Меню RecountPro</h2>
    <div class="subtitle">Быстрый доступ к основным разделам</div>
  </div>

  <div class="scroll-area">
    <div class="menu-box" role="navigation">

      <a class="link-btn" href="Baza.html">
        <button class="btn level1" type="button">
          <span class="icon">📦</span>
          <span class="label">База товаров</span>
        </button>
      </a>

      <!-- Убраны: "База товаров без ШК" и "Аналитика" -->

      <a class="link-btn" href="Invent.html">
        <button class="btn level2" type="button">
          <span class="icon">📝</span>
          <span class="label">Инвентаризация</span>
        </button>
      </a>

      <a class="link-btn" href="prihod.html">
        <button class="btn level4" type="button">
          <span class="icon">🔄</span>
          <span class="label">Приход / Расход</span>
        </button>
      </a>

      <a class="link-btn" href="boosty.html">
        <button class="btn level1" type="button">
          <span class="icon">➕</span>
          <span class="label">Добавить товар</span>
        </button>
      </a>

      <a class="link-btn" href="Scaner.html">
        <button class="btn level3" type="button">
          <span class="icon">🔍</span>
          <span class="label">База штрих‑кодов</span>
        </button>
      </a>

    </div>
  </div>

  <script>
    // Canvas background: stars + comets (упрощённая версия)
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    function resizeCanvas(){
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(window.innerWidth * dpr));
      canvas.height = Math.max(1, Math.floor(window.innerHeight * dpr));
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const stars = [];
    const STAR_COUNT = Math.max(80, Math.floor((window.innerWidth * window.innerHeight) / 9000));
    for(let i=0;i<STAR_COUNT;i++){
      stars.push({
        x: Math.random()*window.innerWidth,
        y: Math.random()*window.innerHeight,
        r: Math.random()*1.6 + 0.4,
        alpha: Math.random()*0.9 + 0.1,
        speed: Math.random()*0.18 + 0.01,
        twinkle: Math.random()*0.02 + 0.004
      });
    }

    const comets = [];
    function spawnComet(){
      const startY = Math.random() * window.innerHeight * 0.6;
      const speed = 5 + Math.random()*5;
      const angle = (Math.random()*30 - 10) * (Math.PI/180);
      const length = 100 + Math.random()*180;
      comets.push({
        x: -80 - Math.random()*120,
        y: startY,
        vx: speed * Math.cos(angle),
        vy: speed * Math.sin(angle) + 0.5,
        life: 0,
        maxLife: 300 + Math.random()*200,
        length,
        glow: 0.9 + Math.random()*0.6
      });
    }

    function drawComet(c){
      const tailLen = c.length;
      const tx = c.x - c.vx * (tailLen/ (c.vx||1));
      const ty = c.y - c.vy * (tailLen/ (c.vy||1));
      const grad = ctx.createLinearGradient(c.x, c.y, tx, ty);
      grad.addColorStop(0, `rgba(255,255,255,${0.95 * c.glow})`);
      grad.addColorStop(0.4, `rgba(150,100,255,${0.45 * c.glow})`);
      grad.addColorStop(1, `rgba(150,100,255,0)`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(c.x, c.y);
      ctx.lineTo(tx, ty);
      ctx.stroke();

      const headRadius = 3 + (c.glow*1.6);
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,255,255,${0.95 * c.glow})`;
      ctx.arc(c.x, c.y, headRadius, 0, Math.PI*2);
      ctx.fill();

      const g = ctx.createRadialGradient(c.x, c.y, headRadius*0.2, c.x, c.y, headRadius*5);
      g.addColorStop(0, `rgba(150,100,255,${0.16 * c.glow})`);
      g.addColorStop(1, 'rgba(150,100,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(c.x, c.y, headRadius*5, 0, Math.PI*2);
      ctx.fill();
    }

    function animate(){
      ctx.clearRect(0,0,canvas.width,canvas.height);

      for(let s of stars){
        s.alpha += (Math.random()-0.5)*s.twinkle;
        if(s.alpha < 0.05) s.alpha = 0.05;
        if(s.alpha > 1) s.alpha = 1;
        s.y += s.speed;
        if(s.y > window.innerHeight){
          s.y = -2;
          s.x = Math.random()*window.innerWidth;
        }
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fill();
      }

      if(Math.random() < 0.015) spawnComet();

      for(let i = comets.length-1; i>=0; i--){
        const c = comets[i];
        drawComet(c);
        c.x += c.vx;
        c.y += c.vy;
        c.life++;
        c.glow *= 0.9995;
        if(c.x > window.innerWidth + 200 || c.y > window.innerHeight + 200 || c.life > c.maxLife){
          comets.splice(i,1);
        }
      }

      requestAnimationFrame(animate);
    }

    animate();

    let resizeTimeout;
    window.addEventListener('resize', ()=>{
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(()=>{
        resizeCanvas();
        stars.length = 0;
        const newCount = Math.max(80, Math.floor((window.innerWidth * window.innerHeight) / 9000));
        for(let i=0;i<newCount;i++){
          stars.push({
            x: Math.random()*window.innerWidth,
            y: Math.random()*window.innerHeight,
            r: Math.random()*1.6 + 0.4,
            alpha: Math.random()*0.9 + 0.1,
            speed: Math.random()*0.18 + 0.01,
            twinkle: Math.random()*0.02 + 0.004
          });
        }
      }, 120);
    });

    // Prevent double-tap zoom on iOS Safari
    document.addEventListener('touchstart', function preventZoom(e){
      if(e.touches && e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
