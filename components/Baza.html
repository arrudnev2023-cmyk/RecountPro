<style>
  :root{
    --accent:#6d28d9;
    --accent-light:#a78bfa;
    --text:#e6eef8;
    --muted:#9aa3b2;
    --card-bg: linear-gradient(135deg,#1e1e2f,#2a2a40);
    --maxw:980px;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0;
    background:#0b0710;
    color:var(--text);
    font-family:Inter,Segoe UI,system-ui,Arial;
  }

  header{
    padding:12px;
    background:rgba(10,10,12,0.7);
    backdrop-filter:blur(8px);
    border-radius:0 0 14px 14px;
  }
  header h1{
    margin:0; text-align:center; font-size:1.15rem;
  }

  #search-wrap{
    max-width:var(--maxw);
    margin:10px auto;
    position:relative;
  }
  #search{
    width:100%;
    padding:10px 56px 10px 12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.04);
    background:rgba(20,20,24,0.6);
    color:var(--text);
    font-size:15px;
  }
  #scan-btn{
    position:absolute; right:44px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--muted); cursor:pointer;
  }
  #clear-search{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--muted); cursor:pointer;
  }

  #content{
    padding:12px;
    overflow:auto;
    height:calc(100vh - 96px);
  }

  .item{
    width:100%;
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    background:var(--card-bg);
    box-shadow:0 8px 30px rgba(0,0,0,0.6);
    border-left:6px solid transparent;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .label{font-weight:700; color:#dbeafe; margin-right:6px;}

  #fabMenu{
    position:fixed; bottom:1rem; right:1rem;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color:#fff; border:none;
    padding:0.9rem 1.2rem;
    border-radius:14px;
    font-size:1.2rem; font-weight:600;
    cursor:pointer;
    box-shadow:0 6px 20px rgba(0,0,0,0.35);
  }

  #sheetOverlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(4px);
    opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  #sheetOverlay.show{
    opacity:1; pointer-events:auto;
  }

  #bottomSheet{
    position:fixed; left:0; right:0; bottom:-60vh;
    padding:1.2rem;
    background:rgba(20,20,20,0.7);
    backdrop-filter:blur(12px);
    border-radius:20px 20px 0 0;
    transition:bottom .35s ease;
  }
  #bottomSheet.show{ bottom:0; }
</style>

<header>
  <h1>RecountPro — База товаров</h1>
  <div id="search-wrap">
    <input id="search" placeholder="Поиск..." autocomplete="off" />
    <button id="scan-btn">📷</button>
    <button id="clear-search">×</button>
  </div>
</header>

<main id="content">
  <div id="scannerCard" style="display:none">
    <video id="preview" playsinline muted style="width:100%;border-radius:12px;background:#000"></video>
    <div style="display:flex;gap:10px;margin-top:10px">
      <select id="deviceSelect" style="flex:1"></select>
      <button id="torchBtn">🔦</button>
      <button id="closeScannerBtn">Закрыть</button>
      <div id="scanResult" style="margin-left:auto;color:var(--muted)"></div>
    </div>
  </div>

  <div id="list"></div>
</main>

<button id="fabMenu">☰</button>

<div id="sheetOverlay"></div>

<div id="bottomSheet">
  <button id="refreshBtn">🔄 Обновить</button>
  <button id="exportBtn">📤 Выгрузить CSV</button>
  <button id="importBtn">📥 Загрузить CSV</button>
  <button id="clearBaseBtn">🧹 Очистить базу</button>
</div>

<script>

let barcodeDB = {};
let allItems = [];

function loadDB(){
  try{
    const raw = localStorage.getItem("barcodeDB");
    barcodeDB = raw ? JSON.parse(raw) : {};
  }catch(e){ barcodeDB = {}; }
}

function saveDB(){
  localStorage.setItem("barcodeDB", JSON.stringify(barcodeDB));
}

function buildItems(){
  allItems = Object.keys(barcodeDB).map(code=>{
    const rec = barcodeDB[code];
    const name = typeof rec==="string" ? rec : rec.name;
    const qty  = typeof rec==="string" ? 0 : Number(rec.qty||0);
    return {code,name,qty};
  }).filter(i=>i.qty>0);
}

function escapeHtml(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function render(items){
  const listEl = document.getElementById("list");
  listEl.innerHTML = "";
  items.forEach(item=>{
    const div = document.createElement("div");
    div.className="item";
    div.dataset.code=item.code;
    div.innerHTML=`
      <div><span class="label">Название:</span>${escapeHtml(item.name)}</div>
      <div><span class="label">Штрих‑код:</span>${item.code}</div>
      <div><span class="label">Остаток:</span>${item.qty}</div>
    `;
    listEl.appendChild(div);
  });
}

function normalize(s){
  return String(s||"").toLowerCase().replace(/ё/g,"е").trim();
}

function matchesQuery(text, q){
  const words=q.split(" ").filter(Boolean);
  return words.every(w=>text.includes(w));
}

function closeMenu(){
  document.getElementById("bottomSheet").classList.remove("show");
  document.getElementById("sheetOverlay").classList.remove("show");
}

function exportCSV(){
  let csv="code;name;qty\n";
  for(const code in barcodeDB){
    const rec=barcodeDB[code];
    const name=typeof rec==="string"?rec:rec.name;
    const qty =typeof rec==="string"?0:Number(rec.qty||0);
    csv+=`${code};${name};${qty}\n`;
  }
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="barcodeDB.csv"; a.click();
  URL.revokeObjectURL(url);
}

function importCSV(){
  const input=document.createElement("input");
  input.type="file"; input.accept=".csv";
  input.onchange=()=>{
    const file=input.files[0];
    if(!file) return;
    const r=new FileReader();
    r.onload=()=>{
      const lines=r.result.split(/\r?\n/);
      lines.forEach((l,i)=>{
        if(i===0) return;
        const p=l.split(";");
        if(p.length>=3){
          barcodeDB[p[0]]={name:p[1],qty:Number(p[2]||0)};
        }
      });
      saveDB(); buildItems(); render(allItems);
    };
    r.readAsText(file,"utf-8");
  };
  input.click();
}

function clearBase(){
  for(const code in barcodeDB){
    const rec=barcodeDB[code];
    if(typeof rec==="string") barcodeDB[code]={name:rec,qty:0};
    else rec.qty=0;
  }
  saveDB(); buildItems(); render(allItems);
}

function init(){
  loadDB();
  buildItems();
  render(allItems);

  const search=document.getElementById("search");
  const clear=document.getElementById("clear-search");

  search.oninput=()=>{
    const q=normalize(search.value);
    document.querySelectorAll("#list .item").forEach(div=>{
      const code=normalize(div.dataset.code);
      const name=normalize(barcodeDB[div.dataset.code]?.name||"");
      const match=q===""||matchesQuery(name,q)||matchesQuery(code,q);
      div.classList.toggle("hidden",!match);
    });
  };

  clear.onclick=()=>{
    search.value="";
    document.querySelectorAll("#list .item").forEach(d=>d.classList.remove("hidden"));
  };

  document.getElementById("fabMenu").onclick=()=>{
    document.getElementById("bottomSheet").classList.add("show");
    document.getElementById("sheetOverlay").classList.add("show");
  };

  document.getElementById("sheetOverlay").onclick=closeMenu;

  document.getElementById("refreshBtn").onclick=()=>{
    buildItems(); render(allItems); closeMenu();
  };

  document.getElementById("exportBtn").onclick=()=>{ closeMenu(); exportCSV(); };
  document.getElementById("importBtn").onclick=()=>{ closeMenu(); importCSV(); };
  document.getElementById("clearBaseBtn").onclick=()=>{ closeMenu(); clearBase(); };
}

function destroy(){
  const ids=[
    "search","clear-search","fabMenu","sheetOverlay",
    "refreshBtn","exportBtn","importBtn","clearBaseBtn"
  ];
  ids.forEach(id=>{
    const el=document.getElementById(id);
    if(el){ el.onclick=null; el.oninput=null; el.onchange=null; }
  });
}

init();
window.currentDestroy=destroy;

</script>
