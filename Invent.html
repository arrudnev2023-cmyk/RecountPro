<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>RecountPro — Пересчёт</title>

  <!-- ZXing -->
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    :root {
      --accent: #4361ee;
      --bg: #ffffff;
      --card: #ffffff;
      --muted: #666;
      --text: #333;
      --maxw: 980px;
      --border: #e0e0e0;
      --shadow: 0 6px 18px rgba(0,0,0,0.08);
      --smooth: cubic-bezier(.2,.9,.2,1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    html, body {
      height: 100%;
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, Arial, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    header {
      position: fixed;
      left: 0; right: 0; top: 0;
      padding: 12px;
      background-color: white;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      border-radius: 0 0 14px 14px;
      will-change: transform;
      transition: transform 280ms var(--smooth);
    }
    header h1 {
      margin: 0;
      text-align: center;
      font-size: 1.15rem;
      color: var(--accent);
      font-weight: 700;
    }

    #search-wrap {
      max-width: var(--maxw);
      margin: 10px auto;
      position: relative;
    }
    #search {
      width: 100%;
      padding: 10px 56px 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background-color: white;
      color: var(--text);
      font-size: 15px;
      transition: box-shadow 180ms var(--smooth), border-color 180ms var(--smooth);
    }
    #search:focus { box-shadow: 0 6px 18px rgba(67,97,238,0.08); border-color: rgba(67,97,238,0.18); outline: none; }

    #scan-btn,
    #clear-search {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 6px;
      line-height: 1;
    }
    #clear-search { right: 44px; }

    #content {
      position: fixed;
      left: 0; right: 0;
      top: 96px; bottom: 0;
      overflow: auto;
      padding: 12px;
      -webkit-overflow-scrolling: touch;
      transition: padding-bottom 220ms var(--smooth);
    }

    .card {
      max-width: var(--maxw);
      margin: 10px auto;
      padding: 12px;
      border-radius: 8px;
      background-color: var(--card);
      box-shadow: var(--shadow);
      transition: transform 220ms var(--smooth), box-shadow 220ms var(--smooth);
    }

    .preview-wrap {
      border-radius: 8px;
      overflow: hidden;
      background-color: #f8f8f8;
      border: 1px solid var(--border);
      height: 34vh;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video#preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform-origin: center center;
      will-change: transform;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }
    .btn {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background-color: white;
      color: var(--text);
      cursor: pointer;
      transition: transform 120ms var(--smooth), box-shadow 120ms var(--smooth);
      will-change: transform;
    }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background-color: var(--accent);
      color: white;
      font-weight: 700;
    }

    .list {
      max-width: var(--maxw);
      margin: 12px auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 120px;
    }

    .item {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background-color: var(--card);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 4px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      z-index: 1;
      transition: box-shadow 220ms var(--smooth), transform 220ms var(--smooth), border-color 220ms var(--smooth);
      will-change: transform, box-shadow;
    }
    .item:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    .item.match   { border-left-color: #22c55e; }
    .item.missing { border-left-color: #ef4444; }
    .item.excess  { border-left-color: #3b82f6; }

    .field { margin-bottom: 8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .label { font-weight:700; color:var(--accent); margin-right:6px; white-space:nowrap; }

    input[data-code] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background-color: white;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: box-shadow 160ms var(--smooth), border-color 160ms var(--smooth);
    }
    input[data-code]:focus { box-shadow: 0 8px 20px rgba(67,97,238,0.06); border-color: rgba(67,97,238,0.12); }

    /* Кастомная клавиатура */
    #custom-keyboard {
      position: fixed;
      left: 0; right: 0;
      bottom: -40vh;
      height: 34vh;
      background-color: white;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      z-index: 3000;
      transition: transform 280ms var(--smooth), box-shadow 280ms var(--smooth);
      transform: translateY(100%);
      border-top: 1px solid var(--border);
      box-shadow: 0 -12px 40px rgba(0,0,0,0.12);
      will-change: transform;
      touch-action: manipulation;
    }
    #custom-keyboard.show { transform: translateY(0); }
    #custom-keyboard button {
      border: 1px solid var(--border);
      border-radius: 6px;
      background-color: white;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 12px 6px;
      transition: transform 120ms var(--smooth), background 120ms var(--smooth);
      will-change: transform, background;
      user-select: none;
      -webkit-user-select: none;
    }
    #custom-keyboard button:active { transform: translateY(1px); background:#f3f6ff; }
    #custom-keyboard .done { grid-column: 1 / -1; background: var(--accent); color: white; font-weight:700; }

    .hidden { display: none !important; }

    /* FAB меню */
    #fabMenu {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      z-index: 1001;
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 0.9rem 1.2rem;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(67,97,238,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 180ms var(--smooth), box-shadow 180ms var(--smooth);
      will-change: transform;
    }

    #sheetOverlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s var(--smooth);
      z-index: 999;
    }
    #sheetOverlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    #bottomSheet {
      position: fixed;
      left: 0; right: 0;
      bottom: -60vh;
      padding: 1.2rem;
      background-color: white;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      transition: transform 350ms var(--smooth);
      transform: translateY(100%);
      z-index: 1002;
      will-change: transform;
    }
    #bottomSheet.show { transform: translateY(0); }

    .sheet-content {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .sheet-btn {
      background-color: #f5f5f5;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.9rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 120ms var(--smooth);
    }
    .sheet-btn:active { transform: translateY(1px); }

    /* Модалка итогов */
    #summaryModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 6000;
      display: none;
      align-items: center;
      justify-content: center;
      transition: opacity 220ms var(--smooth);
    }
    #summaryModal.show { display: flex; opacity: 1; }
    #summaryModal .panel {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 90%;
      max-height: 80%;
      overflow: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      transform: translateY(8px);
      transition: transform 220ms var(--smooth), opacity 220ms var(--smooth);
    }
    #summaryTable th, #summaryTable td {
      border: none;
      padding: 8px;
    }
    #summaryTable th {
      background-color: #f0f0f0;
      font-weight: 600;
    }

    /* Toast */
    .toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 18vh;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s var(--smooth);
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* Accessibility helpers */
    input[data-code] { caret-color: var(--accent); }
    .sr-only { position:absolute; left:-9999px; top:auto; width:1px; height:1px; overflow:hidden; }
  </style>
</head>

<body>
  <header>
    <h1>RecountPro — Пересчёт</h1>
    <div id="search-wrap">
      <input id="search" placeholder="Поиск по названию или коду..." autocomplete="off" />
      <button id="scan-btn" title="Открыть сканер" aria-label="Открыть сканер">📷</button>
      <button id="clear-search" title="Очистить" aria-label="Очистить поиск">×</button>
    </div>
  </header>

  <main id="content" tabindex="-1">
    <!-- Сканер -->
    <div class="card" id="scannerCard" style="display:none; transition:opacity 220ms var(--smooth);">
      <div class="preview-wrap">
        <video id="preview" playsinline muted></video>
      </div>
      <div class="controls">
        <select id="deviceSelect" class="btn" style="min-width:160px"></select>
        <button id="torchBtn" class="btn" aria-pressed="false">🔦</button>
        <button id="closeScannerBtn" class="btn">Закрыть</button>
        <div id="scanResult" style="margin-left:auto;color:var(--muted)"></div>
      </div>
    </div>

    <!-- Список товаров -->
    <div id="list" class="list" aria-live="polite"></div>
  </main>

  <!-- Кастомная клавиатура -->
  <div id="custom-keyboard" aria-hidden="true" role="application" aria-label="Клавиатура для ввода количества">
    <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
    <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
    <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
    <button data-key="+">+</button><button data-key="0">0</button><button data-key="back">←</button>
    <button class="done" id="done" aria-label="Готово">Готово</button>
  </div>

  <!-- FAB меню -->
  <button id="fabMenu" aria-haspopup="true" aria-expanded="false">☰</button>
  <div id="sheetOverlay" aria-hidden="true"></div>
  <div id="bottomSheet" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="sheet-content">
      <button class="sheet-btn" id="saveBtn">💾 Сохранить</button>
      <button class="sheet-btn" id="clearBtn">🧹 Очистить пересчёт</button>
      <button class="sheet-btn" id="totalBtn">📊 Итог</button>
      <button class="sheet-btn" id="inventoryBtn">📋 Провести инвентаризацию</button>
    </div>
  </div>

  <!-- Модалка итогов -->
  <div id="summaryModal" aria-hidden="true">
    <div class="panel">
      <h3>Итоги инвентаризации</h3>
      <table id="summaryTable" style="width:100%;border-collapse:collapse;margin-top:10px;">
        <thead>
          <tr>
            <th style="text-align:left;">Товар</th>
            <th style="text-align:right;">Учётное</th>
            <th style="text-align:right;">Фактическое</th>
            <th style="text-align:right;">Разница</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button id="summarySaveBtn" class="btn primary" style="flex:1;">Сохранить в базу</button>
        <button id="summaryCloseBtn" class="btn" style="flex:1;">Закрыть</button>
      </div>
    </div>
  </div>

  <!-- ZXing fallback -->
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <script>
    /* ========= СТЕЙТ ========= */
    let barcodeDB = {};      // { [name]: [code1, code2...] }
    let quantities = {};     // { [name]: qty }
    let allItems = [];       // [{code,name,qty}]
    let sessionValues = {};  // { [code]: "выражение" }
    let codeToName = new Map();

    let reader = null;
    let currentStream = null;
    let scanning = false;
    let lastDetected = { code: null, ts: 0 };
    const DEBOUNCE_MS = 700;

    // Torch state
    let torchState = false;

    /* ========= ЭЛЕМЕНТЫ ========= */
    const searchInput      = document.getElementById('search');
    const listContainer    = document.getElementById('list');

    const scannerCard      = document.getElementById('scannerCard');
    const previewVideo     = document.getElementById('preview');
    const deviceSelect     = document.getElementById('deviceSelect');
    const torchBtn         = document.getElementById('torchBtn');
    const closeScannerBtn  = document.getElementById('closeScannerBtn');
    const scanResult       = document.getElementById('scanResult');

    const fabMenu          = document.getElementById('fabMenu');
    const sheetOverlay     = document.getElementById('sheetOverlay');
    const bottomSheet      = document.getElementById('bottomSheet');

    const customKeyboard   = document.getElementById('custom-keyboard');

    const saveBtn          = document.getElementById('saveBtn');
    const clearBtn         = document.getElementById('clearBtn');
    const totalBtn         = document.getElementById('totalBtn');
    const inventoryBtn     = document.getElementById('inventoryBtn');

    const summaryModal     = document.getElementById('summaryModal');
    const summaryTableBody = document.querySelector('#summaryTable tbody');
    const summarySaveBtn   = document.getElementById('summarySaveBtn');
    const summaryCloseBtn  = document.getElementById('summaryCloseBtn');

    const scanBtn          = document.getElementById('scan-btn');
    const clearSearch      = document.getElementById('clear-search');

    /* ========= УТИЛИТЫ ========= */
    function evalExpression(expr) {
      if (!expr) return 0;
      const safe = String(expr).replace(/\s+/g, '');
      if (!/^[0-9+\-]+$/.test(safe)) return 0;
      try {
        const val = Function('return ' + safe)();
        return Number.isFinite(val) ? val : 0;
      } catch {
        return 0;
      }
    }

    /* ========= БАЗА / ИНДЕКС / СЕССИЯ ========= */
    function buildItemsFromDB() {
      allItems = [];
      codeToName = new Map();
      Object.entries(barcodeDB).forEach(([name, codes]) => {
        const qty = quantities[name] || 0;
        codes.forEach(code => {
          allItems.push({ code, name, qty });
          codeToName.set(String(code), name);
        });
      });
    }

    function loadDB() {
      try {
        const raw = localStorage.getItem('barcodeDB');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.db && parsed.quantities) {
            barcodeDB = parsed.db;
            quantities = parsed.quantities;
          } else {
            barcodeDB = {};
            quantities = {};
            Object.entries(parsed || {}).forEach(([code, data]) => {
              const name = (data && data.name) ? data.name : data;
              if (!barcodeDB[name]) {
                barcodeDB[name] = [];
                quantities[name] = 0;
              }
              barcodeDB[name].push(code);
            });
          }
        } else {
          barcodeDB = {};
          quantities = {};
        }
      } catch (e) {
        console.error('Ошибка загрузки базы:', e);
        barcodeDB = {};
        quantities = {};
      }

      try {
        const rawSession = localStorage.getItem('recountSession');
        sessionValues = rawSession ? JSON.parse(rawSession) : {};
      } catch {
        sessionValues = {};
      }

      buildItemsFromDB();
    }

    function saveDB() {
      try {
        localStorage.setItem('barcodeDB', JSON.stringify({ db: barcodeDB, quantities: quantities }));
      } catch (e) {
        console.error('Ошибка сохранения базы:', e);
      }
    }

    // Debounced session save to reduce localStorage thrash
    let _sessionSaveTimer = null;
    function saveSession(debounce = true) {
      try {
        if (debounce) {
          clearTimeout(_sessionSaveTimer);
          _sessionSaveTimer = setTimeout(() => {
            try { localStorage.setItem('recountSession', JSON.stringify(sessionValues)); } catch (e) { console.error('Ошибка сохранения сессии:', e); }
          }, 120);
        } else {
          localStorage.setItem('recountSession', JSON.stringify(sessionValues));
        }
      } catch (e) {
        console.error('Ошибка сохранения сессии:', e);
      }
    }

    /* ========= РЕНДЕР ========= */
    function showEmptyState() {
      listContainer.innerHTML = `
        <div style="text-align:center;padding:40px;color:var(--muted);">
          <h3>База товаров пуста</h3>
          <p>Добавьте товары на экране базы.</p>
        </div>
      `;
    }

    function renderItems(items) {
      // Полностью перерисовываем список только при фильтрации/инициализации.
      listContainer.innerHTML = '';
      if (!items || items.length === 0) {
        showEmptyState();
        return;
      }

      const fragment = document.createDocumentFragment();
      items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'item';
        el.dataset.code = item.code;
        el.dataset.name = item.name;

        const expected = quantities[item.name] || 0;
        const expr     = sessionValues[item.code] || '';
        const actual   = evalExpression(expr);

        if (expr) {
          if (actual === expected) el.classList.add('match');
          else if (actual < expected) el.classList.add('missing');
          else el.classList.add('excess');
        }

        el.innerHTML = `
          <div class="field">
            <span class="label">Название:</span>
            <strong>${escapeHtml(item.name)}</strong>
          </div>
          <div class="field">
            <span class="label">Штрихкод:</span>
            <span>${escapeHtml(String(item.code))}</span>
          </div>
          <div class="field">
            <span class="label">Учётное:</span>
            <span>${expected}</span>
          </div>
          <div class="field">
            <span class="label">Кол-во:</span>
            <input data-code="${escapeHtml(String(item.code))}" type="text" value="${escapeHtml(expr || '')}" placeholder="0" readonly tabindex="0" />
          </div>
        `;

        // Быстрый клик по карточке — фокус на поле
        el.addEventListener('pointerdown', (ev) => {
          // prevent accidental text selection
          ev.preventDefault();
          const input = el.querySelector('input[data-code]');
          if (input) {
            // focus reliably on pointerdown to avoid keyboard lag on mobile
            try { input.focus({ preventScroll: true }); } catch (e) { input.focus(); }
            showCustomKeyboard(input);
            setTimeout(() => ensureVisibleAboveKeyboard(input), 120);
          }
        }, { passive: false });

        fragment.appendChild(el);
      });

      listContainer.appendChild(fragment);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function buildItems() {
      renderItems(allItems);
    }

    /* ========= КЛАВИАТУРА (обновлённая: не перерисовываем весь список при вводе) ========= */
    function showCustomKeyboard(input) {
      if (!customKeyboard || !input) return;
      // store target code
      customKeyboard.dataset.target = input.dataset.code;
      customKeyboard.setAttribute('aria-hidden', 'false');
      customKeyboard.classList.add('show');
      // ensure keyboard is visible above other elements
      customKeyboard.style.display = '';
      // mark input as active for styling
      input.classList.add('active-input');
      // ensure keyboard is announced for screen readers
      customKeyboard.setAttribute('role', 'application');
      // small delay to allow transition then ensure visible
      requestAnimationFrame(() => {
        ensureVisibleAboveKeyboard(input);
      });
    }

    function hideCustomKeyboard() {
      if (!customKeyboard) return;
      const targetCode = customKeyboard.dataset.target;
      delete customKeyboard.dataset.target;
      customKeyboard.setAttribute('aria-hidden', 'true');
      customKeyboard.classList.remove('show');
      // remove active class from any input
      const active = document.querySelector('input.active-input');
      if (active) active.classList.remove('active-input');
      // hide after transition to avoid layout jumps
      setTimeout(() => {
        if (!customKeyboard.classList.contains('show')) customKeyboard.style.display = 'none';
      }, 320);
    }

    function updateItemVisual(code) {
      // обновляем только DOM-элемент конкретной карточки, не перерисовываем весь список
      const el = document.querySelector(`.item[data-code="${cssEscape(code)}"]`);
      if (!el) return;
      const expr = sessionValues[code] || '';
      const actual = evalExpression(expr);
      const name = el.dataset.name;
      const expected = quantities[name] || 0;

      // обновляем input value
      const input = el.querySelector('input[data-code]');
      if (input) input.value = expr;

      // сброс классов
      el.classList.remove('match', 'missing', 'excess');
      if (expr) {
        if (actual === expected) el.classList.add('match');
        else if (actual < expected) el.classList.add('missing');
        else el.classList.add('excess');
      }
    }

    // безопасный селектор для кода (в т.ч. если код содержит спецсимволы)
    function cssEscape(str) {
      return CSS.escape ? CSS.escape(String(str)) : String(str).replace(/([^\w-])/g, '\\$1');
    }

    function initCustomKeyboard() {
      if (!customKeyboard) return;
      const keys = Array.from(customKeyboard.querySelectorAll('button:not(.done)'));
      // Use pointerdown for snappy response on touch devices
      keys.forEach(key => {
        key.addEventListener('pointerdown', (ev) => {
          ev.preventDefault();
          const targetCode = customKeyboard.dataset.target;
          if (!targetCode) return;
          const input = document.querySelector(`input[data-code="${cssEscape(targetCode)}"]`);
          if (!input) return;

          let currentValue = input.value || '';
          const keyValue = key.dataset.key || key.textContent;

          if (keyValue === 'back' || keyValue === '←') {
            currentValue = currentValue.slice(0, -1);
          } else {
            currentValue = currentValue + keyValue;
          }

          // обновляем только значение и визуалку карточки
          sessionValues[targetCode] = currentValue;
          saveSession(); // debounced
          input.value = currentValue;
          updateItemVisual(targetCode);

          // убедимся, что поле видно над клавиатурой
          setTimeout(() => ensureVisibleAboveKeyboard(input), 0);
        }, { passive: false });
      });

      const doneBtn = document.getElementById('done');
      if (doneBtn) doneBtn.addEventListener('pointerdown', (ev) => {
        ev.preventDefault();
        const targetCode = customKeyboard.dataset.target;
        hideCustomKeyboard();
        // снимем фокус с поля
        const input = document.querySelector(`input[data-code="${cssEscape(targetCode)}"]`);
        try { input?.blur(); } catch (e) {}
      }, { passive: false });
    }

    // Простое скрытие клавиатуры при клике вне (улучшено: capture + pointerdown)
    function setupKeyboardDismissSimple() {
      document.addEventListener('pointerdown', (e) => {
        if (!customKeyboard || !customKeyboard.classList.contains('show')) return;
        if (customKeyboard.contains(e.target)) return;
        if (e.target.closest && e.target.closest('input[data-code]')) return;
        hideCustomKeyboard();
      }, { capture: true });
    }
    setupKeyboardDismissSimple();

    /* ========= СКАНЕР (эталонный, интегрирован) ========= */
    function createCanvas(w, h) {
      const c = document.createElement('canvas');
      c.width = w;
      c.height = h;
      return c;
    }

    function toGrayscale(ctx, w, h) {
      try {
        const img = ctx.getImageData(0, 0, w, h);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const v = (d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114) | 0;
          d[i] = d[i + 1] = d[i + 2] = v;
        }
        ctx.putImageData(img, 0, 0);
      } catch (e) {
        // ignore cross-origin or other issues
      }
    }

    function increaseContrast(ctx, w, h, contrast = 30) {
      try {
        const img = ctx.getImageData(0, 0, w, h);
        const d = img.data;
        const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
        for (let i = 0; i < d.length; i += 4) {
          for (let c = 0; c < 3; c++) {
            let col = d[i + c];
            col = factor * (col - 128) + 128;
            d[i + c] = Math.max(0, Math.min(255, col));
          }
        }
        ctx.putImageData(img, 0, 0);
      } catch (e) {
        // ignore
      }
    }

    async function tryDecodeCanvas(canvas) {
      if ('BarcodeDetector' in window) {
        try {
          const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
          const det = new BarcodeDetector({formats: ["ean_13","ean_8","code_128","code_39","upc_a","upc_e","itf"]});
          const res = await det.detect(imageData);
          if (res && res.length) return res[0].rawValue;
        } catch (e) {}
      }

      try {
        const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
        const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
        const result = new ZXing.MultiFormatReader().decode(binaryBitmap);
        if (result && result.text) return result.text;
      } catch (e) {}

      const w = canvas.width;
      const h = canvas.height;
      const temp = createCanvas(w, h);
      const tctx = temp.getContext('2d');

      for (let angle of [90, 180, 270]) {
        tctx.clearRect(0, 0, w, h);
        tctx.save();
        tctx.translate(w / 2, h / 2);
        tctx.rotate(angle * Math.PI / 180);
        tctx.drawImage(canvas, -w / 2, -h / 2);
        tctx.restore();

        try {
          const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(temp);
          const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
          const result = new ZXing.MultiFormatReader().decode(binaryBitmap);
          if (result && result.text) return result.text;
        } catch (e) {}
      }
      return null;
    }

    let canvasPool = [];
    function getCanvas(w, h) {
      for (let c of canvasPool) if (c.width === w && c.height === h) return c;
      const c = createCanvas(w, h);
      canvasPool.push(c);
      return c;
    }

    // Throttle scan loop to avoid heavy CPU on low-end devices
    let _scanRaf = null;
    let _lastScanTs = 0;
    const SCAN_MIN_INTERVAL = 80; // ms

    async function scanLoop() {
      if (!scanning) return;
      const now = performance.now();
      if (now - _lastScanTs < SCAN_MIN_INTERVAL) {
        _scanRaf = requestAnimationFrame(scanLoop);
        return;
      }
      _lastScanTs = now;

      try {
        const w = previewVideo.videoWidth;
        const h = previewVideo.videoHeight;
        if (w === 0 || h === 0) {
          _scanRaf = requestAnimationFrame(scanLoop);
          return;
        }

        const canvas = getCanvas(w, h);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(previewVideo, 0, 0, w, h);

        const scale = Math.max(1, Math.floor(Math.max(w, h) / 900));
        const sw = Math.floor(w / scale);
        const sh = Math.floor(h / scale);
        const small = getCanvas(sw, sh);
        const sctx = small.getContext('2d');
        sctx.drawImage(canvas, 0, 0, w, h, 0, 0, sw, sh);
        toGrayscale(sctx, sw, sh);
        increaseContrast(sctx, sw, sh, 30);

        const code = await tryDecodeCanvas(small);
        if (code) handleDetected(code);
      } catch (e) {
        // ignore
      } finally {
        _scanRaf = requestAnimationFrame(scanLoop);
      }
    }

    function handleDetected(code) {
      const now = Date.now();
      if (code === lastDetected.code && (now - lastDetected.ts) < DEBOUNCE_MS) return;
      lastDetected = { code, ts: now };
      try { navigator.vibrate?.(40); } catch (e) {}

      scanResult.textContent = `Найден: ${code}`;

      const name = codeToName.get(String(code));
      if (name) {
        searchInput.value = name;
        filterItems();
        highlightScannedItemByCode(code);

        // Найдём поле ввода для этой карточки и установим фокус, откроем кастомную клавиатуру
        setTimeout(() => {
          const target = document.querySelector(`.item[data-code="${cssEscape(code)}"]`);
          if (target) {
            const input = target.querySelector('input[data-code]');
            if (input) {
              // Сделаем поле видимым и откроем клавиатуру
              input.scrollIntoView({ behavior: 'smooth', block: 'center' });
              showCustomKeyboard(input);
              try { input.focus({ preventScroll: true }); } catch (e) { try { input.focus(); } catch (e) {} }
              setTimeout(() => ensureVisibleAboveKeyboard(input), 160);
            }
          }

          // Закрываем сканер через короткую паузу, чтобы пользователь увидел подсветку и клавиатуру
          setTimeout(() => {
            try { stopScanner(); } catch (e) { console.warn('stopScanner error', e); }
            scannerCard.style.display = 'none';
          }, 400);
        }, 120);
      } else {
        showToast('Штрихкод не найден в базе');
      }
    }

    /* Start/stop camera */
    async function startCamera(deviceId) {
      try {
        stopScanner();
        scanning = true;
        const constraints = deviceId ? {
          video: { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: { ideal: "environment" } },
          audio: false
        } : { video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };

        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        previewVideo.srcObject = currentStream;
        await previewVideo.play().catch(()=>{});
        try { reader = new ZXing.BrowserMultiFormatReader(); } catch (e) { reader = null; }
        // reset last detected to avoid immediate duplicates
        lastDetected = { code: null, ts: 0 };
        _scanRaf = requestAnimationFrame(scanLoop);
      } catch (e) {
        console.warn('startCamera fallback, trying without deviceId:', e);
        try {
          const fallback = { video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } } };
          currentStream = await navigator.mediaDevices.getUserMedia(fallback);
          previewVideo.srcObject = currentStream;
          await previewVideo.play().catch(()=>{});
          try { reader = new ZXing.BrowserMultiFormatReader(); } catch (e) { reader = null; }
          lastDetected = { code: null, ts: 0 };
          _scanRaf = requestAnimationFrame(scanLoop);
        } catch (err) {
          console.error('Ошибка доступа к камере:', err);
          alert('Ошибка доступа к камере');
          scanning = false;
        }
      }
    }

    function stopScanner() {
      scanning = false;
      if (_scanRaf) {
        cancelAnimationFrame(_scanRaf);
        _scanRaf = null;
      }
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        currentStream = null;
      }
      if (reader) {
        try { reader.reset(); } catch (e) {}
        reader = null;
      }
      previewVideo.srcObject = null;
      scanResult.textContent = '';
      torchState = false;
      torchBtn.setAttribute('aria-pressed', 'false');
    }

    /* ========= ПОИСК / ХАЙЛАЙТ ========= */
    function filterItems() {
      const q = (searchInput.value || '').toLowerCase().trim();
      if (!q) {
        buildItems();
        return;
      }

      const filtered = allItems.filter(item =>
        item.name.toLowerCase().includes(q) ||
        String(item.code).includes(q)
      );

      renderItems(filtered);
    }

    function highlightScannedItemByCode(code) {
      document.querySelectorAll('.item').forEach(el => el.style.boxShadow = '');
      const target = document.querySelector(`.item[data-code="${cssEscape(code)}"]`);
      if (target) {
        target.style.boxShadow = '0 0 0 2px rgba(67,97,238,0.45)';
        const container = document.getElementById('content') || document.documentElement;
        const rect = target.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect ? container.getBoundingClientRect() : { top: 0 };
        const offsetTop = (rect.top - containerRect.top) + container.scrollTop;
        container.scrollTo({ top: Math.max(0, offsetTop - 8), behavior: 'smooth' });
        // remove highlight after a short delay
        setTimeout(() => { target.style.boxShadow = ''; }, 1200);
      }
    }

    /* ========= ВСПОМОГАТЕЛЬНЫЕ ========= */
    function ensureVisibleAboveKeyboard(input) {
      if (!input) return;
      const kb = document.getElementById('custom-keyboard');
      const kbHeight = (kb && kb.classList.contains('show')) ? kb.getBoundingClientRect().height : 0;
      const fieldRect = input.getBoundingClientRect();
      const viewportHeight = window.innerHeight;
      const safeMargin = 12;
      const bottomOverlap = (fieldRect.bottom + safeMargin) - (viewportHeight - kbHeight);
      if (bottomOverlap > 0) {
        const container = document.getElementById('content') || document.documentElement;
        const currentScroll = container.scrollTop || window.scrollY || document.documentElement.scrollTop;
        const scrollBy = bottomOverlap + 40;
        container.scrollTo({ top: currentScroll + scrollBy, behavior: 'smooth' });
      } else {
        const topGap = fieldRect.top - safeMargin;
        if (topGap < 60) {
          const container = document.getElementById('content') || document.documentElement;
          const currentScroll = container.scrollTop || window.scrollY || document.documentElement.scrollTop;
          container.scrollTo({ top: Math.max(0, currentScroll - (60 - topGap)), behavior: 'smooth' });
        }
      }
    }

    /* ========= ИНВЕНТАРИЗАЦИЯ / СОХРАНЕНИЕ ========= */
    function startInventory() {
      sessionValues = {};
      allItems.forEach(item => sessionValues[item.code] = '');
      saveSession(false);
      buildItems();
      alert('Режим инвентаризации активирован. Ввод сохраняется в сессии и не меняет базу до сохранения.');
    }

    function clearInventory() {
      sessionValues = {};
      saveSession(false);
      buildItems();
      alert('Пересчёт очищен.');
    }

    function applySessionToDB() {
      const aggregated = {};
      allItems.forEach(item => {
        const expr = sessionValues[item.code] || '';
        const val  = evalExpression(expr);
        const name = item.name;
        if (!aggregated[name]) aggregated[name] = 0;
        aggregated[name] += val;
      });

      Object.keys(aggregated).forEach(name => {
        quantities[name] = aggregated[name];
      });

      saveDB();
      buildItemsFromDB();
      buildItems();
    }

    /* ========= ИТОГИ ========= */
    function openSummary() {
      summaryTableBody.innerHTML = '';
      const summary = {};
      allItems.forEach(item => {
        const name = item.name;
        const expected = quantities[name] || 0;
        const expr = sessionValues[item.code] || '';
        const val  = evalExpression(expr);
        if (!summary[name]) summary[name] = { expected, actual: 0 };
        summary[name].actual += val;
      });

      Object.entries(summary).forEach(([name, data]) => {
        const diff = data.actual - data.expected;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="text-align:left;">${escapeHtml(name)}</td>
          <td style="text-align:right;">${data.expected}</td>
          <td style="text-align:right;">${data.actual}</td>
          <td style="text-align:right;">${diff}</td>
        `;
        summaryTableBody.appendChild(tr);
      });

      summaryModal.classList.add('show');
      summaryModal.setAttribute('aria-hidden', 'false');
    }

    function closeSummary() {
      summaryModal.classList.remove('show');
      summaryModal.setAttribute('aria-hidden', 'true');
    }

    /* ========= ТОАСТ ========= */
    let _toastTimer = null;
    function showToast(message) {
      let toast = document.querySelector(".toast");
      if (!toast) {
        toast = document.createElement("div");
        toast.className = "toast";
        document.body.appendChild(toast);
      }

      toast.textContent = message;
      toast.classList.add('show');

      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 1800);
    }

    /* ========= ИНИЦИАЛИЗАЦИЯ ========= */
    document.addEventListener('DOMContentLoaded', async () => {
      loadDB();
      buildItems();
      initCustomKeyboard();

      // Improve keyboard focusability: allow pointerdown on inputs to open keyboard
      document.addEventListener('pointerdown', (e) => {
        const input = e.target.closest && e.target.closest('input[data-code]');
        if (input) {
          // prevent default to avoid native keyboard on some devices
          e.preventDefault();
          try { input.focus({ preventScroll: true }); } catch (err) { input.focus(); }
          showCustomKeyboard(input);
          setTimeout(() => ensureVisibleAboveKeyboard(input), 120);
        }
      }, { passive: false });

      scanBtn.addEventListener('click', () => {
        scannerCard.style.display = 'block';
        scannerCard.style.opacity = '1';
        // initScanner uses camera pipeline (startCamera + scanLoop)
        (async () => {
          try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            if (videoDevices.length === 0) {
              alert('Камеры не найдены');
              return;
            }
            let backCam = videoDevices.find(d => {
              const label = (d.label || '').toLowerCase();
              return label.includes('back') || label.includes('rear') || label.includes('зад') || label.includes('environment');
            });
            const defaultCamId = (backCam || videoDevices[0]).deviceId;
            deviceSelect.innerHTML = videoDevices.map(d => `<option value="${escapeHtml(d.deviceId)}">${escapeHtml(d.label || 'Камера')}</option>`).join('');
            deviceSelect.value = defaultCamId;
            await startCamera(defaultCamId);
          } catch (e) {
            console.error('init scanner error', e);
            alert('Не удалось инициализировать сканер');
          }
        })();
      });

      closeScannerBtn.addEventListener('click', () => {
        stopScanner();
        scannerCard.style.display = 'none';
      });

      deviceSelect.addEventListener('change', e => {
        startCamera(e.target.value);
      });

      torchBtn.addEventListener('click', async () => {
        try {
          const tracks = currentStream?.getVideoTracks();
          if (tracks && tracks.length > 0) {
            const track = tracks[0];
            const capabilities = track.getCapabilities?.();
            if (capabilities?.torch) {
              torchState = !torchState;
              await track.applyConstraints({ advanced: [{ torch: torchState }] });
              torchBtn.setAttribute('aria-pressed', String(!!torchState));
            } else {
              showToast('Фонарик не поддерживается');
            }
          } else {
            showToast('Камера не активна');
          }
        } catch (e) {
          console.error('Torch error', e);
          showToast('Ошибка управления фонариком');
        }
      });

      clearSearch.addEventListener('click', () => {
        searchInput.value = '';
        filterItems();
      });

      // Debounce input filtering for smoother typing
      let _filterTimer = null;
      searchInput.addEventListener('input', () => {
        clearTimeout(_filterTimer);
        _filterTimer = setTimeout(filterItems, 120);
      });

      fabMenu.addEventListener('click', () => {
        const open = bottomSheet.classList.toggle('show');
        sheetOverlay.classList.toggle('show', open);
        bottomSheet.setAttribute('aria-hidden', String(!open));
        sheetOverlay.setAttribute('aria-hidden', String(!open));
        fabMenu.setAttribute('aria-expanded', String(open));
      });

      sheetOverlay.addEventListener('click', () => {
        bottomSheet.classList.remove('show');
        sheetOverlay.classList.remove('show');
        bottomSheet.setAttribute('aria-hidden', 'true');
        sheetOverlay.setAttribute('aria-hidden', 'true');
        fabMenu.setAttribute('aria-expanded', 'false');
      });

      inventoryBtn.addEventListener('click', () => {
        startInventory();
        bottomSheet.classList.remove('show');
        sheetOverlay.classList.remove('show');
      });

      clearBtn.addEventListener('click', () => {
        clearInventory();
        bottomSheet.classList.remove('show');
        sheetOverlay.classList.remove('show');
      });

      totalBtn.addEventListener('click', () => {
        openSummary();
        bottomSheet.classList.remove('show');
        sheetOverlay.classList.remove('show');
      });

      saveBtn.addEventListener('click', () => {
        applySessionToDB();
        buildItems();
        showToast('Остатки обновлены в базе товаров.');
        bottomSheet.classList.remove('show');
        sheetOverlay.classList.remove('show');
      });

      summaryCloseBtn.addEventListener('click', closeSummary);

      summarySaveBtn.addEventListener('click', () => {
        applySessionToDB();
        buildItems();
        closeSummary();
        showToast('Итоги сохранены в базу.');
      });

      // Попытка "разогреть" разрешения, чтобы метки камер появились
      try { await navigator.mediaDevices.getUserMedia({ video: true }); } catch (e) {}

      // Stop scanner when page hidden to save resources
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) stopScanner();
      });

      // Accessibility: close modal on Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (customKeyboard && customKeyboard.classList.contains('show')) hideCustomKeyboard();
          if (summaryModal && summaryModal.classList.contains('show')) closeSummary();
          if (bottomSheet && bottomSheet.classList.contains('show')) {
            bottomSheet.classList.remove('show');
            sheetOverlay.classList.remove('show');
          }
        }
      });

      // Ensure keyboard init after DOM ready
      initCustomKeyboard();
    });

    /* Остановим камеру при уходе со страницы */
    window.addEventListener('pagehide', () => stopScanner());
    window.addEventListener('beforeunload', () => stopScanner());
  </script>
</body>
</html>
