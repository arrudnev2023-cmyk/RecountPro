<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>RecountPro — Пересчёт</title>

  <!-- ZXing -->
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    :root {
      --accent: #4361ee;
      --bg: #ffffff;
      --card: #ffffff;
      --muted: #666;
      --text: #333;
      --maxw: 980px;
      --border: #e0e0e0;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, system-ui, Arial, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    header {
      position: fixed;
      left: 0; right: 0; top: 0;
      padding: 12px;
      background-color: white;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      border-radius: 0 0 14px 14px;
    }
    header h1 {
      margin: 0;
      text-align: center;
      font-size: 1.15rem;
      color: var(--accent);
    }

    #search-wrap {
      max-width: var(--maxw);
      margin: 10px auto;
      position: relative;
    }
    #search {
      width: 100%;
      padding: 10px 56px 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background-color: white;
      color: var(--text);
      font-size: 15px;
    }
    #scan-btn,
    #clear-search {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
    }
    #clear-search { right: 44px; }

    #content {
      position: fixed;
      left: 0; right: 0;
      top: 96px; bottom: 0;
      overflow: auto;
      padding: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .card {
      max-width: var(--maxw);
      margin: 10px auto;
      padding: 12px;
      border-radius: 8px;
      background-color: var(--card);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .preview-wrap {
      border-radius: 8px;
      overflow: hidden;
      background-color: #f8f8f8;
      border: 1px solid var(--border);
      height: 34vh;
      min-height: 140px;
    }
    video#preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }
    .btn {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background-color: white;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn.primary {
      background-color: var(--accent);
      color: white;
      font-weight: 700;
    }

    .list {
      max-width: var(--maxw);
      margin: 12px auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background-color: var(--card);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-left: 4px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .item.match   { border-left-color: #22c55e; }
    .item.missing { border-left-color: #ef4444; }
    .item.excess  { border-left-color: #3b82f6; }

    .field { margin-bottom: 8px; }
    .label { font-weight: 700; color: var(--accent); margin-right: 6px; }

    input[data-code] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background-color: white;
      color: var(--text);
      font-size: 15px;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Кастомная клавиатура */
    #custom-keyboard {
      position: fixed;
      left: 0; right: 0;
      bottom: -40vh;
      height: 34vh;
      background-color: white;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      z-index: 3000;
      transition: bottom 0.28s ease;
      border-top: 1px solid var(--border);
      box-shadow: 0 -8px 30px rgba(0,0,0,0.12);
      touch-action: manipulation;
      display: none;
    }
    #custom-keyboard.show { display: grid; bottom: 0; }
    #custom-keyboard button {
      border: 1px solid var(--border);
      border-radius: 6px;
      background-color: white;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 12px 6px;
    }

    .hidden { display: none !important; }

    /* FAB меню */
    #fabMenu {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      z-index: 1001;
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 0.9rem 1.2rem;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(67,97,238,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #sheetOverlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 999;
    }
    #sheetOverlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    #bottomSheet {
      position: fixed;
      left: 0; right: 0;
      bottom: -60vh;
      padding: 1.2rem;
      background-color: white;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      transition: bottom 0.35s ease;
      z-index: 1002;
    }
    #bottomSheet.show { bottom: 0; }

    .sheet-content {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .sheet-btn {
      background-color: #f5f5f5;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.9rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Модалка итогов */
    #summaryModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 6000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #summaryModal.show { display: flex; }

    #summaryTable th, #summaryTable td {
      border: none;
      padding: 8px;
    }
    #summaryTable th {
      background-color: #f0f0f0;
      font-weight: 600;
    }

    /* Toast */
    .toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 18vh;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>

<body>
  <header>
    <h1>RecountPro — Пересчёт</h1>
    <div id="search-wrap">
      <input id="search" placeholder="Поиск по названию или коду..." autocomplete="off" />
      <button id="scan-btn" title="Открыть сканер">📷</button>
      <button id="clear-search" title="Очистить">×</button>
    </div>
  </header>

  <main id="content">
    <!-- Сканер -->
    <div class="card" id="scannerCard" style="display:none">
      <div class="preview-wrap">
        <video id="preview" playsinline muted></video>
      </div>
      <div class="controls">
        <select id="deviceSelect" class="btn" style="min-width:160px"></select>
        <button id="torchBtn" class="btn">🔦</button>
        <button id="closeScannerBtn" class="btn">Закрыть</button>
        <div id="scanResult" style="margin-left:auto;color:var(--muted)"></div>
      </div>
    </div>

    <!-- Список товаров -->
    <div id="list" class="list"></div>
  </main>

  <!-- Кастомная клавиатура -->
  <div id="custom-keyboard" aria-hidden="true">
    <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
    <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
    <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
    <button data-key="+">+</button><button data-key="0">0</button><button data-key="back">←</button>
    <button class="done" id="done" style="grid-column:1 / -1">Готово</button>
  </div>

  <!-- FAB меню -->
  <button id="fabMenu">☰</button>
  <div id="sheetOverlay"></div>
  <div id="bottomSheet">
    <div class="sheet-content">
      <button class="sheet-btn" id="saveBtn">💾 Сохранить</button>
      <button class="sheet-btn" id="clearBtn">🧹 Очистить пересчёт</button>
      <button class="sheet-btn" id="totalBtn">📊 Итог</button>
      <button class="sheet-btn" id="inventoryBtn">📋 Провести инвентаризацию</button>
    </div>
  </div>

  <!-- Модалка итогов -->
  <div id="summaryModal">
    <div style="background:white;padding:20px;border-radius:12px;max-width:90%;max-height:80%;overflow:auto;">
      <h3>Итоги инвентаризации</h3>
      <table id="summaryTable" style="width:100%;border-collapse:collapse;margin-top:10px;">
        <thead>
          <tr>
            <th style="text-align:left;">Товар</th>
            <th style="text-align:right;">Учётное</th>
            <th style="text-align:right;">Фактическое</th>
            <th style="text-align:right;">Разница</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button id="summarySaveBtn" class="btn primary" style="flex:1;">Сохранить в базу</button>
        <button id="summaryCloseBtn" class="btn" style="flex:1;">Закрыть</button>
      </div>
    </div>
  </div>

  <!-- ZXing fallback -->
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <script>
    /* ========= СТЕЙТ ========= */
    let barcodeDB = {};      // { [name]: [code1, code2...] }
    let quantities = {};     // { [name]: qty }
    let allItems = [];       // [{code,name,qty}]
    let sessionValues = {};  // { [code]: "выражение" }
    let codeToName = new Map();

    let displayedCodes = new Set(); // коды карточек, видимых на экране
    let inventoryMode = false; // true — показываем все товары

    let reader = null;
    let currentStream = null;
    let scanning = false;
    let lastDetected = { code: null, ts: 0 };
    const DEBOUNCE_MS = 700;

    /* ========= ЭЛЕМЕНТЫ ========= */
    const searchInput      = document.getElementById('search');
    const listContainer    = document.getElementById('list');

    const scannerCard      = document.getElementById('scannerCard');
    const previewVideo     = document.getElementById('preview');
    const deviceSelect     = document.getElementById('deviceSelect');
    const torchBtn         = document.getElementById('torchBtn');
    const closeScannerBtn  = document.getElementById('closeScannerBtn');
    const scanResult       = document.getElementById('scanResult');

    const fabMenu          = document.getElementById('fabMenu');
    const sheetOverlay     = document.getElementById('sheetOverlay');
    const bottomSheet      = document.getElementById('bottomSheet');

    const customKeyboard   = document.getElementById('custom-keyboard');

    const saveBtn          = document.getElementById('saveBtn');
    const clearBtn         = document.getElementById('clearBtn');
    const totalBtn         = document.getElementById('totalBtn');
    const inventoryBtn     = document.getElementById('inventoryBtn');

    const summaryModal     = document.getElementById('summaryModal');
    const summaryTableBody = document.querySelector('#summaryTable tbody');
    const summarySaveBtn   = document.getElementById('summarySaveBtn');
    const summaryCloseBtn  = document.getElementById('summaryCloseBtn');

    const scanBtn          = document.getElementById('scan-btn');
    const clearSearch      = document.getElementById('clear-search');

    /* ========= УТИЛИТЫ ========= */
    function evalExpression(expr) {
      if (!expr) return 0;
      const safe = String(expr).replace(/\s+/g, '');
      if (!/^[0-9+\-]+$/.test(safe)) return 0;
      try {
        const val = Function('return ' + safe)();
        return Number.isFinite(val) ? val : 0;
      } catch {
        return 0;
      }
    }

    /* ========= БАЗА / ИНДЕКС / СЕССИЯ ========= */
   function buildItemsFromDB() {
  allItems = [];
  codeToName = new Map();

  Object.entries(barcodeDB).forEach(([name, codes]) => {
    const qty = quantities[name] || 0;

    allItems.push({
      name,
      qty,
      codes: [...codes] // массив всех штрих‑кодов
    });

    codes.forEach(code => {
      codeToName.set(String(code), name);
    });
  });
}


    function loadDB() {
      try {
        const raw = localStorage.getItem('barcodeDB');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed.db && parsed.quantities) {
            barcodeDB = parsed.db;
            quantities = parsed.quantities;
          } else {
            barcodeDB = {};
            quantities = {};
            Object.entries(parsed).forEach(([code, data]) => {
              const name = data.name || data;
              if (!barcodeDB[name]) {
                barcodeDB[name] = [];
                quantities[name] = 0;
              }
              barcodeDB[name].push(code);
            });
          }
        } else {
          barcodeDB = {};
          quantities = {};
        }
      } catch (e) {
        console.error('Ошибка загрузки базы:', e);
        barcodeDB = {};
        quantities = {};
      }

      try {
        const rawSession = localStorage.getItem('recountSession');
        sessionValues = rawSession ? JSON.parse(rawSession) : {};
      } catch {
        sessionValues = {};
      }

      buildItemsFromDB();
    }

    function saveDB() {
      try {
        localStorage.setItem('barcodeDB', JSON.stringify({ db: barcodeDB, quantities: quantities }));
      } catch (e) {
        console.error('Ошибка сохранения базы:', e);
      }
    }

    function saveSession() {
      try {
        localStorage.setItem('recountSession', JSON.stringify(sessionValues));
      } catch (e) {
        console.error('Ошибка сохранения сессии:', e);
      }
    }

    /* ========= PERSISTENT APP STATE ========= */
    const APP_STATE_KEY = 'recountAppState';

    function saveAppState() {
      try {
        const visible = Array.from(displayedCodes);
        const contentEl = document.getElementById('content');
        const scrollTop = contentEl ? contentEl.scrollTop : 0;
        const focusedCode = customKeyboard?.dataset?.target || null;

        saveSession();

        const state = {
          visible,
          inventoryMode: !!inventoryMode,
          sessionValues,
          search: (searchInput?.value) || '',
          scrollTop,
          focusedCode
        };
        localStorage.setItem(APP_STATE_KEY, JSON.stringify(state));
      } catch (e) {
        console.error('Ошибка сохранения состояния приложения:', e);
      }
    }

    function loadAppState() {
      try {
        const raw = localStorage.getItem(APP_STATE_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);

        sessionValues = state.sessionValues || sessionValues || {};
        saveSession();

        inventoryMode = !!state.inventoryMode;
        displayedCodes = new Set((state.visible && Array.isArray(state.visible)) ? state.visible.map(String) : []);

        if (searchInput && typeof state.search === 'string') {
          searchInput.value = state.search;
        }

        buildItems();

        const contentEl = document.getElementById('content');
        if (contentEl && typeof state.scrollTop === 'number') {
          setTimeout(() => { contentEl.scrollTop = state.scrollTop; }, 80);
        }

        if (state.focusedCode) {
          setTimeout(() => {
            const input = document.querySelector(`input[data-code="${cssEscape(state.focusedCode)}"]`);
            if (input) {
              showCustomKeyboard(input);
              try { input.focus({ preventScroll: true }); } catch (e) { input.focus(); }
              ensureVisibleAboveKeyboard(input);
            }
          }, 160);
        }
      } catch (e) {
        console.error('Ошибка загрузки состояния приложения:', e);
      }
    }

    function clearAppState() {
      try {
        localStorage.removeItem(APP_STATE_KEY);
      } catch (e) {
        console.error('Ошибка удаления состояния приложения:', e);
      }
    }

    /* ========= РЕНДЕР ========= */
    function showEmptyState() {
      listContainer.innerHTML = `
        <div style="text-align:center;padding:40px;color:var(--muted);">
          <h3>Список пуст</h3>
          <p>Нажмите "Провести инвентаризацию" чтобы загрузить все товары или отсканируйте штрихкод, чтобы добавить карточку.</p>
        </div>
      `;
    }

    function renderItemsByCodes(codes) {
  const names = new Set();

  codes.forEach(code => {
    const name = codeToName.get(String(code));
    if (name) names.add(name);
  });

  const items = allItems.filter(item => names.has(item.name));
  renderItems(items);
}


    function renderItems(items) {
  listContainer.innerHTML = '';
  if (!items || items.length === 0) {
    showEmptyState();
    return;
  }

  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'item';
    el.dataset.name = item.name;

    const expected = item.qty;

    // считаем фактическое по всем штрих‑кодам
    let actual = 0;
    item.codes.forEach(code => {
      const expr = sessionValues[code] || '';
      actual += evalExpression(expr);
    });

    if (actual === expected) el.classList.add('match');
    else if (actual < expected) el.classList.add('missing');
    else el.classList.add('excess');

    el.innerHTML = `
      <div class="field">
        <span class="label">Название:</span>
        <strong>${escapeHtml(item.name)}</strong>
      </div>

      <div class="field">
        <span class="label">Штрихкоды:</span>
        <span>${item.codes.map(c => escapeHtml(String(c))).join(', ')}</span>
      </div>

      <div class="field">
        <span class="label">Учётное:</span>
        ${expected}
      </div>

      <div class="field">
        <span class="label">Кол-во:</span>
        <input data-name="${escapeHtml(item.name)}" type="text" value="${actual}" readonly>
      </div>
    `;

    const input = el.querySelector('input');

    input.addEventListener('pointerdown', ev => {
      ev.preventDefault();
      try { input.focus({ preventScroll: true }); } catch (e) { input.focus(); }
      showCustomKeyboard(input);

      setTimeout(() => {
        const container = document.getElementById('content') || document.documentElement;
        const rect = el.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect ? container.getBoundingClientRect() : { top: 0 };
        const offsetTop = (rect.top - containerRect.top) + container.scrollTop;
        container.scrollTo({ top: Math.max(0, offsetTop - 8), behavior: 'smooth' });
        setTimeout(() => ensureVisibleAboveKeyboard(input), 160);
      }, 80);
    });

    el.addEventListener('click', () => {
      try { input.focus({ preventScroll: true }); } catch (e) { input.focus(); }
      showCustomKeyboard(input);
    });

    listContainer.appendChild(el);
  });
}


    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    /* ========= ЛОГИКА ОТОБРАЖЕНИЯ ========= */
    function buildItems() {
      if (inventoryMode) {
        displayedCodes = new Set(allItems.map(i => String(i.code)));
        renderItems(allItems);
        return;
      }

      if (displayedCodes.size === 0) {
        showEmptyState();
        return;
      }

      renderItemsByCodes(displayedCodes);
    }

    /* ========= КЛАВИАТУРА ========= */
    function showCustomKeyboard(input) {
      if (!customKeyboard || !input) return;
      customKeyboard.style.display = '';
      customKeyboard.classList.add('show');
      customKeyboard.dataset.target = input.dataset.code;
      customKeyboard.setAttribute('aria-hidden', 'false');
    }

    function hideCustomKeyboard() {
      if (!customKeyboard) return;
      customKeyboard.classList.remove('show');
      customKeyboard.style.display = 'none';
      customKeyboard.setAttribute('aria-hidden', 'true');
      delete customKeyboard.dataset.target;
    }

    function updateItemVisual(code) {
      const el = document.querySelector(`.item[data-code="${cssEscape(code)}"]`);
      if (!el) return;
      const expr = sessionValues[code] || '';
      const actual = evalExpression(expr);
      const name = el.dataset.name;
      const expected = quantities[name] || 0;

      const input = el.querySelector('input[data-code]');
      if (input) input.value = expr;

      el.classList.remove('match', 'missing', 'excess');
      if (expr) {
        if (actual === expected) el.classList.add('match');
        else if (actual < expected) el.classList.add('missing');
        else el.classList.add('excess');
      }
    }

    function initCustomKeyboard() {
      if (!customKeyboard) return;
      const keys = customKeyboard.querySelectorAll('button:not(.done)');
      keys.forEach(key => {
        key.addEventListener('pointerdown', (ev) => {
          ev.preventDefault();
          const targetCode = customKeyboard.dataset.target;
          if (!targetCode) return;
          const input = document.querySelector(`input[data-code="${cssEscape(targetCode)}"]`);
          if (!input) return;

          let currentValue = input.value || '';
          const keyValue = key.dataset.key || key.textContent;

          if (keyValue === 'back' || keyValue === '←') {
            currentValue = currentValue.slice(0, -1);
          } else {
            currentValue = currentValue + keyValue;
          }

          sessionValues[targetCode] = currentValue;
          saveSession();
          saveAppState();
          input.value = currentValue;
          updateItemVisual(targetCode);

          setTimeout(() => ensureVisibleAboveKeyboard(input), 0);
        }, { passive: false });
      });

      const doneBtn = document.getElementById('done');
      if (doneBtn) doneBtn.addEventListener('pointerdown', (ev) => {
        ev.preventDefault();
        const targetCode = customKeyboard.dataset.target;
        hideCustomKeyboard();
        const input = document.querySelector(`input[data-code="${cssEscape(targetCode)}"]`);
        try { input?.blur(); } catch (e) {}
      }, { passive: false });
    }

    // Dismiss keyboard when tapping outside (pointerdown) — reliable on touch and mouse
    function setupKeyboardDismiss() {
      document.addEventListener('pointerdown', (e) => {
        if (!customKeyboard || !customKeyboard.classList.contains('show')) return;
        // if click inside keyboard — keep open
        if (customKeyboard.contains(e.target)) return;
        // if click on an input — keep open (handled by input pointerdown)
        if (e.target.closest && e.target.closest('input[data-code]')) return;
        // otherwise hide
        hideCustomKeyboard();
      }, { capture: true });
      // also hide on scroll start (user likely wants to scroll)
      let scrollTimeout = null;
      document.getElementById('content').addEventListener('scroll', () => {
        if (!customKeyboard || !customKeyboard.classList.contains('show')) return;
        hideCustomKeyboard();
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {}, 200);
      }, { passive: true });
    }
    setupKeyboardDismiss();

    /* ========= СКАНЕР ========= */
    function createCanvas(w, h) {
      const c = document.createElement('canvas');
      c.width = w;
      c.height = h;
      return c;
    }

    function toGrayscale(ctx, w, h) {
      try {
        const img = ctx.getImageData(0, 0, w, h);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const v = (d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114) | 0;
          d[i] = d[i + 1] = d[i + 2] = v;
        }
        ctx.putImageData(img, 0, 0);
      } catch (e) {}
    }

    function increaseContrast(ctx, w, h, contrast = 30) {
      try {
        const img = ctx.getImageData(0, 0, w, h);
        const d = img.data;
        const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
        for (let i = 0; i < d.length; i += 4) {
          for (let c = 0; c < 3; c++) {
            let col = d[i + c];
            col = factor * (col - 128) + 128;
            d[i + c] = Math.max(0, Math.min(255, col));
          }
        }
        ctx.putImageData(img, 0, 0);
      } catch (e) {}
    }

    async function tryDecodeCanvas(canvas) {
      if ('BarcodeDetector' in window) {
        try {
          const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
          const det = new BarcodeDetector({formats: ["ean_13","ean_8","code_128","code_39","upc_a","upc_e","itf"]});
          const res = await det.detect(imageData);
          if (res && res.length) return res[0].rawValue;
        } catch (e) {}
      }

      try {
        const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
        const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
        const result = new ZXing.MultiFormatReader().decode(binaryBitmap);
        if (result && result.text) return result.text;
      } catch (e) {}

      const w = canvas.width;
      const h = canvas.height;
      const temp = createCanvas(w, h);
      const tctx = temp.getContext('2d');

      for (let angle of [90, 180, 270]) {
        tctx.clearRect(0, 0, w, h);
        tctx.save();
        tctx.translate(w / 2, h / 2);
        tctx.rotate(angle * Math.PI / 180);
        tctx.drawImage(canvas, -w / 2, -h / 2);
        tctx.restore();

        try {
          const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(temp);
          const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
          const result = new ZXing.MultiFormatReader().decode(binaryBitmap);
          if (result && result.text) return result.text;
        } catch (e) {}
      }
      return null;
    }

    let canvasPool = [];
    function getCanvas(w, h) {
      for (let c of canvasPool) if (c.width === w && c.height === h) return c;
      const c = createCanvas(w, h);
      canvasPool.push(c);
      return c;
    }

    let _scanRaf = null;
    let _lastScanTs = 0;
    const SCAN_MIN_INTERVAL = 80; // ms

    async function scanLoop() {
      if (!scanning) return;
      const now = performance.now();
      if (now - _lastScanTs < SCAN_MIN_INTERVAL) {
        _scanRaf = requestAnimationFrame(scanLoop);
        return;
      }
      _lastScanTs = now;

      try {
        const w = previewVideo.videoWidth;
        const h = previewVideo.videoHeight;
        if (w === 0 || h === 0) {
          _scanRaf = requestAnimationFrame(scanLoop);
          return;
        }

        const canvas = getCanvas(w, h);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(previewVideo, 0, 0, w, h);

        const scale = Math.max(1, Math.floor(Math.max(w, h) / 900));
        const sw = Math.floor(w / scale);
        const sh = Math.floor(h / scale);
        const small = getCanvas(sw, sh);
        const sctx = small.getContext('2d');
        sctx.drawImage(canvas, 0, 0, w, h, 0, 0, sw, sh);
        toGrayscale(sctx, sw, sh);
        increaseContrast(sctx, sw, sh, 30);

        const code = await tryDecodeCanvas(small);
        if (code) handleDetected(code);
      } catch (e) {
        // ignore
      } finally {
        _scanRaf = requestAnimationFrame(scanLoop);
      }
    }

    function handleDetected(code) {
      const now = Date.now();
      if (code === lastDetected.code && (now - lastDetected.ts) < DEBOUNCE_MS) return;
      lastDetected = { code, ts: now };
      try { navigator.vibrate?.(40); } catch (e) {}

      scanResult.textContent = `Найден: ${code}`;

      const name = codeToName.get(String(code));
      if (name) {
        // Добавляем карточку этого товара в отображаемые (если ещё нет)
        if (!displayedCodes.has(String(code))) {
          displayedCodes.add(String(code));
          saveAppState(); // сохраняем состояние при добавлении новой карточки
        }
        searchInput.value = name;
        filterItems();
        highlightScannedItemByCode(code);

        // Открываем клавиатуру для этой карточки
        setTimeout(() => {
          const target = document.querySelector(`.item[data-code="${cssEscape(code)}"]`);
          if (target) {
            const input = target.querySelector('input[data-code]');
            if (input) {
              input.scrollIntoView({ behavior: 'smooth', block: 'center' });
              showCustomKeyboard(input);
              try { input.focus({ preventScroll: true }); } catch (e) { try { input.focus(); } catch (e) {} }
              setTimeout(() => ensureVisibleAboveKeyboard(input), 160);
            }
          }

          // Закрываем сканер через короткую паузу
          setTimeout(() => {
            try { stopScanner(); } catch (e) { console.warn('stopScanner error', e); }
            scannerCard.style.display = 'none';
          }, 400);
        }, 120);
      } else {
        showToast('Штрихкод не найден в базе');
      }
    }

    /* Start/stop camera */
    async function startCamera(deviceId) {
      try {
        stopScanner();
        scanning = true;
        const constraints = deviceId ? {
          video: { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: { ideal: "environment" } },
          audio: false
        } : { video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };

        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        previewVideo.srcObject = currentStream;
        await previewVideo.play().catch(()=>{});
        try { reader = new ZXing.BrowserMultiFormatReader(); } catch (e) { reader = null; }
        lastDetected = { code: null, ts: 0 };
        _scanRaf = requestAnimationFrame(scanLoop);
      } catch (e) {
        console.warn('startCamera fallback, trying without deviceId:', e);
        try {
          const fallback = { video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } } };
          currentStream = await navigator.mediaDevices.getUserMedia(fallback);
          previewVideo.srcObject = currentStream;
          await previewVideo.play().catch(()=>{});
          try { reader = new ZXing.BrowserMultiFormatReader(); } catch (e) { reader = null; }
          lastDetected = { code: null, ts: 0 };
          _scanRaf = requestAnimationFrame(scanLoop);
        } catch (err) {
          console.error('Ошибка доступа к камере:', err);
          alert('Ошибка доступа к камере');
          scanning = false;
        }
      }
    }

    function stopScanner() {
      scanning = false;
      if (_scanRaf) {
        cancelAnimationFrame(_scanRaf);
        _scanRaf = null;
      }
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        currentStream = null;
      }
      if (reader) {
        try { reader.reset(); } catch (e) {}
        reader = null;
      }
      previewVideo.srcObject = null;
      scanResult.textContent = '';
    }

    /* ========= ПОИСК / ХАЙЛАЙТ ========= */
    function filterItems() {
      const q = (searchInput.value || '').toLowerCase().trim();

      if (inventoryMode) {
        const filtered = allItems.filter(item =>
          item.name.toLowerCase().includes(q) ||
          String(item.code).includes(q)
        );
        renderItems(filtered);
        return;
      }

      const filtered = [];
      for (let code of displayedCodes) {
        const name = codeToName.get(String(code));
        if (!name) continue;
        if (!q || name.toLowerCase().includes(q) || String(code).includes(q)) {
          const qty = quantities[name] || 0;
          filtered.push({ code, name, qty });
        }
      }

      renderItems(filtered);
    }

    function highlightScannedItemByCode(code) {
      document.querySelectorAll('.item').forEach(el => el.style.boxShadow = '');
      const target = document.querySelector(`.item[data-code="${cssEscape(code)}"]`);
      if (target) {
        target.style.boxShadow = '0 0 0 2px rgba(67,97,238,0.45)';
        const container = document.getElementById('content') || document.documentElement;
        const rect = target.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect ? container.getBoundingClientRect() : { top: 0 };
        const offsetTop = (rect.top - containerRect.top) + container.scrollTop;
        container.scrollTo({ top: Math.max(0, offsetTop - 8), behavior: 'smooth' });
        setTimeout(() => { target.style.boxShadow = ''; }, 1200);
      }
    }

    /* ========= ВСПОМОГАТЕЛЬНЫЕ ========= */
    function ensureVisibleAboveKeyboard(input) {
      if (!input) return;
      const kb = document.getElementById('custom-keyboard');
      const kbHeight = (kb && kb.classList.contains('show')) ? kb.getBoundingClientRect().height : 0;
      const fieldRect = input.getBoundingClientRect();
      const viewportHeight = window.innerHeight;
      const safeMargin = 12;
      const bottomOverlap = (fieldRect.bottom + safeMargin) - (viewportHeight - kbHeight);
      if (bottomOverlap > 0) {
        const currentScroll = window.scrollY || document.documentElement.scrollTop;
        const scrollBy = bottomOverlap + 40;
        window.scrollTo({ top: currentScroll + scrollBy, behavior: 'smooth' });
      } else {
        const topGap = fieldRect.top - safeMargin;
        if (topGap < 60) {
          const currentScroll = window.scrollY || document.documentElement.scrollTop;
          window.scrollTo({ top: Math.max(0, currentScroll - (60 - topGap)), behavior: 'smooth' });
        }
      }
    }

    /* ========= ИНВЕНТАРИЗАЦИЯ / СОХРАНЕНИЕ ========= */
    function startInventory() {
      inventoryMode = true;
      displayedCodes = new Set(allItems.map(i => String(i.code)));
      allItems.forEach(item => {
        if (sessionValues[item.code] === undefined) sessionValues[item.code] = '';
      });
      saveSession();
      saveAppState();
      buildItems();
      alert('Режим инвентаризации активирован. Ввод сохраняется в сессии и не меняет базу до сохранения.');
    }

    function clearInventory() {
      // При нажатии "Очистить пересчёт" экран возвращается в состояние первого захода
      sessionValues = {};
      saveSession();
      clearAppState();
      displayedCodes.clear();
      inventoryMode = false;
      buildItems();
      alert('Пересчёт очищен.');
    }

    function applySessionToDB() {
      const aggregated = {};
      allItems.forEach(item => {
        const expr = sessionValues[item.code] || '';
        const val  = evalExpression(expr);
        const name = item.name;
        if (!aggregated[name]) aggregated[name] = 0;
        aggregated[name] += val;
      });

      Object.keys(aggregated).forEach(name => {
        quantities[name] = aggregated[name];
      });

      saveDB();
      buildItemsFromDB();
      buildItems();
      saveAppState();
    }

    function applySessionToDBForDisplayed() {
      const aggregated = {};
      for (let code of displayedCodes) {
        const expr = sessionValues[code] || '';
        const val = evalExpression(expr);
        const name = codeToName.get(String(code));
        if (!name) continue;
        if (!aggregated[name]) aggregated[name] = 0;
        aggregated[name] += val;
      }

      Object.keys(aggregated).forEach(name => {
        quantities[name] = aggregated[name];
      });

      saveDB();
      buildItemsFromDB();
      buildItems();
      saveAppState();
    }

    /* ========= ИТОГИ ========= */
    function openSummary() {
      summaryTableBody.innerHTML = '';
      const summary = {};
      const sourceCodes = inventoryMode ? allItems.map(i => i.code) : Array.from(displayedCodes);
      sourceCodes.forEach(code => {
        const name = codeToName.get(String(code));
        if (!name) return;
        const expected = quantities[name] || 0;
        const expr = sessionValues[code] || '';
        const val  = evalExpression(expr);
        if (!summary[name]) summary[name] = { expected, actual: 0 };
        summary[name].actual += val;
      });

      Object.entries(summary).forEach(([name, data]) => {
        const diff = data.actual - data.expected;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="text-align:left;">${escapeHtml(name)}</td>
          <td style="text-align:right;">${data.expected}</td>
          <td style="text-align:right;">${data.actual}</td>
          <td style="text-align:right;">${diff}</td>
        `;
        summaryTableBody.appendChild(tr);
      });

      summaryModal.classList.add('show');
    }

    function closeSummary() {
      summaryModal.classList.remove('show');
    }

    /* ========= ТОАСТ ========= */
    let _toastTimer = null;
    function showToast(message) {
      let toast = document.querySelector(".toast");
      if (!toast) {
        toast = document.createElement("div");
        toast.className = "toast";
        document.body.appendChild(toast);
      }

      toast.textContent = message;
      toast.classList.add('show');

      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 1800);
    }

    /* ========= HELPERS ========= */
    function cssEscape(str) {
      return CSS.escape ? CSS.escape(String(str)) : String(str).replace(/([^\w-])/g, '\\$1');
    }

    /* ========= INIT ========= */
    document.addEventListener('DOMContentLoaded', async () => {
      loadDB();
      // попытка восстановить состояние приложения
      loadAppState();

      // стартовое состояние: если loadAppState не установил видимые — экран пустой
      if (!displayedCodes) displayedCodes = new Set();
      if (typeof inventoryMode !== 'boolean') inventoryMode = false;
      buildItems();
      initCustomKeyboard();

      scanBtn.addEventListener('click', () => {
        scannerCard.style.display = 'block';
        (async () => {
          try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            if (videoDevices.length === 0) {
              alert('Камеры не найдены');
              return;
            }
            let backCam = videoDevices.find(d => {
              const label = (d.label || '').toLowerCase();
              return label.includes('back') || label.includes('rear') || label.includes('зад') || label.includes('environment');
            });
            const defaultCamId = (backCam || videoDevices[0]).deviceId;
            deviceSelect.innerHTML = videoDevices.map(d => `<option value="${d.deviceId}">${d.label || 'Камера'}</option>`).join('');
            deviceSelect.value = defaultCamId;
            await startCamera(defaultCamId);
          } catch (e) {
            console.error('init scanner error', e);
            alert('Не удалось инициализировать сканер');
          }
        })();
      });

      closeScannerBtn.addEventListener('click', () => {
        stopScanner();
        scannerCard.style.display = 'none';
      });

      deviceSelect.addEventListener('change', e => {
        startCamera(e.target.value);
      });

      torchBtn.addEventListener('click', () => {
        try {
          const tracks = currentStream?.getVideoTracks();
          if (tracks && tracks.length > 0) {
            const track = tracks[0];
            const capabilities = track.getCapabilities?.();
            if (capabilities?.torch) {
              const current = track.getSettings().torch;
              track.applyConstraints({ advanced: [{ torch: !current }] });
            } else {
              showToast('Фонарик не поддерживается');
            }
          }
        } catch (e) {
          console.error('Torch error', e);
          showToast('Ошибка управления фонариком');
        }
      });

      clearSearch.addEventListener('click', () => {
        searchInput.value = '';
        filterItems();
        saveAppState();
      });

      searchInput.addEventListener('input', () => {
        filterItems();
        saveAppState();
      });

      fabMenu.addEventListener('click', () => {
        bottomSheet.classList.toggle('show');
        sheetOverlay.classList.toggle('show');
      });

      sheetOverlay.addEventListener('click', () => {
        bottomSheet.classList.remove('show');
        sheetOverlay.classList.remove('show');
      });

      inventoryBtn.addEventListener('click', () => {
        startInventory();
        bottomSheet.classList.remove('show');
        sheetOverlay.classList.remove('show');
      });

      clearBtn.addEventListener('click', () => {
        clearInventory();
        bottomSheet.classList.remove('show');
        sheetOverlay.classList.remove('show');
      });

      totalBtn.addEventListener('click', () => {
        openSummary();
        bottomSheet.classList.remove('show');
        sheetOverlay.classList.remove('show');
      });

      saveBtn.addEventListener('click', () => {
        if (inventoryMode) {
          applySessionToDB();
        } else {
          applySessionToDBForDisplayed();
        }
        buildItems();
        showToast('Остатки обновлены в базе товаров.');
        bottomSheet.classList.remove('show');
        sheetOverlay.classList.remove('show');
      });

      summaryCloseBtn.addEventListener('click', closeSummary);

      summarySaveBtn.addEventListener('click', () => {
        if (inventoryMode) applySessionToDB();
        else applySessionToDBForDisplayed();
        buildItems();
        closeSummary();
        showToast('Итоги сохранены в базу.');
      });

      // Попытка "разогреть" разрешения, чтобы метки камер появились
      try { await navigator.mediaDevices.getUserMedia({ video: true }); } catch (e) {}

      // Остановим камеру при уходе со страницы, но сохраним состояние экрана
      window.addEventListener('pagehide', () => { saveAppState(); stopScanner(); });
      window.addEventListener('beforeunload', () => { saveAppState(); stopScanner(); });

      // Accessibility: close keyboard/modal on Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (customKeyboard && customKeyboard.classList.contains('show')) hideCustomKeyboard();
          if (summaryModal && summaryModal.classList.contains('show')) closeSummary();
          if (bottomSheet && bottomSheet.classList.contains('show')) {
            bottomSheet.classList.remove('show');
            sheetOverlay.classList.remove('show');
          }
        }
      });
    });
  </script>
</body>
</html>
