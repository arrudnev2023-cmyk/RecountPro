<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>RecountPro — Пересчёт</title>

  <!-- ZXing -->
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>


  <style>
    :root{
      --accent:#6d28d9;
      --accent-light:#a78bfa;
      --bg:#000;
      --card:#111;
      --muted:#9aa3b2;
      --text:#e6eef8;
      --radius:12px;
      --maxw:980px;
      --card-bg: linear-gradient(135deg,#1e1e2f,#2a2a40);
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#05030a,#0b0710);color:var(--text);font-family:Inter,Segoe UI,system-ui,Arial;overflow:hidden; touch-action: manipulation;}
    /* prevent double-tap zoom */
    html,body,button,input,select,textarea{ -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
    #bg{position:fixed;inset:0;z-index:-1;background:#000}
    header{position:fixed;left:0;right:0;top:0;padding:12px;background:rgba(10,10,12,0.7);backdrop-filter:blur(8px);z-index:1000;border-radius:0 0 14px 14px}
    header h1{margin:0;text-align:center;font-size:1.15rem}
    #search-wrap{max-width:var(--maxw);margin:10px auto;position:relative}
    #search{width:100%;padding:10px 56px 10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:rgba(20,20,24,0.6);color:var(--text);font-size:15px}
    #scan-btn{position:absolute;right:44px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer}
    #clear-search{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer}
    #content{position:fixed;left:0;right:0;top:96px;bottom:0;overflow:auto;padding:12px;box-sizing:border-box}
    .card{max-width:var(--maxw);margin:10px auto;padding:12px;border-radius:12px;background:linear-gradient(135deg,#121018,#1b1724);box-shadow:0 10px 30px rgba(0,0,0,0.6)}
    .preview-wrap{border-radius:10px;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,0.03)}
    .preview-wrap.camera-1-3{height:34vh;min-height:140px}
    video#preview{width:100%;height:100%;object-fit:cover;display:block}
    .controls{display:flex;gap:8px;align-items:center;margin-top:10px}
    .btn{padding:8px 10px;border-radius:8px;border:none;cursor:pointer;background:#222;color:var(--text)}
    .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-light));color:#07060b;font-weight:700}
    .list{max-width:var(--maxw);margin:12px auto;display:flex;flex-direction:column;gap:8px}

    /* === Card design restored to original but full width === */
    .item{
      width:100%;
      margin:10px 0;
      padding:12px;
      border-radius:12px;
      background:var(--card-bg);
      box-shadow:0 8px 30px rgba(0,0,0,0.6);
      border-left:6px solid transparent;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .item.match{border-left-color:#22c55e}
    .item.missing{border-left-color:#ef4444}
    .item.excess{border-left-color:#3b82f6}
    .item.found{box-shadow:0 18px 50px rgba(106,17,203,0.18);transform:translateY(-6px)}
    .field{margin-bottom:8px}
    .label{font-weight:700;color:#dbeafe;margin-right:6px}
    input[data-code]{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:#fff;color:#000;font-size:15px}

    /* keyboard */
    #custom-keyboard{position:fixed;left:0;right:0;bottom:-40vh;height:34vh;background:#0b0b0d;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;z-index:3000;transition:bottom .28s}
    #custom-keyboard.show{bottom:0}
    #custom-keyboard button{border:none;border-radius:8px;background:#222;color:#fff;font-size:20px;cursor:pointer}
    .hidden{display:none!important}
    @media(min-width:900px){#content{padding-left:24px;padding-right:24px}}

    /* === FAB кнопка меню (в стиле твоего примера) === */
#fabMenu{
  position:fixed;
  bottom:1rem;
  right:1rem;
  z-index:1001;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color:#fff;
  border:none;
  padding:0.9rem 1.2rem;
  border-radius:14px;
  font-size:1.2rem;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,0.35), 0 0 12px rgba(106,17,203,0.6);
  transition:all .3s ease;
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
}

#fabMenu:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 10px 28px rgba(0,0,0,0.5), 0 0 18px rgba(37,117,252,0.8);
}

#fabMenu:active{
  transform:scale(0.96);
  box-shadow:inset 0 3px 8px rgba(0,0,0,0.6);
}

/* === Затемнение фона === */
#sheetOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(4px);
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
  z-index:999;
}

#sheetOverlay.show{
  opacity:1;
  pointer-events:auto;
}

/* === Bottom Sheet (в стиле твоего меню) === */
#bottomSheet{
  position:fixed;
  left:0;
  right:0;
  bottom:-60vh;
  padding:1.2rem;
  background:rgba(20,20,20,0.7);
  backdrop-filter:blur(12px) saturate(180%);
  border-radius:20px 20px 0 0;
  box-shadow:0 -12px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
  transition:bottom .35s ease;
  z-index:1002;
  animation:fadeIn .35s ease;
}

#bottomSheet.show{
  bottom:0;
}

/* Контейнер кнопок */
.sheet-content{
  display:flex;
  flex-direction:column;
  gap:0.7rem;
}

/* Кнопки внутри меню */
.sheet-btn{
  background:linear-gradient(145deg, #1f1f1f, #2c2c2c);
  color:#f9f9f9;
  border:none;
  padding:0.9rem 1rem;
  border-radius:12px;
  font-size:1rem;
  font-weight:500;
  cursor:pointer;
  transition:all .25s ease;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08), 0 6px 14px rgba(0,0,0,0.4);
  letter-spacing:0.3px;
  display:flex;
  align-items:center;
  gap:10px;
}

.sheet-btn:hover{
  background:linear-gradient(145deg, #2c2c2c, #3a3a3a);
  transform:translateX(-3px);
  box-shadow:0 8px 20px rgba(0,0,0,0.6), 0 0 10px rgba(255,255,255,0.15);
}

.sheet-btn:active{
  transform:scale(0.97);
  box-shadow:inset 0 3px 8px rgba(0,0,0,0.6);
}

/* Анимация */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(12px) scale(0.95);}
  to{opacity:1; transform:translateY(0) scale(1);}
}

  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <header>
    <h1>RecountPro — Пересчёт</h1>
    <div id="search-wrap">
      <input id="search" placeholder="Поиск по названию или коду..." autocomplete="off" />
      <button id="scan-btn" title="Открыть сканер">📷</button>
      <button id="clear-search" title="Очистить">×</button>
    </div>
  </header>

  <main id="content">
    <!-- Scanner card -->
    <div class="card" id="scannerCard" style="display:none">
      <div class="preview-wrap camera-1-3" id="previewWrap"><video id="preview" playsinline muted></video></div>
      <div class="controls">
        <select id="deviceSelect" class="btn" style="min-width:160px"></select>
        <button id="torchBtn" class="btn">🔦</button>
        <button id="closeScannerBtn" class="btn">Закрыть</button>
        <div id="scanResult" style="margin-left:auto;color:var(--muted)"></div>
      </div>
    </div>

    <!-- Items list -->
    <div id="list" class="list"></div>
  </main>

  <!-- Custom keyboard -->
  <div id="custom-keyboard" aria-hidden="true">
    <button>1</button><button>2</button><button>3</button>
    <button>4</button><button>5</button><button>6</button>
    <button>7</button><button>8</button><button>9</button>
    <button>+</button><button>0</button><button id="back">←</button>
    <button class="done" id="done" style="grid-column:1 / -1">Готово</button>
  </div>

  <button id="fabMenu">☰</button>

<div id="sheetOverlay"></div>

<div id="bottomSheet">
  <div class="sheet-content">
    <button class="sheet-btn" id="saveBtn">💾 Сохранить</button>
    <button class="sheet-btn" id="clearBtn">🧹 Очистить пересчёт</button>
    <button class="sheet-btn" id="totalBtn">📊 Итог</button>
    <button class="sheet-btn" id="codesBtn">🔍 База штрих‑кодов</button>
  </div>
</div>
<script>
/* =========================
   State and elements
   ========================= */
let db = JSON.parse(localStorage.getItem('barcodeDB') || '{}'); // real DB from Scaner.html
let barcodeDB = db; // alias
let allItems = [];
let sessionValues = {};
let activeInput = null;

/* Scanner state */
let stream = null;
let currentDeviceId = null;
let scanning = false;
let detector = ('BarcodeDetector' in window) ? new BarcodeDetector({formats: ["ean_13","ean_8","code_128","code_39","upc_a","upc_e","itf"]}) : null;
let reader = null; // ZXing reader instance
let lastDetected = {code:null, ts:0};
const DEBOUNCE_MS = 900;

/* Canvas pool for decoding */
let canvasPool = [];
let scanLoopRunning = false;

/* Elements */
const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');
const scanBtn = document.getElementById('scan-btn');
const clearSearchBtn = document.getElementById('clear-search');

const scannerCard = document.getElementById('scannerCard');
const preview = document.getElementById('preview');
const previewWrap = document.getElementById('previewWrap');
const deviceSelect = document.getElementById('deviceSelect');
const closeScannerBtn = document.getElementById('closeScannerBtn');
const torchBtn = document.getElementById('torchBtn');
const scanResult = document.getElementById('scanResult');

const keyboard = document.getElementById('custom-keyboard');

/* =========================
   Utilities
   ========================= */
function showToast(text, ms = 1200){
  scanResult.innerText = text;
  setTimeout(()=>{ if(scanResult.innerText === text) scanResult.innerText = ''; }, ms);
}
function saveDB(){ localStorage.setItem('barcodeDB', JSON.stringify(barcodeDB)); }
function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* =========================
   Load DB and build items
   ========================= */
/* =========================
   Load DB
   ========================= */
function loadBarcodeDB() {
  try {
    const raw = localStorage.getItem('barcodeDB');
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        barcodeDB = parsed;
        db = barcodeDB;
        return;
      }
    }
  } catch (e) {}

  // fallback sample if none
  barcodeDB = {
    "4601234000011": { code: "4601234000011", name: "Молоко 1л", unit: "шт", price: 59.90 },
    "4601234000028": { code: "4601234000028", name: "Хлеб ржаной", unit: "шт", price: 35.00 },
    "4601234000035": { code: "4601234000035", name: "Яблоки кг", unit: "кг", price: 120.00 },
    "4601234000042": { code: "4601234000042", name: "Сыр 200г", unit: "шт", price: 250.00 },
    "4601234000059": { code: "4601234000059", name: "Кофе 250г", unit: "шт", price: 499.00 }
  };

  db = barcodeDB;
  saveDB();
}

/* =========================
   Build items list from BOTH databases
   ========================= */
function buildAllItemsFromDB() {
  allItems = [];

  // 1. Товары из основной базы
  for (const code in barcodeDB) {
    const b = barcodeDB[code];
    allItems.push({
      code,
      name: b.name || "",
      unit: b.unit || "",
      price: b.price || 0,
      docQty: 0
    });
  }

  // 2. Товары, которых нет в barcodeDB, но есть в barcodeCodes
  for (const code in barcodeCodes) {
    if (!barcodeDB[code]) {
      allItems.push({
        code,
        name: barcodeCodes[code] || "",
        unit: "",
        price: 0,
        docQty: 0
      });
    }
  }
}

/* =========================
   Render UI (title first, then barcode)
   ========================= */
function render(items) {
  listEl.innerHTML = '';

  // Если список пустой — показываем подсказку
  if (!items.length) {
    listEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)">Отсканируйте первый товар</div>';
    return;
  }

  items.forEach(item => {
    // Берём название из базы штрих‑кодов (db), если есть, иначе — «Товар [код]»
    const nameFromDB = db[item.code]?.name;
    const displayName = nameFromDB || `Товар ${item.code}`;

    // Берём единицу измерения из базы, если есть
    const unitFromDB = db[item.code]?.unit || '';

    // Берём цену из базы, если есть
    const priceFromDB = db[item.code]?.price || 0;

    const value =
      sessionValues[item.code] ||
      localStorage.getItem('qty_' + item.code) ||
      '';

    const div = document.createElement('div');
    div.className = 'item';
    div.dataset.code = item.code;

    div.innerHTML = `
      <div class="field">
        <span class="label">Название:</span> ${escapeHtml(displayName)}
      </div>

      <div class="field">
        <span class="label">Артикул:</span> ${item.code}
      </div>

      ${unitFromDB ? `
      <div class="field">
        <span class="label">Ед. изм.:</span> ${escapeHtml(unitFromDB)}
      </div>` : ''}

      ${priceFromDB ? `
      <div class="field">
        <span class="label">Цена:</span> ${priceFromDB.toFixed(2)} руб.
      </div>` : ''}

      <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
        <div style="flex:1">
          <input
            type="text"
            data-code="${item.code}"
            value="${value}"
            inputmode="none"
            readonly
          />
        </div>

        <div style="min-width:70px;text-align:right;color:var(--muted)">
          ${item.docQty} шт
        </div>
      </div>`;

    // Логика раскраски карточек (как у вас было)
    let actual = 0;
    try {
      actual = Function("return " + (value || "0").replace(/,/g, '.'))() || 0;
    } catch {}

    if (actual === item.docQty) div.classList.add('match');
    else if (actual < item.docQty) div.classList.add('missing');
    else if (actual > item.docQty) div.classList.add('excess');

    listEl.appendChild(div);
  });

  attachInputHandlers();
}



function addItemToScanList(code) {
  const existingIndex = allItems.findIndex(item => item.code === code);
  if (existingIndex !== -1) {
    const card = document.querySelector(`.item[data-code="${code}"]`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.classList.add('found');
      setTimeout(() => card.classList.remove('found'), 2200);
    }
    return;
  }

  let name = db[code]?.name || `Товар ${code}`;
  let unit = db[code]?.unit || '';
  let price = db[code]?.price || 0;

  const newItem = {
    code,
    name,
    unit,
    price,
    docQty: 0
  };

  allItems.unshift(newItem);
  render(allItems);

  setTimeout(() => {
    const newCard = document.querySelector(`.item[data-code="${code}"]`);
    if (newCard) {
      newCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      newCard.classList.add('found');
      setTimeout(() => newCard.classList.remove('found'), 2200);
      const input = newCard.querySelector('input[data-code]');
      if (input) {
        setTimeout(() => { input.focus(); openKeyboardFor(input); }, 320);
      }
    }
  }, 320);
}


/* =========================
   Keyboard & input handlers
   - Back button removes one Unicode code point (one character)
   - Ensure back button is handled only once
   ========================= */
function removeLastCodePoint(str){
  if(!str) return '';
  const arr = Array.from(str);
  arr.pop();
  return arr.join('');
}

function attachInputHandlers(){
  document.querySelectorAll('input[data-code]').forEach(input=>{
    input.addEventListener('focus', ()=> openKeyboardFor(input));
    input.addEventListener('click', ()=> openKeyboardFor(input));
  });

  // Attach handlers for keyboard buttons except back/done which are handled separately
  keyboard.querySelectorAll('button').forEach(btn=>{
    const id = btn.id || '';
    if(id === 'back' || id === 'done') return; // skip, will attach separately
    btn.onclick = ()=>{
      if(!activeInput) return;
      const v = btn.textContent;
      activeInput.value += v;
      activeInput.dispatchEvent(new Event('input',{bubbles:true}));
    };
  });

  // Back button: single handler that removes one code point
  const backBtn = document.getElementById('back');
  if(backBtn){
    backBtn.onclick = ()=>{
      if(!activeInput) return;
      activeInput.value = removeLastCodePoint(activeInput.value);
      activeInput.dispatchEvent(new Event('input',{bubbles:true}));
    };
  }

  // Done button
  const doneBtn = document.getElementById('done');
  if(doneBtn) doneBtn.onclick = closeKeyboard;

  // Close keyboard when clicking outside
  document.addEventListener('click', e=>{
    if(!e.target.closest('#custom-keyboard') && !e.target.matches('input[data-code]')) closeKeyboard();
  });
}

function openKeyboardFor(input){
  activeInput = input;
  keyboard.classList.add('show');
  document.getElementById('content').classList.add('with-keyboard');
  setTimeout(()=>{
    const rect = input.getBoundingClientRect();
    const viewportH = window.innerHeight;
    const padHeight = Math.max(260, Math.round(viewportH * 0.34));
    const desiredBottom = padHeight + 12;
    if(rect.bottom > viewportH - desiredBottom){
      const content = document.getElementById('content');
      const offset = rect.bottom - (viewportH - desiredBottom);
      content.scrollBy({ top: offset + 12, behavior: 'smooth' });
    } else {
      input.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  },150);
}

function closeKeyboard(){
  activeInput = null;
  keyboard.classList.remove('show');
  document.getElementById('content').classList.remove('with-keyboard');
}

/* handle manual input changes */
listEl.addEventListener('input', e=>{
  if(e.target.tagName !== 'INPUT') return;
  const code = e.target.dataset.code;
  const value = e.target.value;
  sessionValues[code] = value;
  localStorage.setItem('qty_' + code, value);

  const raw = value.replace(',', '.').trim();
  let actual = NaN;
  try{
    let safeRaw = raw;
    if(/[\+\-\*\/]$/.test(safeRaw)) safeRaw = safeRaw.slice(0,-1);
    if(safeRaw) actual = Function('return ' + safeRaw)();
  }catch{ actual = NaN; }

  const item = allItems.find(i=>i.code === code);
  const card = e.target.closest('.item');
  card.classList.remove('match','missing','excess');
  if(!value) {}
  else if(!isNaN(actual)){
    if(actual === item.docQty) card.classList.add('match');
    else if(actual < item.docQty) card.classList.add('missing');
    else if(actual > item.docQty) card.classList.add('excess');
  }
  autosave();
});

/* =========================
   Search: hide non-matching cards
   ========================= */
function normalize(s){ return String(s||'').toLowerCase().replace(/ё/g,'е').replace(/\s+/g,' ').trim(); }
function matchesQuery(text, query){ const words = query.split(' ').filter(Boolean); return words.every(w => text.includes(w)); }

searchEl.addEventListener('input', ()=>{
  const q = normalize(searchEl.value);
  document.querySelectorAll('#list .item').forEach(div=>{
    const code = normalize(div.dataset.code);
    const item = allItems.find(i=>i.code === div.dataset.code);
    if(!item){ div.classList.add('hidden'); return; }
    const name = normalize(item.name);
    const match = (q === '') || matchesQuery(name, q) || matchesQuery(code, q);
    div.classList.toggle('hidden', !match);
  });
});
clearSearchBtn.addEventListener('click', ()=>{ searchEl.value=''; document.querySelectorAll('#list .item').forEach(d=>d.classList.remove('hidden')); });

/* =========================
   Autosave
   ========================= */
function autosave(){
  const currentLocalkaId = (window.localkaData && window.localkaData.docId) ? window.localkaData.docId : 'loc_' + new Date().toISOString().slice(0,10);
  const sessionKey = 'autosave_session_' + currentLocalkaId;
  const session = { items: allItems, values: sessionValues };
  localStorage.setItem(sessionKey, JSON.stringify(session));
}
window.addEventListener('beforeunload', autosave);

/* =========================
   Camera helpers (from your Scaner.html)
   ========================= */
async function enumerateCameras(){
  try{
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    deviceSelect.innerHTML = '';
    cams.forEach((c, idx)=>{
      const opt = document.createElement('option');
      opt.value = c.deviceId;
      opt.text = c.label || `Камера ${idx+1}`;
      deviceSelect.appendChild(opt);
    });
    if(cams.length && !currentDeviceId) currentDeviceId = cams[0].deviceId;
    if(currentDeviceId) deviceSelect.value = currentDeviceId;
  }catch(e){}
}

/* startCamera / stopCamera and scanning loop (adapted) */
async function startCamera(){
  if(scanning) return;
  stopCamera();
  scanning = true;
  await enumerateCameras();

  const constraints = {
    audio:false,
    video:{
      deviceId: deviceSelect.value || currentDeviceId || undefined,
      facingMode: { ideal: "environment" },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  };

  try{
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    preview.srcObject = stream;
    await preview.play();
    currentDeviceId = stream.getVideoTracks()[0].getSettings().deviceId || currentDeviceId;
    if(currentDeviceId) deviceSelect.value = currentDeviceId;

    if(!reader) reader = new ZXing.BrowserMultiFormatReader();

    requestAnimationFrame(scanLoop);
    scannerCard.style.display = 'block';
    showToast('Сканер включён');
  }catch(err){
    console.error('camera error', err);
    scanResult.innerText = 'Ошибка доступа к камере';
    scanning = false;
    showToast('Не удалось включить камеру');
  }
}

function stopCamera(){
  scanning = false;
  if(preview.srcObject){
    try{ preview.srcObject.getTracks().forEach(t=>t.stop()); }catch(e){}
    preview.srcObject = null;
  }
  if(reader){
    try{ reader.reset(); }catch(e){}
  }
  scannerCard.style.display = 'none';
  showToast('Сканер остановлен');
}

/* Torch toggle */
let torchOn = false;
async function toggleTorch(){
  if(!stream) return showToast('Сначала включите сканер');
  const track = stream.getVideoTracks()[0];
  try{
    await track.applyConstraints({ advanced: [{ torch: !torchOn }] });
    torchOn = !torchOn;
    torchBtn.textContent = torchOn ? '🔦 ON' : '🔦';
  }catch(e){
    showToast('Torch не поддерживается');
  }
}

/* Canvas helpers for decoding */
function createCanvas(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }
function getCanvas(w,h){
  for(let c of canvasPool) if(c.width===w && c.height===h) return c;
  const c = createCanvas(w,h); canvasPool.push(c); return c;
}

/* tryDecodeCanvas uses BarcodeDetector if available, otherwise ZXing */
async function tryDecodeCanvas(canvas){
  if(detector){
    try{
      const imageData = canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height);
      const res = await detector.detect(imageData);
      if(res && res.length) return res[0].rawValue;
    }catch(e){}
  }
  try{
    const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
    const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
    const result = new ZXing.MultiFormatReader().decode(binaryBitmap);
    if(result && result.text) return result.text;
  }catch(e){}
  // try rotated variants
  const w = canvas.width, h = canvas.height;
  const temp = getCanvas(w,h);
  const tctx = temp.getContext('2d');
  for(let angle of [90,180,270]){
    tctx.clearRect(0,0,w,h);
    tctx.save();
    tctx.translate(w/2,h/2);
    tctx.rotate(angle*Math.PI/180);
    tctx.drawImage(canvas, -w/2, -h/2);
    tctx.restore();
    try{
      const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(temp);
      const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
      const result = new ZXing.MultiFormatReader().decode(binaryBitmap);
      if(result && result.text) return result.text;
    }catch(e){}
  }
  return null;
}

/* Main scanning loop */
async function scanLoop(){
  if(!scanning) { scanLoopRunning = false; return; }
  if(scanLoopRunning) return;
  scanLoopRunning = true;

  try{
    while(scanning){
      const w = preview.videoWidth;
      const h = preview.videoHeight;
      if(w===0 || h===0){
        await new Promise(r => requestAnimationFrame(r));
        continue;
      }

      const canvas = getCanvas(w,h);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(preview, 0, 0, w, h);

      const scale = Math.max(1, Math.floor(Math.max(w,h)/900));
      const sw = Math.floor(w/scale);
      const sh = Math.floor(h/scale);
      const small = getCanvas(sw,sh);
      const sctx = small.getContext('2d');
      sctx.drawImage(canvas, 0, 0, w, h, 0, 0, sw, sh);

      try{
        const code = await tryDecodeCanvas(small);
        if(code) {
          handleDetected(code);
          // small delay to avoid immediate re-detection
          await new Promise(r => setTimeout(r, 300));
        }
      }catch(e){}

      await new Promise(r => requestAnimationFrame(r));
    }
  }finally{
    scanLoopRunning = false;
  }
}

/* Handle detection: stop scanner, show item or prompt to create */
function handleDetected(code) {
  const now = Date.now();
  if (code === lastDetected.code && (now - lastDetected.ts) < DEBOUNCE_MS) return;
  lastDetected = { code, ts: now };

  try { navigator.vibrate?.(60); } catch (e) {}
  scanResult.innerText = `${code} → ${db[code] ? db[code].name : 'Товар не найден'}`;

  // Останавливаем сканер после обнаружения
  stopCamera();

  // Добавляем только отсканированный товар в список
  addItemToScanList(code);

  // Сохраняем текущее состояние приложения
  saveAppState();
}

/* =========================
   UI actions wiring
   ========================= */
scanBtn.addEventListener('click', async ()=>{
  if(!scanning) await startCamera();
  else stopCamera();
});
closeScannerBtn.addEventListener('click', stopCamera);
deviceSelect.addEventListener('change', async ()=>{
  currentDeviceId = deviceSelect.value;
  if(scanning){
    try{ reader.reset(); }catch(e){}
    scanning = false;
  }
  await startCamera();
});
torchBtn.addEventListener('click', toggleTorch);

/* =========================
   Init on load
   ========================= */
function saveAppState() {
  const state = {
    items: allItems.map(item => ({
      code: item.code,
      name: item.name,
      unit: item.unit,
      price: item.price,
      docQty: item.docQty
    })),
    values: { ...sessionValues },
    scrollPosition: document.getElementById('content').scrollTop,
    scannerActive: scanning
  };
  localStorage.setItem('recountProState', JSON.stringify(state));
}

function restoreAppState() {
  try {
    const saved = localStorage.getItem('recountProState');
    if (!saved) return false;

    const state = JSON.parse(saved);
    allItems = state.items || [];
    sessionValues = state.values || {};

    render(allItems);

    setTimeout(() => {
      document.getElementById('content').scrollTop = state.scrollPosition || 0;
    }, 100);

    if (state.scannerActive) {
      startCamera();
    }

    return true;
  } catch (e) {
    console.error('Failed to restore state:', e);
    return false;
  }
}

  
window.addEventListener('DOMContentLoaded', async () => {
  if (!restoreAppState()) {
    loadBarcodeDB();
    allItems = [];
    render(allItems);
  }

  // enumerate cameras (non-blocking)
  if(navigator.mediaDevices && navigator.mediaDevices.enumerateDevices){
    try{ await enumerateCameras(); }catch(e){}
  }

  // warm permission check to populate labels on some devices
  try{
    const s = await navigator.mediaDevices.getUserMedia({video:true});
    s.getTracks().forEach(t=>t.stop());
    await enumerateCameras();
  }catch(e){ /* ignore */ }
});

/* stop camera on unload */
window.addEventListener('pagehide', ()=>{ stopCamera(); });
window.addEventListener('beforeunload', ()=>{ stopCamera(); });

/* expose for debug */
window._recount = { db, barcodeDB, allItems, startCamera, stopCamera, render };

</script>

<script>
/* === ЭЛЕМЕНТЫ === */
const fab = document.getElementById("fabMenu");
const sheet = document.getElementById("bottomSheet");
const overlay = document.getElementById("sheetOverlay");
const clearBtn = document.getElementById("clearBtn");
const saveBtn = document.getElementById("saveBtn");
const list = document.getElementById("list");

/* === ОТКРЫТЬ МЕНЮ === */
fab.onclick = () => {
  sheet.classList.add("show");
  overlay.classList.add("show");
};

/* === ЗАКРЫТЬ МЕНЮ === */
overlay.onclick = () => closeMenu();
function closeMenu(){
  sheet.classList.remove("show");
  overlay.classList.remove("show");
}

/* ============================================================
   ПОДТВЕРЖДЕНИЕ + АНИМАЦИЯ ОЧИСТКИ
============================================================ */
clearBtn.onclick = () => {
  closeMenu();

  const box = createConfirmBox("Очистить пересчёт?", () => {

    /* 1. Удаляем qty_КОД из localStorage */
    Object.keys(localStorage).forEach(key => {
      if (key.startsWith("qty_")) localStorage.removeItem(key);
    });

    /* 2. Удаляем autosave_session */
    Object.keys(localStorage).forEach(key => {
      if (key.startsWith("autosave_session_")) localStorage.removeItem(key);
    });

    /* 3. Чистим sessionValues */
    sessionValues = {};

    /* 4. Чистим allItems */
    allItems = [];

    /* 5. Анимация исчезновения карточек */
    const items = list.querySelectorAll(".item");
    items.forEach((item) => {
      item.style.transition = "opacity .25s ease, transform .25s ease";
      item.style.opacity = "0";
      item.style.transform = "translateY(10px)";
    });

    /* 6. Полная очистка DOM */
    setTimeout(() => {
      list.innerHTML = "";
    }, 260);

  });
};



/* ============================================================
   ПОДТВЕРЖДЕНИЕ + СОХРАНЕНИЕ В БАЗУ ТОВАРОВ
============================================================ */
saveBtn.onclick = () => {
  closeMenu();

  const box = createConfirmBox("Сохранить пересчёт?", () => {

    let db = JSON.parse(localStorage.getItem("barcodeDB") || "{}");
    let codes = JSON.parse(localStorage.getItem("barcodeCodes") || "{}");

    const items = listEl.querySelectorAll(".item");

    items.forEach(item => {
      const code = item.dataset.code;
      if (!code || code === "undefined") return;

      // --- КОЛИЧЕСТВО ---
      const qtyInput = item.querySelector('input[data-code]');
      const qty = Number(qtyInput?.value || 0);

      // --- НАЗВАНИЕ ---
      let name = "";

      // 1) название из карточки
      const nameField = item.querySelector(".field:nth-child(1)");
      if (nameField) {
        const text = nameField.textContent.replace("Название:", "").trim();
        if (text) name = text;
      }

      // 2) название из базы штрих‑кодов
      if (!name && codes[code]) name = codes[code];

      // 3) название из базы товаров
      if (!name && db[code]?.name) name = db[code].name;

      // 4) fallback
      if (!name) name = "Без названия";

      // === Обновляем базу штрих‑кодов ===
      codes[code] = name;

      // === Обновляем базу товаров ===
      if (qty > 0) {
        db[code] = { name, qty };
        localStorage.setItem("qty_" + code, qty);
      }
    });

    localStorage.setItem("barcodeDB", JSON.stringify(db));
    localStorage.setItem("barcodeCodes", JSON.stringify(codes));

    animateSaveSuccess();
  });
};





/* ============================================================
   ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
============================================================ */

/* Создание окна подтверждения */
function createConfirmBox(text, onYes){
  const box = document.createElement("div");
  box.style.position = "fixed";
  box.style.left = "50%";
  box.style.top = "50%";
  box.style.transform = "translate(-50%, -50%)";
  box.style.background = "rgba(20,20,20,0.85)";
  box.style.backdropFilter = "blur(12px)";
  box.style.padding = "1.4rem";
  box.style.borderRadius = "16px";
  box.style.boxShadow = "0 12px 32px rgba(0,0,0,0.6)";
  box.style.zIndex = "5000";
  box.style.width = "80%";
  box.style.maxWidth = "340px";
  box.style.textAlign = "center";
  box.style.animation = "fadeIn .25s ease";

  box.innerHTML = `
    <div style="font-size:1.1rem; margin-bottom:1rem; color:#fff;">
      ${text}
    </div>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button id="confirmYes" style="
        flex:1;
        padding:0.7rem;
        border:none;
        border-radius:10px;
        background:linear-gradient(135deg,#6a11cb,#2575fc);
        color:#fff;
        font-size:1rem;
        font-weight:600;
        cursor:pointer;
      ">Да</button>

      <button id="confirmNo" style="
        flex:1;
        padding:0.7rem;
        border:none;
        border-radius:10px;
        background:#2c2c2c;
        color:#fff;
        font-size:1rem;
        font-weight:600;
        cursor:pointer;
      ">Нет</button>
    </div>
  `;

  document.body.appendChild(box);

  document.getElementById("confirmNo").onclick = () => box.remove();

  document.getElementById("confirmYes").onclick = () => {
    box.remove();
    onYes();
  };

  return box;
}

/* Анимация успешного сохранения */
function animateSaveSuccess(){
  const ok = document.createElement("div");
  ok.style.position = "fixed";
  ok.style.left = "50%";
  ok.style.top = "50%";
  ok.style.transform = "translate(-50%, -50%)";
  ok.style.background = "rgba(20,20,20,0.85)";
  ok.style.backdropFilter = "blur(12px)";
  ok.style.padding = "1.2rem 1.6rem";
  ok.style.borderRadius = "16px";
  ok.style.boxShadow = "0 12px 32px rgba(0,0,0,0.6)";
  ok.style.zIndex = "5000";
  ok.style.fontSize = "1.2rem";
  ok.style.color = "#fff";
  ok.style.animation = "fadeIn .25s ease";
  ok.innerText = "✔ Сохранено";

  document.body.appendChild(ok);

  setTimeout(() => {
    ok.style.transition = "opacity .3s ease, transform .3s ease";
    ok.style.opacity = "0";
    ok.style.transform = "translate(-50%, -40%)";
  }, 900);

  setTimeout(() => ok.remove(), 1300);
}
</script>
