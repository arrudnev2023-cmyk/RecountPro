<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>RecountPro — Приход / Расход</title>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    :root{
      --accent:#6d28d9;
      --accent-light:#a78bfa;
      --text:#e6eef8;
      --muted:#9aa3b2;
      --danger:#f87171;
      --success:#34d399;
      --card-bg: linear-gradient(135deg,#1e1e2f,#2a2a40);
      --maxw:980px;
      --radius:12px;
    }

    *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
    html,body{
      height:100%; margin:0;
      background:linear-gradient(180deg,#05030a,#0b0710);
      color:var(--text);
      font-family:Inter,Segoe UI,system-ui,Arial;
      overflow:hidden;
    }

    header{
      position:fixed; left:0; right:0; top:0;
      padding:12px;
      background:rgba(10,10,12,0.7);
      backdrop-filter:blur(8px);
      z-index:1000;
      border-radius:0 0 14px 14px;
    }
    header h1{
      margin:0; text-align:center; font-size:1.15rem;
    }

    #search-wrap{
      max-width:var(--maxw);
      margin:10px auto;
      position:relative;
    }
    #search{
      width:100%;
      padding:10px 56px 10px 12px;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,0.04);
      background:rgba(20,20,24,0.6);
      color:var(--text);
      font-size:15px;
    }
    #scan-btn{
      position:absolute; right:44px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--muted); cursor:pointer;
    }
    #clear-search{
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--muted); cursor:pointer;
    }

    #content{
      position:fixed; left:0; right:0; top:96px; bottom:0;
      overflow:auto; padding:12px;
    }

    .list{max-width:var(--maxw); margin:0 auto;}

    .item{
      width:100%;
      margin:10px 0;
      padding:16px;
      border-radius:var(--radius);
      background:var(--card-bg);
      box-shadow:0 8px 30px rgba(0,0,0,0.6);
      border-left:6px solid transparent;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .item.found{
      box-shadow:0 18px 50px rgba(106,17,203,0.18);
      transform:translateY(-6px);
    }

    .item.highlight-purple {
      box-shadow: 0 0 0 3px #7c3aed, 0 12px 32px rgba(124, 58, 237, 0.4);
      border-left-color: #7c3aed !important;
      transition: box-shadow .25s ease, transform .25s ease;
    }

    .field{font-size:14px;}
    .label{font-weight:700; color:#dbeafe; margin-right:6px;}
    .hidden{display:none !important;}

    .row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      justify-content:space-between;
    }

    /* Улучшенные стили для блока количества */
    .qty-block{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(255,255,255,0.08);
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .qty-section-title{
      font-weight:600;
      font-size:15px;
      color:var(--accent-light);
      margin-bottom:8px;
    }

    .qty-row{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .qty-row-label{
      min-width:80px;
      font-size:14px;
      color:var(--muted);
      font-weight:500;
    }

    .qty-controls{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .qty-input-wrapper{
      position:relative;
      flex:1;
      min-width:120px;
    }

    .qtyInput{
      width:100%;
      padding:10px 40px 10px 16px;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(10,10,16,0.8);
      color:var(--text);
      text-align:center;
      font-size:16px;
      font-weight:600;
      transition:all 0.2s ease;
    }

    .qtyInput:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(109, 40, 217, 0.3);
      background:rgba(15,15,20,0.9);
    }

    .qtyAction{
      width:48px;
      height:48px;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,0.2);
      background:rgba(255,255,255,0.08);
      color:var(--text);
      cursor:pointer;
      font-size:20px;
      font-weight:bold;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:all 0.2s ease;
    }

    .qtyAction:hover{
      background:rgba(255,255,255,0.15);
      transform:scale(1.05);
    }

    .qty-current{
      font-size:14px;
      color:var(--accent-light);
      font-weight:600;
      margin-left:8px;
    }

    /* Подсказки для полей ввода */
    .input-hint{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
      margin-left:4px;
    }

   @keyframes highlightQty {
  0% { background-color: rgba(109, 40, 217, 0.1); }
  50% { background-color: rgba(109, 40, 217, 0.3); }
  100% { background-color: transparent; }
}

.highlight-qty {
  animation: highlightQty 0.6s ease;
}

/* Стили для FAB-кнопки */
#fabMenu {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  z-index: 1001;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: #fff;
  border: none;
  padding: 0.9rem 1.2rem;
  border-radius: 14px;
  font-size: 1.2rem;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35), 0 0 12px rgba(106, 17, 203, 0.6);
  transition: all 0.3s ease;
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Стили для оверлея и нижнего листа */
#sheetOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  z-index: 999;
}
#sheetOverlay.show {
  opacity: 1;
  pointer-events: auto;
}

#bottomSheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: -60vh;
  padding: 1.2rem;
  background: rgba(20, 20, 20, 0.7);
  backdrop-filter: blur(12px) saturate(180%);
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -12px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  transition: bottom 0.35s ease;
  z-index: 1002;
}
#bottomSheet.show {
  bottom: 0;
}

.sheet-content {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
}
.sheet-btn {
  background: linear-gradient(145deg, #1f1f1f, #2c2c2c);
  color: #f9f9f9;
  border: none;
  padding: 0.9rem 1rem;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 6px 14px rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Стили для сканера */
.preview-wrap.camera-1-3 {
  position: relative;
  width: 100%;
  max-width: var(--maxw);
  margin: 0 auto 10px;
  padding-top: 33%;
  overflow: hidden;
  border-radius: 12px;
  background: #000;
}

.preview-wrap.camera-1-3 video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#scannerCard.card {
  max-width: var(--maxw);
  margin: 0 auto 10px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(10, 10, 16, 0.9);
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  margin-top: 8px;
  font-size: 13px;
}

.controls .btn {
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
  cursor: pointer;
}

/* Адаптация для мобильных устройств */
@media (max-width: 768px) {
  .qtyInput {
    width: 100%;
    font-size: 18px;
    padding: 12px 16px;
  }

  .qtyAction {
    width: 52px;
    height: 52px;
    font-size: 22px;
  }

  .qty-row {
    flex-direction: column;
    gap: 8px;
  }

  .qty-row-label {
    align-self: flex-start;
  }

  #search-wrap {
    margin: 8px auto;
  }

  .item {
    padding: 14px;
  }
}
  </style>
</head>

<body>
  <canvas id="bg"></canvas>

  <header>
    <h1>RecountPro — Приход / Расход</h1>
    <div id="search-wrap">
      <input id="search" placeholder="Поиск по названию или коду..." autocomplete="off" />
      <button id="scan-btn">📷</button>
      <button id="clear-search">×</button>
    </div>
  </header>

  <main id="content">
    <div id="scannerCard" class="card" style="display:none">
      <div class="preview-wrap camera-1-3"><video id="preview" playsinline muted></video></div>
      <div class="controls">
        <select id="deviceSelect" class="btn" style="min-width:160px"></select>
        <button id="torchBtn" class="btn">🔦</button>
        <button id="closeScannerBtn" class="btn">Закрыть</button>
        <div id="scanResult" style="margin-left:auto;color:var(--muted)"></div>
      </div>
    </div>

    <div id="list" class="list"></div>
  </main>

  <button id="fabMenu">☰</button>

  <div id="sheetOverlay"></div>

  <div id="bottomSheet">
    <div class="sheet-content">
      <button class="sheet-btn" id="toggleZeroBtn">🔍 Показать товары с 0</button>
      <button class="sheet-btn" id="backToMenuBtn">🏠 В меню</button>
    </div>
  </div>

  <script>
/* =========================
   БАЗЫ: ТОВАРЫ + ШК
========================= */

let barcodeDB = {};
let barcodeCodes = {};
let allItems = [];
let showZero = false;
let scanTimeout = null;

function isLocalStorageAvailable() {
  try {
    const test = '__test__';
    localStorage.setItem(test, test);
    localStorage.removeItem(test);
    return true;
  } catch (e) {
    return false;
  }
}

function loadDB() {
  if (!isLocalStorageAvailable()) {
    alert('Локальное хранилище недоступно. Данные не будут сохраняться.');
    return;
  }

  try {
    const raw = localStorage.getItem("barcodeDB");
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === "object") {
        barcodeDB = parsed;
      }
    }
  } catch (e) {
    barcodeDB = {};
  }

  try {
    const rawCodes = localStorage.getItem("barcodeCodes");
    if (rawCodes) {
      const parsed = JSON.parse(rawCodes);
      if (parsed && typeof parsed === "object") {
        barcodeCodes = parsed;
      }
    }
  } catch (e) {
    barcodeCodes = {};
  }

  barcodeDB = barcodeDB || {};
  barcodeCodes = barcodeCodes || {};
}

function saveDB() {
  if (!isLocalStorageAvailable()) return;

  try {
    localStorage.setItem("barcodeDB", JSON.stringify(barcodeDB));
  } catch (e) {
    console.error('Ошибка сохранения в localStorage:', e);
    alert('Не удалось сохранить данные. Проверьте настройки браузера.');
  }
}

function escapeHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

/* =========================
   СБОР СПИСКА ТОВАРОВ
========================= */

function buildItems() {
  allItems = Object.keys(barcodeDB).map(code => {
    const rec = barcodeDB[code];

    let name;
    let qty = 0;

    if (typeof rec === "string") {
      // старый формат: только название
      name = rec;
      qty = 0;
    } else if (rec && typeof rec === "object") {
      name = rec.name || code;
      qty = Number(rec.qty || 0);
    } else {
      name = code;
      qty = 0;
    }

    return { code, name, qty };
  });
}

/* =========================
   РЕНДЕР
========================= */

const listEl = document.getElementById("list");

function render(items) {
  listEl.innerHTML = "";

  items.forEach(item => {
    if (!showZero && item.qty === 0) return;

    // Правильное получение названия
    let name = item.name || barcodeCodes[item.code] || item.code;

    const div = document.createElement("div");
    div.className = "item";
    div.dataset.code = item.code;

    div.innerHTML = `
      <div class="field"><span class="label">Название:</span> ${escapeHtml(name)}</div>
      <div class="field"><span class="label">Штрих‑код:</span> ${item.code}</div>
      <div class="field qty-current"><span class="label">Остаток:</span> <span class="curQty">${item.qty}</span></div>

      <div class="qty-block">
        <div class="qty-section-title">Приход</div>
        <div class="qty-row">
          <div class="qty-controls">
            <button class="qtyAction plus-icon" data-code="${item.code}" data-type="plus">+</button>
            <div class="qty-input-wrapper">
              <input
                type="number"
                class="qtyInput"
                data-code="${item.code}"
                data-type="plus"
                value="0"
                min="0"
                placeholder="0"
                inputmode="numeric"
                pattern="[0-9]*"
              >
              <span class="input-hint">Количество для прихода</span>
            </div>
          </div>
        </div>

        <div class="qty-section-title">Расход</div>
        <div class="qty-row">
          <div class="qty-controls">
            <button class="qtyAction minus-icon" data-code="${item.code}" data-type="minus">−</button>
            <div class="qty-input-wrapper">
              <input
                type="number"
                class="qtyInput"
                data-code="${item.code}"
                data-type="minus"
                value="0"
                min="0"
                placeholder="0"
                inputmode="numeric"
                pattern="[0-9]*"
              >
              <span class="input-hint">Количество для расхода</span>
            </div>
          </div>
        </div>
      </div>
    `;

    listEl.appendChild(div);
  });

  attachQtyHandlers();
}

/* =========================
   ПРИХОД / РАСХОД
========================= */

function applyChange(code, type) {
  const input = document.querySelector(`.qtyInput[data-code="${code}"][data-type="${type}"]`);
  if (!input) return;

  let value = Math.max(0, Number(input.value || 0));
  if (value === 0) return; // ничего не делаем, если 0

  // старый остаток
  let oldQty = 0;
  const rec = barcodeDB[code];

  if (rec) {
    if (typeof rec === "object" && rec !== null) {
      oldQty = Number(rec.qty || 0);
    } else {
      oldQty = 0; // старый формат
    }
  }

  let newQty;
  if (type === "plus") {
    newQty = oldQty + value;
  } else { // type === "minus"
    newQty = Math.max(0, oldQty - value);
  }

  // нормализуем запись в базе
  if (!rec) {
    barcodeDB[code] = {
      name: barcodeCodes[code] || code,
      qty: newQty
    };
  } else if (typeof rec === "string") {
    barcodeDB[code] = {
      name: rec,
      qty: newQty
    };
  } else {
    barcodeDB[code].qty = newQty;
  }

  saveDB();

  const card = document.querySelector(`.item[data-code="${code}"]`);
  if (card) {
    const cur = card.querySelector(".curQty");
    if (cur) cur.textContent = newQty;
    card.classList.add("highlight-qty");
    setTimeout(() => card.classList.remove("highlight-qty"), 600);
  }

  input.value = "0"; // сбрасываем поле ввода
}

function attachQtyHandlers() {
  document.querySelectorAll(".qtyAction").forEach(btn => {
    btn.onclick = () => {
      const code = btn.dataset.code;
      const type = btn.dataset.type; // "plus" или "minus"
      applyChange(code, type);
    };
  });

  document.querySelectorAll(".qtyInput").forEach(inp => {
    inp.onchange = () => applyChange(inp.dataset.code, inp.dataset.type);
  });
}

/* =========================
   ПОИСК
========================= */

function filterItems(query) {
  const filtered = allItems.filter(item => {
    if (!query) return true;

    const lowerQuery = query.toLowerCase().trim();
    const nameMatch = item.name && item.name.toLowerCase().includes(lowerQuery);
    const codeMatch = item.code && item.code.includes(lowerQuery);

    return nameMatch || codeMatch;
  });

  render(filtered);
}

/* =========================
   СКАНЕР ШТРИХ‑КОДОВ
========================= */

let codeReader = null;
let currentStream = null;

async function startScanner() {
  if (!codeReader) {
    try {
      codeReader = new ZXing.BrowserMultiFormatReader();
      await codeReader.getVideoInputDevices();
    } catch (error) {
      console.error('Ошибка инициализации сканера:', error);
      alert('Не удалось запустить сканер. Проверьте разрешения камеры.');
      return;
    }
  }

  try {
    const videoElement = document.getElementById('preview');
    const deviceSelect = document.getElementById('deviceSelect');

    // Получаем список устройств
    const devices = await codeReader.getVideoInputDevices();

    // Заполняем селектор устройств
    deviceSelect.innerHTML = '';
    devices.forEach((device, index) => {
      const option = document.createElement('option');
      option.value = device.deviceId;
      option.textContent = device.label || `Камера ${index + 1}`;
      deviceSelect.appendChild(option);
    });

    // Если есть устройства, выбираем первое
    if (devices.length > 0) {
      await codeReader.decodeFromVideoDevice(
        devices[0].deviceId,
        videoElement,
        (result, err) => {
          if (result) {
            handleScanResult(result.text);
          }
          if (err && !(err instanceof ZXing.NotFoundException)) {
            console.error(err);
          }
        }
      );

      currentStream = videoElement.srcObject;
      document.getElementById('scannerCard').style.display = 'block';
      document.getElementById('sheetOverlay').classList.add('show');
    } else {
      alert('Камеры не найдены');
    }
  } catch (error) {
    console.error('Ошибка запуска камеры:', error);
    alert('Не удалось получить доступ к камере. Проверьте разрешения.');
  }
}

function handleScanResult(barcode) {
  // Скрываем сканер после успешного сканирования
  stopScanner();

  // Ищем товар по штрих‑коду
  const item = allItems.find(i => i.code === barcode);
  if (item) {
    // Выделяем найденный товар
    const card = document.querySelector(`.item[data-code="${barcode}"]`);
    if (card) {
      card.classList.add('highlight-purple', 'found');
      setTimeout(() => {
        card.classList.remove('found');
      }, 1000);
    }

    // Прокручиваем к найденному товару
    card?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    alert(`Товар с штрих‑кодом ${barcode} не найден. Добавьте его в базу.`);
  }

  // Показываем результат в интерфейсе
  document.getElementById('scanResult').textContent = `Найден: ${barcode}`;
  setTimeout(() => document.getElementById('scanResult').textContent = '', 3000);
}

function stopScanner() {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
    currentStream = null;
  }
  if (codeReader) {
    codeReader.reset();
  }
  document.getElementById('scannerCard').style.display = 'none';
  document.getElementById('sheetOverlay').classList.remove('show');
}

/* =========================
   ИНИЦИАЛИЗАЦИЯ
========================= */

function setupEventListeners() {
  const search = document.getElementById("search");
  search.addEventListener("input", () => {
    filterItems(search.value);
  });

  document.getElementById("clear-search").addEventListener("click", () => {
    search.value = "";
    filterItems("");
  });

  document.getElementById("scan-btn").addEventListener("click", startScanner);

  document.getElementById("closeScannerBtn").addEventListener("click", stopScanner);

  document.getElementById("toggleZeroBtn").addEventListener("click", () => {
    showZero = !showZero;
    render(allItems);
    document.getElementById("bottomSheet").classList.remove("show");
    document.getElementById("sheetOverlay").classList.remove("show");
  });

  document.getElementById("backToMenuBtn").addEventListener("click", () => {
    document.getElementById("bottomSheet").classList.remove("show");
    document.getElementById("sheetOverlay").classList.remove("show");
  });

  document.getElementById("fabMenu").addEventListener("click", () => {
    document.getElementById("bottomSheet").classList.add("show");
    document.getElementById("sheetOverlay").classList.add("show");
  });
}

document.addEventListener("DOMContentLoaded", () => {
  loadDB();
  buildItems();
  render(allItems);

  setupEventListeners();
});
  </script>
</body>
</html>
