<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Приход / Расход — RecountPro</title>

<style>
  :root{
    --bg:#0b0f1a;
    --card:#ffffff;
    --muted:#7a7f88;
    --accent:#0b84ff;
    --danger:#ff6b6b;
  }

  html,body{
    height:100%;
    margin:0;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
    background:var(--bg);
    color:#fff;
    overflow:hidden;
  }

  #bg{
    position:fixed;
    inset:0;
    z-index:-1;
  }

  .container{
    max-width:900px;
    margin:0 auto;
    padding:16px;
  }

  header{
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:12px;
  }

  .btn{
    padding:8px 12px;
    border-radius:8px;
    border:1px solid #dcdfe6;
    background:#fff;
    cursor:pointer;
    color:#000;
  }

  .btn.primary{
    background:var(--accent);
    color:#fff;
    border-color:transparent;
  }

  #stockSearch{
    flex:1;
    padding:8px;
    border-radius:8px;
    border:1px solid #e6e6e9;
  }

  #stockList{
    display:flex;
    flex-direction:column;
    gap:12px;
    height:70vh;
    overflow:auto;
    padding-bottom:20px;
  }

  .stock-item{
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:12px;
    padding:12px;
    backdrop-filter:blur(6px);
  }

  .row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }

  .title{
    font-weight:600;
    font-size:17px;
  }

  .muted{
    color:var(--muted);
    font-size:13px;
  }

  .qty-block{
    display:flex;
    flex-direction:column;
    gap:6px;
    width:100%;
  }

  .qty-controls{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .qty-controls input{
    width:80px;
    padding:6px;
    border-radius:8px;
    border:1px solid #ccc;
    text-align:center;
  }

  .qty-controls button{
    width:40px;
    height:36px;
    border-radius:8px;
    border:1px solid #ccc;
    background:#fafafa;
    cursor:pointer;
  }

  .highlight{
    background:rgba(255,255,200,0.25) !important;
  }

  #emptyNote{
    text-align:center;
    margin-top:20px;
    color:var(--muted);
  }
</style>
</head>

<body>
<canvas id="bg"></canvas>

<div class="container">

  <header>
    <button id="openScannerFromStock" class="btn">Сканер</button>
    <input id="stockSearch" placeholder="Поиск по названию или артикулу" />
    <button id="toggleZeroBtn" class="btn">Показать 0</button>
    <button id="backBtn" class="btn">Назад</button>
    <button id="menuBtn" class="btn">Меню</button>
  </header>

  <main id="stockList"></main>
  <div id="emptyNote" style="display:none">Ничего не найдено</div>

</div>

<script>
/* ============================
   ЗАГРУЗКА БАЗЫ ТОВАРОВ
============================ */
let barcodeDB = {};
try{
  const raw = localStorage.getItem("barcodeDB");
  barcodeDB = raw ? JSON.parse(raw) : {};
}catch(e){ barcodeDB = {}; }

function saveDB(){
  localStorage.setItem("barcodeDB", JSON.stringify(barcodeDB));
}

function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g, c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* ============================
   РЕНДЕР ЭКРАНА
============================ */
let showZero = false;
let currentQuery = "";

function renderStockScreen(){
  const list = document.getElementById("stockList");
  list.innerHTML = "";

  const items = Object.values(barcodeDB).sort((a,b)=>
    (a.name||"").localeCompare(b.name||"")
  );

  const q = currentQuery.toLowerCase().trim();
  let shown = 0;

  for(const item of items){
    const code = item.code;
    const qty = Number(localStorage.getItem("qty_"+code) || item.qty || 0);

    if(!showZero && qty === 0 && !q) continue;

    if(q){
      const hay = ((item.name||"") + " " + code).toLowerCase();
      if(!hay.includes(q)) continue;
    }

    const div = document.createElement("div");
    div.className = "stock-item";
    div.dataset.code = code;

    div.innerHTML = `
      <div class="row">
        <div>
          <div class="title">${escapeHtml(item.name)}</div>
          <div class="muted">Артикул: ${escapeHtml(code)}</div>
        </div>
        <div class="muted">Цена: ${item.price||"-"} ${item.unit||""}</div>
      </div>

      <div class="qty-block">

        <div class="muted">Приход</div>
        <div class="qty-controls">
          <button class="plus1" data-code="${code}">+1</button>
          <input type="number" class="qtyPlusInput" data-code="${code}" value="0" min="0">
        </div>

        <div class="muted">Расход</div>
        <div class="qty-controls">
          <button class="minus1" data-code="${code}">-1</button>
          <input type="number" class="qtyMinusInput" data-code="${code}" value="0" min="0">
        </div>

        <div class="muted">Текущий остаток: <span class="curQty">${qty}</span></div>

      </div>
    `;

    list.appendChild(div);
    shown++;
  }

  document.getElementById("emptyNote").style.display = shown ? "none" : "block";
  attachHandlers();
}

/* ============================
   ОБРАБОТЧИКИ
============================ */
function attachHandlers(){
  document.querySelectorAll(".plus1").forEach(btn=>{
    btn.onclick = ()=>{
      const code = btn.dataset.code;
      const input = document.querySelector(`.qtyPlusInput[data-code="${code}"]`);
      input.value = Number(input.value)+1;
      applyChange(code);
    };
  });

  document.querySelectorAll(".minus1").forEach(btn=>{
    btn.onclick = ()=>{
      const code = btn.dataset.code;
      const input = document.querySelector(`.qtyMinusInput[data-code="${code}"]`);
      input.value = Number(input.value)+1;
      applyChange(code);
    };
  });

  document.querySelectorAll(".qtyPlusInput").forEach(inp=>{
    inp.onchange = ()=> applyChange(inp.dataset.code);
  });

  document.querySelectorAll(".qtyMinusInput").forEach(inp=>{
    inp.onchange = ()=> applyChange(inp.dataset.code);
  });
}

/* ============================
   ПРИМЕНЕНИЕ ИЗМЕНЕНИЙ
============================ */
function applyChange(code){
  const plus = Number(document.querySelector(`.qtyPlusInput[data-code="${code}"]`).value||0);
  const minus = Number(document.querySelector(`.qtyMinusInput[data-code="${code}"]`).value||0);

  const oldQty = Number(localStorage.getItem("qty_"+code) || barcodeDB[code].qty || 0);
  const newQty = Math.max(0, oldQty + plus - minus);

  localStorage.setItem("qty_"+code, newQty);
  barcodeDB[code].qty = newQty;
  saveDB();

  const row = document.querySelector(`.stock-item[data-code="${code}"]`);
  if(row){
    row.querySelector(".curQty").textContent = newQty;
    row.classList.add("highlight");
    setTimeout(()=> row.classList.remove("highlight"), 600);
  }
}

/* ============================
   КНОПКИ УПРАВЛЕНИЯ
============================ */
document.getElementById("toggleZeroBtn").onclick = ()=>{
  showZero = !showZero;
  toggleZeroBtn.textContent = showZero ? "Скрыть 0" : "Показать 0";
  renderStockScreen();
};

document.getElementById("stockSearch").oninput = e=>{
  currentQuery = e.target.value;
  renderStockScreen();
};

document.getElementById("backBtn").onclick = ()=>{
  window.location.href = "index.html";
};

document.getElementById("menuBtn").onclick = ()=>{
  window.location.href = "index.html";
};

document.getElementById("openScannerFromStock").onclick = ()=>{
  alert("Подключу сканер, когда скажешь какой используешь");
};

/* ============================
   СТАРТ
============================ */
renderStockScreen();

/* ============================
   КОСМИЧЕСКИЙ ФОН
============================ */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth*dpr;
  canvas.height = window.innerHeight*dpr;
  canvas.style.width = window.innerWidth+"px";
  canvas.style.height = window.innerHeight+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const stars=[];
for(let i=0;i<150;i++){
  stars.push({
    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,
    r:Math.random()*1.6+0.4,
    a:Math.random()*0.8+0.2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const s of stars){
    ctx.fillStyle=`rgba(255,255,255,${s.a})`;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
