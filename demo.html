  <!-- 🔥 Проверка авторизации и таймера -->
  <script>
    // Проверяем, авторизован ли пользователь
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    const loginTime = localStorage.getItem("loginTime");

    // Если нет данных — отправляем на логин
    if (!isLoggedIn || !loginTime) {
      window.location.href = "login1.html";
    }

    // Проверяем, прошло ли больше 2 часов (7200000 мс)
    const now = Date.now();
    const diff = now - Number(loginTime);

    if (diff > 7200000) {
      // Удаляем данные авторизации
      localStorage.removeItem("isLoggedIn");
      localStorage.removeItem("loginTime");

      // Отправляем на логин
      window.location.href = "login1.html";
    }

    // Обновляем время активности
    localStorage.setItem("loginTime", Date.now());
  </script>

<script>

  // Время последней активности
  const LAST_ACTIVITY_KEY = "lastActivity";
  const MAX_IDLE_TIME = 6 * 60 * 60 * 1000; // 6 часов

  function updateActivity() {
    localStorage.setItem(LAST_ACTIVITY_KEY, Date.now().toString());
  }

  function checkIdleTime() {
    const last = parseInt(localStorage.getItem(LAST_ACTIVITY_KEY) || "0", 10);
    const now = Date.now();
    if (last && now - last > MAX_IDLE_TIME) {
      localStorage.removeItem("isAuth");
      window.location.href = "/demo.html";
    }
  }

  // Обновляем активность при действиях
  ["click", "keydown", "mousemove", "scroll", "touchstart"].forEach(evt => {
    document.addEventListener(evt, updateActivity, { passive: true });
  });

  // Проверка каждые 60 секунд
  setInterval(checkIdleTime, 30 * 60 * 1000);
  updateActivity();

  // Базовые переменные
  const list = document.getElementById("list");
  const searchInput = document.getElementById("search");
  const keyboard = document.getElementById("custom-keyboard");
  let allItems = [], activeInput = null;
  let sessionValues = {};

// Восстановление при загрузке страницы
window.addEventListener("DOMContentLoaded", () => {
  // 🔑 определяем ID локалки: берём docId из JSON, если нет — fallback по дате
  const currentLocalkaId = (window.localkaData && window.localkaData.docId)
    ? window.localkaData.docId
    : "loc_" + new Date().toISOString().slice(0,10);

  const sessionKey = "autosave_session_" + currentLocalkaId;

  // пробуем восстановить сохранённую сессию именно этой локалки
  const savedSession = localStorage.getItem(sessionKey);
  if (savedSession) {
    try {
      const session = JSON.parse(savedSession);
      allItems = session.items || [];
      sessionValues = session.values || {};
    } catch {
      allItems = [];
      sessionValues = {};
    }
  } else {
    allItems = [];
    sessionValues = {};
  }

  if (allItems.length > 0) {
    render(allItems);
  }
});

// Загрузка новой локалки
function loadLocalka(data) {
  // определяем ID локалки
  const currentLocalkaId = data.docId || "loc_" + new Date().toISOString().slice(0,10);
  const sessionKey = "autosave_session_" + currentLocalkaId;

  // ❌ очищаем автосейв для этой локалки (чистый старт)
  localStorage.removeItem(sessionKey);

  allItems = data;
  sessionValues = {};

  // сохраняем ссылку на текущую локалку глобально, чтобы autosave знал её ID
  window.localkaData = data;

  render(allItems);
}

// Автосохранение
function autosave() {
  const currentLocalkaId = (window.localkaData && window.localkaData.docId)
    ? window.localkaData.docId
    : "loc_" + new Date().toISOString().slice(0,10);

  const sessionKey = "autosave_session_" + currentLocalkaId;

  const session = {

  // Автосохранение при закрытии вкладки
  window.addEventListener("beforeunload", autosave);

  // Группировка текста по строкам PDF
  function groupByY(items) {
    const lines = {};
    items.forEach(item => {
      const y = Math.round(item.transform[5]);
      if (!lines[y]) lines[y] = [];
      lines[y].push({ str: item.str, x: item.transform[4] });
    });
    return Object.values(lines).map(words =>
      words.sort((a, b) => a.x - b.x).map(w => w.str).join(' ')
    );
  }

  // Парсинг строк в объекты товаров
  function parseLines(lines) {
    const items = [];
    for (let line of lines) {
      line = line.trim();
      if (!/^\d+\s+\d{4,6}/.test(line)) continue;

      const match = line.match(/^(\d+)\s+(\d{4,6})\s+(.+?)\s+(\d+\*\d+)?\s+([\d.,]+)\s+(.*)$/i);
      if (match) {
        const rawTail = match[6];
        const qtyMatches = [...rawTail.matchAll(/(\d+)\s*шт/gi)];
        const docQty = qtyMatches.length > 0 ? parseInt(qtyMatches[qtyMatches.length - 1][1]) : null;

        items.push({
          code: match[2],
          name: match[3].trim(),
          unit: match[4] || '',
          price: parseFloat(match[5].replace(',', '.')),
          docQty
        });
      }
    }
    return items;
  }

  // Обновление итогов
  function updateSummary(items) {
    let match = 0, missing = 0, excess = 0, delta = 0;
    items.forEach(item => {
      const input = document.querySelector(`input[data-code="${item.code}"]`);
      if (!input) return;
      const raw = input.value.trim();
      const actual = parseFloat(raw.replace(',', '.')) || 0;
      if (actual === item.docQty) match++;
      else if (actual < item.docQty) { missing++; delta += item.docQty - actual; }
      else { excess++; delta += actual - item.docQty; }
    });
  }
  // Рендер списка товаров

function render(items) {
  list.innerHTML = '';
  items.forEach(item => {
    const value = sessionValues[item.code] || localStorage.getItem("qty_" + item.code) || "";

        <input type="text" data-code="${item.code}" value="${value}" inputmode="none" readonly />
      </div>
    `;

    // начальная окраска при рендере
    let actual = 0;
    try { actual = Function("return " + value.replace(',', '.'))() || 0; } catch {}
    if (actual === item.docQty) div.classList.add("match");
    else if (actual < item.docQty) div.classList.add("missing");
    else if (actual > item.docQty) div.classList.add("excess");

    list.appendChild(div);
  });

}

// Подключение обработчиков для инпутов и клавиатуры
function attachInputHandlers() {
  document.querySelectorAll('input[data-code]').forEach(input => {
    input.addEventListener('focus', () => {
      activeInput = input;
      keyboard.classList.add("show");
      document.getElementById("content").classList.add("with-keyboard");
      setTimeout(() => input.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
    });
    input.addEventListener('click', () => {
      activeInput = input;
      keyboard.classList.add("show");
      document.getElementById("content").classList.add("with-keyboard");
      setTimeout(() => input.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
    });
  });

  // Клики по кнопкам клавиатуры
  keyboard.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => {
      if (!activeInput) return;
      const val = btn.textContent;
      if (val === "←") {
        activeInput.value = activeInput.value.slice(0, -1);
      } else {
        activeInput.value += val;
      }
      // 🔥 теперь событие всплывает и ловится глобальным обработчиком
      activeInput.dispatchEvent(new Event("input", { bubbles: true }));
    };
  });

  // Скрытие клавиатуры при клике вне
  document.addEventListener("click", e => {
    if (!e.target.closest("#custom-keyboard") && !e.target.matches("input[data-code]")) {
      keyboard.classList.remove("show");
      document.getElementById("content").classList.remove("with-keyboard");
      activeInput = null;
    }
  });
}

// Функция нормализации текста для поиска
function normalize(str) {
  return String(str || "")
    .toLowerCase()
    .replace(/ё/g, "е")   // ё → е
    .replace(/№/g, "")    // убираем символ №
    .replace(/\s+/g, " ") // схлопываем пробелы
    .trim();
}

// Проверка: все ли слова из запроса встречаются в строке
function matchesQuery(text, query) {
  const words = query.split(" ");
  return words.every(w => text.includes(w));
}

// Поиск
searchInput.addEventListener("input", () => {
  const q = normalize(searchInput.value);

  document.querySelectorAll("#list .item").forEach(div => {
    const code = normalize(div.dataset.code);
    const item = allItems.find(i => i.code === div.dataset.code);
    if (!item) { 
      div.classList.add("hidden"); 
      return; 
    }

    const name = normalize(item.name);

    // теперь ищем по частям: каждое слово из запроса должно встретиться
    const match = matchesQuery(name, q) || matchesQuery(code, q);

    div.classList.toggle("hidden", !match);
  });
});

// 🌌 Анимация фона (звёзды + кометы + клики)
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// --- Звёзды с параллаксом ---
let stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.5,
    alpha: Math.random(),
    speed: Math.random() * 0.2 + 0.05
  });
}

// --- Несколько комет ---
let comets = [];
function spawnComet() {
  comets.push({
    x: -100,
    y: Math.random() * canvas.height * 0.5,
    vx: 6 + Math.random() * 2,
    vy: 2 + Math.random(),
    life: 0,
    maxLife: 300
  });
}

// --- Частицы от кликов ---
let clickParticles = [];
canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  for (let i = 0; i < 20; i++) {
    clickParticles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 0,
      maxLife: 60,
      r: Math.random() * 2 + 1
    });
  }
});

function drawClickParticles() {
  clickParticles.forEach((p, i) => {
    ctx.fillStyle = `rgba(255,255,200,${1 - p.life / p.maxLife})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life++;

    if (p.life > p.maxLife) {
      clickParticles.splice(i, 1);
    }
  });
}

// --- Анимация ---
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Звёзды
  stars.forEach(s => {
    s.alpha += (Math.random() - 0.5) * 0.05;
    if (s.alpha < 0) s.alpha = 0;
    if (s.alpha > 1) s.alpha = 1;

    s.y += s.speed;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }

    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Случайный запуск кометы
  if (Math.random() < 0.005) {
    spawnComet();
  }

  // Кометы
  comets.forEach((c, i) => {
    let grad = ctx.createLinearGradient(c.x, c.y, c.x - 120, c.y - 60);
    grad.addColorStop(0, "rgba(255,255,255,0.8)");
    grad.addColorStop(1, "rgba(255,255,255,0)");

    ctx.strokeStyle = grad;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x - 120, c.y - 60);
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(c.x, c.y, 3.5, 0, Math.PI * 2);
    ctx.fill();

    c.x += c.vx;
    c.y += c.vy;
    c.life++;

    if (c.x > canvas.width + 150 || c.y > canvas.height + 150 || c.life > c.maxLife) {
      comets.splice(i, 1);
    }
  });

  // Частицы от кликов
  drawClickParticles();

  requestAnimationFrame(animate);
}
animate();

(function() {

  const NUMBER_WORDS = {
    "ноль":"0","один":"1","два":"2","три":"3","четыре":"4","пять":"5",
    "шесть":"6","семь":"7","восемь":"8","девять":"9","десять":"10",
    "одна":"1","две":"2","третий":"3","первый":"1","второй":"2"
  };

  function preprocessFinalText(s) {
    if (!s) return "";
    let t = String(s).toLowerCase().trim();

    // заменяем слова‑числительные на цифры
    t = t.replace(/\b([а-яё]+)\b/gi, (m) => {
      const w = m.toLowerCase();
      return NUMBER_WORDS[w] !== undefined ? NUMBER_WORDS[w] : m;
    });

    // удаляем служебные слова, которые мешают поиску
    t = t.replace(/\b(шт|штук|бут|бутылка|бутылки|бутылок|упак|упаковка|литр|л)\b/gi, ' ');

    t = t.replace(/[^0-9a-zа-яё\s\-]/gi, ' ').replace(/\s+/g, ' ').trim();

    return t;

  function normForCompare(s) {

      .toLowerCase()
      .replace(/ё/g, 'е')
      .replace(/[^a-z0-9а-яё]/gi, '')

  }

  // Левенштейн
  function levenshtein(a, b) {
    a = String(a); b = String(b);
    if (a === b) return 0;
    const al = a.length, bl = b.length;
    if (al === 0) return bl;
    if (bl === 0) return al;
    const v0 = new Array(bl + 1), v1 = new Array(bl + 1);
    for (let j = 0; j <= bl; j++) v0[j] = j;
    for (let i = 0; i < al; i++) {
      v1[0] = i + 1;
      for (let j = 0; j < bl; j++) {
        const cost = a[i] === b[j] ? 0 : 1;
        v1[j + 1] = Math.min(v1[j] + 1, v0[j + 1] + 1, v0[j] + cost);
      }
      for (let j = 0; j <= bl; j++) v0[j] = v1[j];

    return v1[bl];

  function similarityScore(a, b) {
    a = String(a || '');
    b = String(b || '');

    b = b.toLowerCase().replace(/ё/g, 'е').replace(/[^a-z0-9а-яё]/gi, '');
    if (!a || !b) return 0;

    const maxLen = Math.max(a.length, b.length);

<script>
/* Rotation‑robust scanner: вставь один раз перед </body> */
(function(){
  const ZXING_CDN = 'https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js';
  const BTN_ID = 'rot-scanner-btn';
  const OVERLAY_ID = 'rot-scanner-overlay';
  const VIDEO_ID = 'rot-scanner-video';
  const DEBOUNCE_MS = 800;
  const CROP_RATIO = 0.6; // центральная область
  let _stream = null, _video = null, _reader = null, _zxingLoaded = false, _last = {code:null, ts:0}, _raf = null;

  function $id(id){ return document.getElementById(id); }

  /* CSS */
  function injectCSS(){
    if(document.getElementById('rot-scanner-styles')) return;
    const s = document.createElement('style');
    s.id = 'rot-scanner-styles';
    s.textContent = `
#${BTN_ID}{position:fixed;left:12px;bottom:18px;z-index:2147483647;width:56px;height:56px;border-radius:12px;background:linear-gradient(180deg,#6d28d9,#4c1d95);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
#${OVERLAY_ID}{display:none;position:absolute;background:rgba(8,8,10,0.98);border-radius:10px;padding:6px;box-shadow:0 20px 60px rgba(0,0,0,0.6);z-index:2147483646;pointer-events:auto;overflow:hidden}
#${OVERLAY_ID}.visible{display:block}
#${OVERLAY_ID} .preview{width:100%;height:100%;background:#000;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center}
#${OVERLAY_ID} video{width:100%;height:100%;object-fit:cover;display:block}
#${OVERLAY_ID} .controls{position:absolute;right:8px;top:8px;display:flex;gap:8px;z-index:2147483647}
#${OVERLAY_ID} button{background:rgba(255,255,255,0.06);color:#fff;border:none;padding:6px 8px;border-radius:8px;cursor:pointer}
.item.found{box-shadow:0 8px 28px rgba(34,197,94,0.18)!important;border:2px solid rgba(34,197,94,0.18)!important;transition:box-shadow .2s,border .2s}
@media (max-width:720px){#${OVERLAY_ID}{left:8px;right:8px;top:12px;width:calc(100% - 16px)}}
`;
    document.head.appendChild(s);
  }

  /* UI */
  function createButton(){
    injectCSS();
    let btn = $id(BTN_ID);
    if(btn) return btn;
    btn = document.createElement('button');
    btn.id = BTN_ID;
    btn.title = 'Открыть сканер';
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="8" width="18" height="12" rx="2" stroke="white" stroke-width="1.6"/><path d="M12 2v6" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>';
    document.body.appendChild(btn);
    const mo = new MutationObserver(()=>{ if(!document.body.contains(btn)) document.body.appendChild(btn); });
    mo.observe(document.body, { childList:true, subtree:true });
    return btn;
  }

  function ensureOverlay(){
    injectCSS();
    let ov = $id(OVERLAY_ID);
    if(ov) return ov;
    ov = document.createElement('div');
    ov.id = OVERLAY_ID;
    ov.innerHTML = `<div class="preview"><video id="${VIDEO_ID}" playsinline muted></video></div>
      <div class="controls"><button id="rot-close">Закрыть</button></div>`;
    document.body.appendChild(ov);
    $id('rot-close').addEventListener('click', stopScanner);
    return ov;
  }

  /* Position overlay centered under search */
  function positionUnderSearch(){
    ensureOverlay();
    const ov = $id(OVERLAY_ID);
    const searchEl = document.getElementById('search') || document.querySelector('input[type="search"]') || document.querySelector('#searchInput') || document.querySelector('input[placeholder*="Поиск"]');
    const vw = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
    const vh = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0);
    const height = Math.min(Math.floor(vh / 3), 420);
    const width = Math.min(980, Math.max(320, Math.floor(vw * 0.9)));
    if(searchEl && searchEl.getBoundingClientRect){
      const rect = searchEl.getBoundingClientRect();
      const left = rect.left + window.scrollX + (rect.width - width)/2;
      const top = rect.bottom + window.scrollY + 8;
      ov.style.position = 'absolute';
      ov.style.left = Math.max(8, left) + 'px';
      ov.style.top = Math.max(8, top) + 'px';
      ov.style.width = width + 'px';
      ov.style.height = height + 'px';
      ov.style.transform = 'none';
    } else {
      ov.style.position = 'fixed';
      ov.style.left = '50%';
      ov.style.top = '12%';
      ov.style.transform = 'translateX(-50%)';
      ov.style.width = width + 'px';
      ov.style.height = height + 'px';
    }
  }

  /* ZXing loader */
  function ensureZXing(){
    if(window.ZXing || window.ZXingBrowser){ _zxingLoaded = true; return Promise.resolve(); }
    return new Promise((res, rej)=>{
      const s = document.createElement('script');
      s.src = ZXING_CDN; s.async = true;
      s.onload = ()=>{ _zxingLoaded = true; res(); };
      s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  /* Utility: rotate ImageBitmap or canvas by angle and return ImageBitmap */
  async function rotateImageBitmap(bitmap, angle){
    const w = bitmap.width, h = bitmap.height;
    const canvas = document.createElement('canvas');
    if(angle % 180 === 0){ canvas.width = w; canvas.height = h; }
    else { canvas.width = h; canvas.height = w; }
    const ctx = canvas.getContext('2d');
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(angle * Math.PI / 180);
    ctx.drawImage(bitmap, -w/2, -h/2);
    ctx.restore();
    const rotated = await createImageBitmap(canvas);
    return rotated;
  }

  /* Try BarcodeDetector on original and rotated bitmaps */
  async function tryBarcodeDetectorOnBitmap(bitmap){
    if(!('BarcodeDetector' in window)) return null;
    try{
      const detector = new BarcodeDetector({formats:["ean_13","ean_8","code_128","code_39","upc_a","upc_e","itf"]});
      // try 0,90,180,270
      const angles = [0,90,180,270];
      for(const a of angles){
        let bmp = bitmap;
        if(a !== 0){
          try{ bmp = await rotateImageBitmap(bitmap, a); }catch(e){ bmp = null; }
        }
        if(!bmp) continue;
        try{
          const res = await detector.detect(bmp);
          if(a !== 0){ bmp.close(); }
          if(res && res.length) return String(res[0].rawValue).trim();
        }catch(e){
          if(a !== 0 && bmp) bmp.close();
        }
      }
    }catch(e){}
    return null;
  }

  /* ZXing fallback: try decodeFromCanvas on rotated canvases */
  async function tryZXingOnCanvas(canvas){
    try{
      await ensureZXing();
      const ZX = window.ZXing || window.ZXingBrowser;
      if(!ZX) return null;
      if(!_reader) _reader = new ZX.BrowserMultiFormatReader();
      // try rotations by drawing rotated versions into temp canvas
      const angles = [0,90,180,270];
      for(const a of angles){
        const tmp = document.createElement('canvas');
        if(a % 180 === 0){ tmp.width = canvas.width; tmp.height = canvas.height; }
        else { tmp.width = canvas.height; tmp.height = canvas.width; }
        const ctx = tmp.getContext('2d');
        ctx.save();
        ctx.translate(tmp.width/2, tmp.height/2);
        ctx.rotate(a * Math.PI / 180);
        ctx.drawImage(canvas, -canvas.width/2, -canvas.height/2);
        ctx.restore();
        try{
          const res = _reader.decodeFromCanvas(tmp);
          if(res && (res.text || res.getText)) return String(res.text || res.getText).trim();
        }catch(e){}
      }
    }catch(e){}
    return null;
  }

  /* Main loop: grab frame, crop center, try detectors with rotations */
  async function frameLoop(){
    if(!_video || !_stream) return;
    try{
      // grab ImageBitmap if possible (fast)
      let bitmap = null;
      try{
        bitmap = await createImageBitmap(_video);
      }catch(e){
        // fallback: draw to canvas
        const vw = _video.videoWidth || 640, vh = _video.videoHeight || 480;
        const c = document.createElement('canvas'); c.width = vw; c.height = vh;
        const ctx = c.getContext('2d'); ctx.drawImage(_video, 0, 0, vw, vh);
        bitmap = await createImageBitmap(c);
      }
      // crop center
      const cw = Math.max(64, Math.floor(bitmap.width * CROP_RATIO));
      const ch = Math.max(64, Math.floor(bitmap.height * CROP_RATIO));
      const sx = Math.floor((bitmap.width - cw)/2), sy = Math.floor((bitmap.height - ch)/2);
      const crop = await createImageBitmap(bitmap, sx, sy, cw, ch);
      bitmap.close();

      // 1) try BarcodeDetector on crop with rotations
      const code1 = await tryBarcodeDetectorOnBitmap(crop);
      crop.close();
      if(code1){
        const now = Date.now();
        if(!(_last.code === code1 && (now - _last.ts) < DEBOUNCE_MS)){
          _last = { code: code1, ts: now };
          stopScanner();
          handleDetected(code1);
          return;
        }
      }

      // 2) ZXing fallback: draw crop to canvas and try rotated decode
      // draw crop to canvas
      const canvas = document.createElement('canvas'); canvas.width = cw; canvas.height = ch;
      const ctx = canvas.getContext('2d'); ctx.drawImage(await createImageBitmap(_video), sx, sy, cw, ch, 0, 0, cw, ch);
      const code2 = await tryZXingOnCanvas(canvas);
      if(code2){
        const now = Date.now();
        if(!(_last.code === code2 && (now - _last.ts) < DEBOUNCE_MS)){
          _last = { code: code2, ts: now };
          stopScanner();
          handleDetected(code2);
          return;
        }
      }
    }catch(e){}
    // schedule next
    _raf = requestAnimationFrame(frameLoop);
  }

  /* Start scanner */
  async function startScanner(){
    ensureOverlay();
    positionUnderSearch();
    const ov = $id(OVERLAY_ID);
    ov.classList.add('visible');
    try{
      const constraints = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };
      _stream = await navigator.mediaDevices.getUserMedia(constraints);
      _video = $id(VIDEO_ID);
      _video.srcObject = _stream;
      await _video.play().catch(()=>{});
      // start frame loop using requestVideoFrameCallback if available for lower latency
      if(_video.requestVideoFrameCallback){
        const cb = () => { if(!_stream) return; frameLoop(); };
        try{ _video.requestVideoFrameCallback(()=>{ frameLoop(); }); }catch(e){ _raf = requestAnimationFrame(frameLoop); }
      } else {
        _raf = requestAnimationFrame(frameLoop);
      }
    }catch(err){
      console.error('camera start error', err);
      alert('Не удалось открыть камеру. Проверьте разрешения и HTTPS.');
      ov.classList.remove('visible');
    }
  }

  /* Stop scanner */
  function stopScanner(){
    try{ if(_raf){ cancelAnimationFrame(_raf); _raf = null; } }catch(e){}
    try{ if(_video){ _video.pause(); _video.srcObject = null; } }catch(e){}
    try{ if(_stream && _stream.getTracks){ _stream.getTracks().forEach(t=>{ try{ t.stop(); }catch(e){} }); } }catch(e){}
    _stream = null;
    const ov = $id(OVERLAY_ID); if(ov) ov.classList.remove('visible');
  }

  /* Fix mojibake */
  function fixEncodingIfNeeded(s){
    try{
      if(!s || typeof s !== 'string') return s;
      if(/[А-Яа-яЁё]/.test(s)) return s;
      if(typeof TextDecoder === 'function'){
        try{
          const bytes = new Uint8Array([...s].map(ch => ch.charCodeAt(0) & 0xFF));
          const dec = new TextDecoder('windows-1251');
          const decoded = dec.decode(bytes);
          if(/[А-Яа-яЁё]/.test(decoded)) return decoded;
        }catch(e){}
      }
      return s;
    }catch(e){ return s; }
  }

  /* On detected: lookup and insert name / highlight */
  function handleDetected(code){
    try{
      let product = null;
      try{
        if(window.barcodeDB && typeof window.barcodeDB === 'object') product = window.barcodeDB[code];
        else if(window.db && window.db[code]){ const name = window.db[code]; product = (typeof name === 'string') ? { code, name } : name; }
        else {
          const raw = localStorage.getItem('barcodeDB');
          if(raw){ const parsed = JSON.parse(raw); if(parsed && parsed[code]) product = parsed[code]; }
        }
      }catch(e){ console.warn('lookup error', e); }

      if(typeof window.handleDetectedByName === 'function'){ window.handleDetectedByName(String(code)); return; }
      if(typeof window.handleDetected === 'function'){ window.handleDetected(String(code)); return; }

      const rawName = product && (product.name || product.title || product) ? (product.name || product.title || product).toString() : null;
      const name = fixEncodingIfNeeded(rawName) || null;
      if(name){
        insertIntoSearch(name);
        highlightCard(code, name);
      } else {
        insertIntoSearch(code);
      }
    }catch(e){ console.error(e); }
  }

  function insertIntoSearch(value){
    try{
      const searchEl = document.getElementById('search') || document.querySelector('input[type="search"]') || document.querySelector('#searchInput') || document.querySelector('input[placeholder*="Поиск"]');
      if(searchEl){
        searchEl.focus();
        searchEl.value = value;
        searchEl.dispatchEvent(new Event('input', { bubbles: true }));
        searchEl.dispatchEvent(new Event('change', { bubbles: true }));
        return true;
      }
      return false;
    }catch(e){ return false; }
  }

  function highlightCard(code, name){
    try{
      if(code){
        const card = document.querySelector(`.item[data-code="${code}"]`);
        if(card){
          card.classList.add('found');
          setTimeout(()=>card.classList.remove('found'), 2200);
          card.classList.remove('hidden');
          card.scrollIntoView({ behavior:'smooth', block:'center' });
          const input = card.querySelector('input[data-code]') || card.querySelector('input');
          if(input) setTimeout(()=>input.focus(), 300);
          return;
        }
      }
      if(name){
        const nameNorm = String(name||'').toLowerCase();
        const cards = document.querySelectorAll('.item');
        for(const c of cards){
          const titleEl = c.querySelector('.title') || c.querySelector('.label') || c.querySelector('.code');
          const text = titleEl ? titleEl.textContent : c.textContent;
          if(String(text||'').toLowerCase().includes(nameNorm)){
            c.classList.add('found');
            setTimeout(()=>c.classList.remove('found'), 2200);
            c.classList.remove('hidden');
            c.scrollIntoView({ behavior:'smooth', block:'center' });
            const input = c.querySelector('input[data-code]') || c.querySelector('input');
            if(input) setTimeout(()=>input.focus(), 300);
            return;
          }
        }
      }
    }catch(e){ console.warn(e); }
  }

  /* Init */
  function init(){
    const btn = createButton();
    btn.addEventListener('click', async (e)=>{ e.preventDefault(); positionUnderSearch(); await startScanner(); });
    window.addEventListener('resize', ()=>{ try{ positionUnderSearch(); }catch(e){} });
    window.addEventListener('scroll', ()=>{ try{ positionUnderSearch(); }catch(e){} }, { passive:true });
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();

  // expose
  window.rotScanner = { start: startScanner, stop: stopScanner };

})();
