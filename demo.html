  <!-- 🔥 Проверка авторизации и таймера -->
  <script>
    // Проверяем, авторизован ли пользователь
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    const loginTime = localStorage.getItem("loginTime");

    // Если нет данных — отправляем на логин
    if (!isLoggedIn || !loginTime) {
      window.location.href = "login1.html";
    }

    // Проверяем, прошло ли больше 2 часов (7200000 мс)
    const now = Date.now();
    const diff = now - Number(loginTime);

    if (diff > 7200000) {
      // Удаляем данные авторизации
      localStorage.removeItem("isLoggedIn");
      localStorage.removeItem("loginTime");

      // Отправляем на логин
      window.location.href = "login1.html";
    }

    // Обновляем время активности
    localStorage.setItem("loginTime", Date.now());
  </script>

<script>

  // Время последней активности
  const LAST_ACTIVITY_KEY = "lastActivity";
  const MAX_IDLE_TIME = 6 * 60 * 60 * 1000; // 6 часов

  function updateActivity() {
    localStorage.setItem(LAST_ACTIVITY_KEY, Date.now().toString());
  }

  function checkIdleTime() {
    const last = parseInt(localStorage.getItem(LAST_ACTIVITY_KEY) || "0", 10);
    const now = Date.now();
    if (last && now - last > MAX_IDLE_TIME) {
      localStorage.removeItem("isAuth");
      window.location.href = "/demo.html";
    }
  }

  // Обновляем активность при действиях
  ["click", "keydown", "mousemove", "scroll", "touchstart"].forEach(evt => {
    document.addEventListener(evt, updateActivity, { passive: true });
  });

  // Проверка каждые 60 секунд
  setInterval(checkIdleTime, 30 * 60 * 1000);
  updateActivity();

  // Базовые переменные
  const list = document.getElementById("list");
  const searchInput = document.getElementById("search");
  const keyboard = document.getElementById("custom-keyboard");
  let allItems = [], activeInput = null;
  let sessionValues = {};

  // Сканер переменные (перенесены и адаптированы)
let reader = null;
let currentStream = null;
let scanning = false;
let lastDetected = { code: null, ts: 0 };
const DEBOUNCE_MS = 700;

const scannerCard      = document.getElementById('scannerCard');
const previewVideo     = document.getElementById('preview');
const deviceSelect     = document.getElementById('deviceSelect');
const torchBtn         = document.getElementById('torchBtn');
const closeScannerBtn  = document.getElementById('closeScannerBtn');
const scanResult       = document.getElementById('scanResult');

let _scanRaf = null;
let _lastScanTs = 0;
const SCAN_MIN_INTERVAL = 80;

let barcodeDetector = null;

// Попытка создать BarcodeDetector (современные браузеры)
if ('BarcodeDetector' in window) {
  try {
    const supportedFormats = ['ean_13','ean_8','code_128','code_39','upc_e','upc_a','qr_code'];
    barcodeDetector = new BarcodeDetector({ formats: supportedFormats });
  } catch (e) {
    barcodeDetector = null;
  }
}

// Запуск камеры и инициализация детектора
async function startCamera(deviceId) {
  stopScannerStream(); // остановим предыдущий поток, если есть
  try {
    const constraints = {
      video: {
        deviceId: deviceId ? { exact: deviceId } : undefined,
        width: { ideal: 1280 },
        height: { ideal: 720 },
        facingMode: 'environment'
      },
      audio: false
    };
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    previewVideo.srcObject = currentStream;
    await previewVideo.play();
    scanning = true;
    scanResult.textContent = 'Поиск...';
    startScanLoop();
  } catch (e) {
    console.error('startCamera error', e);
    alert('Не удалось запустить камеру');
  }
}

function stopScannerStream() {
  scanning = false;
  if (_scanRaf) {
    cancelAnimationFrame(_scanRaf);
    _scanRaf = null;
  }
  if (previewVideo) {
    try { previewVideo.pause(); } catch {}
    try { previewVideo.srcObject = null; } catch {}
  }
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
  }
}

// Основной цикл сканирования
async function scanLoop() {
  if (!scanning) return;
  const now = performance.now();
  if (now - _lastScanTs < SCAN_MIN_INTERVAL) {
    _scanRaf = requestAnimationFrame(scanLoop);
    return;
  }
  _lastScanTs = now;

  try {
    if (barcodeDetector) {
      // BarcodeDetector поддерживает HTMLVideoElement напрямую
      const results = await barcodeDetector.detect(previewVideo);
      if (results && results.length > 0) {
        for (const r of results) {
          const code = (r.rawValue || '').trim();
          if (code) {
            handleDetected(code);
            break;
          }
        }
      }
    } else {
      // Фоллбек: пробуем взять кадр и распознать QR/EAN через canvas + Tesseract не подходит для штрихкодов.
      // Если BarcodeDetector отсутствует — показываем подсказку.
      scanResult.textContent = 'BarcodeDetector не поддерживается в этом браузере';
    }
  } catch (e) {
    console.error('scanLoop error', e);
  }

  _scanRaf = requestAnimationFrame(scanLoop);
}

function startScanLoop() {
  if (_scanRaf) cancelAnimationFrame(_scanRaf);
  _scanRaf = requestAnimationFrame(scanLoop);
}

// Обработка найденного штрихкода
function handleDetected(code) {
  const now = Date.now();
  if (lastDetected.code === code && (now - lastDetected.ts) < DEBOUNCE_MS) {
    return;
  }
  lastDetected = { code, ts: now };
  scanResult.textContent = code;

  // Поиск по базе: сначала точное совпадение по коду, затем по вхождению
  const items = Array.isArray(allItems) ? allItems : [];
  let found = items.find(i => String(i.code) === String(code));
  if (!found) {
    found = items.find(i => String(i.code).includes(String(code)));
  }

  if (found) {
    // Подставляем название в строку поиска и триггерим поиск
    searchInput.value = found.name || found.code || code;
    searchInput.dispatchEvent(new Event('input', { bubbles: true }));

    // Если есть функция открытия карточки — вызываем
    try {
      if (typeof window.openItem === 'function') {
        window.openItem(found);
      } else if (typeof window.openFirstItemIfNeeded === 'function') {
        window.openFirstItemIfNeeded([found]);
      } else if (typeof window.renderItems === 'function') {
        window.renderItems([found]);
      }
    } catch (e) {
      console.error('open found item error', e);
    }

    // Закрываем сканер после успешного распознавания
    stopScanner();
    scannerCard.style.display = 'none';
  } else {
    // Если не найдено — просто подставляем код в поиск (пользователь может вручную искать)
    searchInput.value = code;
    searchInput.dispatchEvent(new Event('input', { bubbles: true }));
    // Не закрываем сканер — даём возможность повторить
  }
}

scanBtn.addEventListener('click', () => {

  (async () => {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videoDevices = devices.filter(d => d.kind === 'videoinput');
      if (videoDevices.length === 0) {
        alert('Камеры не найдены');
        return;
      }
      let backCam = videoDevices.find(d => {
        const label = (d.label || '').toLowerCase();
        return label.includes('back') || label.includes('rear') || label.includes('зад') || label.includes('environment');
      });

      deviceSelect.innerHTML = videoDevices.map(d => `<option value="${d.deviceId}">${d.label || 'Камера'}</option>`).join('');
      deviceSelect.value = defaultCamId;
      await startCamera(defaultCamId);
    } catch (e) {
      console.error('init scanner error', e);
      alert('Не удалось инициализировать сканер');
    }
  })();
});

torchBtn.addEventListener('click', async () => {

    const tracks = currentStream?.getVideoTracks();

      const track = tracks[0];
      const capabilities = track.getCapabilities?.();
      if (capabilities?.torch) {
        const current = track.getSettings().torch;

        alert('Фонарик не поддерживается этой камерой');
      }

// Загрузка новой локалки
function loadLocalka(data) {
  // определяем ID локалки
  const currentLocalkaId = data.docId || "loc_" + new Date().toISOString().slice(0,10);
  const sessionKey = "autosave_session_" + currentLocalkaId;

  // ❌ очищаем автосейв для этой локалки (чистый старт)
  localStorage.removeItem(sessionKey);

  allItems = data;
  sessionValues = {};

  // сохраняем ссылку на текущую локалку глобально, чтобы autosave знал её ID
  window.localkaData = data;

  render(allItems);
}

// Автосохранение
function autosave() {
  const currentLocalkaId = (window.localkaData && window.localkaData.docId)
    ? window.localkaData.docId
    : "loc_" + new Date().toISOString().slice(0,10);

  const sessionKey = "autosave_session_" + currentLocalkaId;

  const session = {
    items: allItems,
    values: sessionValues
  };

  localStorage.setItem(sessionKey, JSON.stringify(session));
}

  // Автосохранение при закрытии вкладки
  window.addEventListener("beforeunload", autosave);

  // Группировка текста по строкам PDF
  function groupByY(items) {
    const lines = {};
    items.forEach(item => {
      const y = Math.round(item.transform[5]);
      if (!lines[y]) lines[y] = [];
      lines[y].push({ str: item.str, x: item.transform[4] });
    });
    return Object.values(lines).map(words =>
      words.sort((a, b) => a.x - b.x).map(w => w.str).join(' ')
    );
  }

  // Парсинг строк в объекты товаров
  function parseLines(lines) {
    const items = [];
    for (let line of lines) {
      line = line.trim();
      if (!/^\d+\s+\d{4,6}/.test(line)) continue;

      const match = line.match(/^(\d+)\s+(\d{4,6})\s+(.+?)\s+(\d+\*\d+)?\s+([\d.,]+)\s+(.*)$/i);
      if (match) {
        const rawTail = match[6];
        const qtyMatches = [...rawTail.matchAll(/(\d+)\s*шт/gi)];
        const docQty = qtyMatches.length > 0 ? parseInt(qtyMatches[qtyMatches.length - 1][1]) : null;

        items.push({
          code: match[2],
          name: match[3].trim(),
          unit: match[4] || '',
          price: parseFloat(match[5].replace(',', '.')),
          docQty
        });
      }
    }
    return items;
  }

  // Обновление итогов
  function updateSummary(items) {
    let match = 0, missing = 0, excess = 0, delta = 0;
    items.forEach(item => {
      const input = document.querySelector(`input[data-code="${item.code}"]`);
      if (!input) return;
      const raw = input.value.trim();
      const actual = parseFloat(raw.replace(',', '.')) || 0;
      if (actual === item.docQty) match++;
      else if (actual < item.docQty) { missing++; delta += item.docQty - actual; }
      else { excess++; delta += actual - item.docQty; }
    });
  }
  // Рендер списка товаров

function render(items) {
  list.innerHTML = '';
  items.forEach(item => {
    const value = sessionValues[item.code] || localStorage.getItem("qty_" + item.code) || "";
    const div = document.createElement("div");
    div.className = "item";
    div.dataset.code = item.code;
    div.innerHTML = `
      <div class="field"><span class="label">Артикул:</span> ${item.code}</div>
      <div class="field"><span class="label">Название:</span> ${item.name}</div>
      <div class="field"><span class="label">Размерность:</span> ${item.unit}</div>
      <div class="field"><span class="label">Цена:</span> ${item.price.toFixed(2)} ₽</div>
      <div class="field"><span class="label">По документам:</span> ${item.docQty} шт</div>
      <div class="field">
        <span class="label">Фактическое количество:</span>
        <input type="text" data-code="${item.code}" value="${value}" inputmode="none" readonly />
      </div>
    `;

    // начальная окраска при рендере
    let actual = 0;
    try { actual = Function("return " + value.replace(',', '.'))() || 0; } catch {}
    if (actual === item.docQty) div.classList.add("match");
    else if (actual < item.docQty) div.classList.add("missing");
    else if (actual > item.docQty) div.classList.add("excess");

    list.appendChild(div);
  });
  updateSummary(allItems);
  attachInputHandlers(); // подключаем твою кастомную клавиатуру и обработку ввода
}

// Подключение обработчиков для инпутов и клавиатуры
function attachInputHandlers() {
  document.querySelectorAll('input[data-code]').forEach(input => {
    input.addEventListener('focus', () => {
      activeInput = input;
      keyboard.classList.add("show");
      document.getElementById("content").classList.add("with-keyboard");
      setTimeout(() => input.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
    });
    input.addEventListener('click', () => {
      activeInput = input;
      keyboard.classList.add("show");
      document.getElementById("content").classList.add("with-keyboard");
      setTimeout(() => input.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
    });
  });

  // Клики по кнопкам клавиатуры
  keyboard.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => {
      if (!activeInput) return;
      const val = btn.textContent;
      if (val === "←") {
        activeInput.value = activeInput.value.slice(0, -1);
      } else {
        activeInput.value += val;
      }
      // 🔥 теперь событие всплывает и ловится глобальным обработчиком
      activeInput.dispatchEvent(new Event("input", { bubbles: true }));
    };
  });

  // Скрытие клавиатуры при клике вне
  document.addEventListener("click", e => {
    if (!e.target.closest("#custom-keyboard") && !e.target.matches("input[data-code]")) {
      keyboard.classList.remove("show");
      document.getElementById("content").classList.remove("with-keyboard");
      activeInput = null;
    }
  });
}

// Функция нормализации текста для поиска
function normalize(str) {
  return String(str || "")
    .toLowerCase()
    .replace(/ё/g, "е")   // ё → е
    .replace(/№/g, "")    // убираем символ №
    .replace(/\s+/g, " ") // схлопываем пробелы
    .trim();
}

// Проверка: все ли слова из запроса встречаются в строке
function matchesQuery(text, query) {
  const words = query.split(" ");
  return words.every(w => text.includes(w));
}

// Поиск
searchInput.addEventListener("input", () => {
  const q = normalize(searchInput.value);

  document.querySelectorAll("#list .item").forEach(div => {
    const code = normalize(div.dataset.code);
    const item = allItems.find(i => i.code === div.dataset.code);
    if (!item) { 
      div.classList.add("hidden"); 
      return; 
    }

    const name = normalize(item.name);

    // теперь ищем по частям: каждое слово из запроса должно встретиться
    const match = matchesQuery(name, q) || matchesQuery(code, q);

    div.classList.toggle("hidden", !match);
  });
});

// Очистка поиска
document.getElementById("clear-search").addEventListener("click", () => {
  searchInput.value = '';
  document.querySelectorAll("#list .item").forEach(div => div.classList.remove("hidden"));
});

// Обработка ввода значений и перекраска карточек
list.addEventListener("input", e => {
  if (e.target.tagName === "INPUT") {
    const code = e.target.dataset.code;
    const value = e.target.value;
    sessionValues[code] = value;
    localStorage.setItem("qty_" + code, value);

    const raw = value.replace(',', '.').trim();
    let actual = NaN;

    try {
      let safeRaw = raw;

      // если строка оканчивается на оператор (+ - * /), убираем его
      if (/[\+\-\*\/]$/.test(safeRaw)) {
        safeRaw = safeRaw.slice(0, -1);
      }

      if (safeRaw) {
        actual = Function("return " + safeRaw)();
      }
    } catch {
      actual = NaN;
    }

    const item = allItems.find(i => i.code === code);
    const card = e.target.closest(".item");
    card.classList.remove("match", "missing", "excess");

    if (!value) {
      // нейтральный вид
    } else if (!isNaN(actual)) {
      if (actual === item.docQty) {
        card.classList.add("match");
      } else if (actual < item.docQty) {
        card.classList.add("missing");
      } else if (actual > item.docQty) {
        card.classList.add("excess");
      }
    }

    updateSummary(allItems);
    autosave();
  }
});

  // Форматирование разницы: пустая ячейка для нуля, +/− для ненулевых
  function formatDiffCell(diff) {
    const n = Number(diff);
    const EPS = 1e-9;
    if (!isFinite(n) || Math.abs(n) <= EPS) return ''; // пустая ячейка вместо "0"
    // Сохраняем целочисленный вид, иначе показываем с двумя знаками
    const s = (Math.abs(n % 1) < EPS) ? String(n) : String(Number(n.toFixed(2)));

  // Итоговое окно (все позиции + цветовая индикация)
function showSummaryModal() {
  const rows = allItems.map(item => {
    const input = document.querySelector(`input[data-code="${item.code}"]`);
    const raw = (input ? input.value.trim() : (sessionValues[item.code] || "")).trim();

    // actual должен быть 0 при пустом/невалидном факте — чтобы разница считалась (0 - docQty)
    let actual = 0;

    try {
      let safeRaw = raw.replace(',', '.').replace(/[^0-9+\-*/().]/g, '').trim();

      // если строка оканчивается на оператор (+ - * /), убираем его
      if (/[\+\-\*\/]$/.test(safeRaw)) {
        safeRaw = safeRaw.slice(0, -1);
      }

      if (safeRaw) {
        actual = Function(`"use strict"; return (${safeRaw})`)() || 0;
      }
    } catch {
      actual = 0;
    }

    // разницу считаем всегда: даже если факт пустой → 0 - docQty
    const delta = actual - item.docQty;

    // цвет и знак для разницы
    const color = delta > 0 ? "green" : (delta < 0 ? "red" : "gray");
    const deltaStr = delta > 0 ? `+${delta}` : `${delta}`;

    // в колонке «Факт» показываем пусто, если поле факта пустое; иначе — посчитанное значение
    const factCell = raw !== "" ? actual : "";

    return `
      <tr>
        <td style="border:1px solid #ccc; padding:4px;">${item.code}</td>
        <td style="border:1px solid #ccc; padding:4px;">${item.name}</td>
        <td style="border:1px solid #ccc; padding:4px;">${item.docQty}</td>
        <td style="border:1px solid #ccc; padding:4px;">${factCell}</td>
        <td style="border:1px solid #ccc; padding:4px; color:${color};">${deltaStr}</td>
      </tr>
    `;
  });

  const html = `
    <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
      <thead style="position:sticky; top:0; background:#fff; z-index:1;">
        <tr style="background:#f3f4f6;">

// 🌌 Анимация фона (звёзды + кометы + клики)
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// --- Звёзды с параллаксом ---
let stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.5,
    alpha: Math.random(),
    speed: Math.random() * 0.2 + 0.05
  });
}

// --- Несколько комет ---
let comets = [];
function spawnComet() {
  comets.push({
    x: -100,
    y: Math.random() * canvas.height * 0.5,
    vx: 6 + Math.random() * 2,
    vy: 2 + Math.random(),
    life: 0,
    maxLife: 300
  });
}

// --- Частицы от кликов ---
let clickParticles = [];
canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  for (let i = 0; i < 20; i++) {
    clickParticles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 0,
      maxLife: 60,
      r: Math.random() * 2 + 1
    });
  }
});

function drawClickParticles() {
  clickParticles.forEach((p, i) => {
    ctx.fillStyle = `rgba(255,255,200,${1 - p.life / p.maxLife})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life++;

    if (p.life > p.maxLife) {
      clickParticles.splice(i, 1);
    }
  });
}

// --- Анимация ---
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Звёзды
  stars.forEach(s => {
    s.alpha += (Math.random() - 0.5) * 0.05;
    if (s.alpha < 0) s.alpha = 0;
    if (s.alpha > 1) s.alpha = 1;

    s.y += s.speed;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }

    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Случайный запуск кометы
  if (Math.random() < 0.005) {
    spawnComet();
  }

  // Кометы
  comets.forEach((c, i) => {
    let grad = ctx.createLinearGradient(c.x, c.y, c.x - 120, c.y - 60);
    grad.addColorStop(0, "rgba(255,255,255,0.8)");
    grad.addColorStop(1, "rgba(255,255,255,0)");

    ctx.strokeStyle = grad;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x - 120, c.y - 60);
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(c.x, c.y, 3.5, 0, Math.PI * 2);
    ctx.fill();

    c.x += c.vx;
    c.y += c.vy;
    c.life++;

    if (c.x > canvas.width + 150 || c.y > canvas.height + 150 || c.life > c.maxLife) {
      comets.splice(i, 1);
    }
  });

  // Частицы от кликов
  drawClickParticles();

  requestAnimationFrame(animate);
}
animate();
