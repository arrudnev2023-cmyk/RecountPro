  <!-- 🔥 Проверка авторизации и таймера -->
  <script>
    // Проверяем, авторизован ли пользователь
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    const loginTime = localStorage.getItem("loginTime");

    // Если нет данных — отправляем на логин
    if (!isLoggedIn || !loginTime) {
      window.location.href = "login1.html";
    }

    // Проверяем, прошло ли больше 2 часов (7200000 мс)
    const now = Date.now();
    const diff = now - Number(loginTime);

    if (diff > 7200000) {
      // Удаляем данные авторизации
      localStorage.removeItem("isLoggedIn");
      localStorage.removeItem("loginTime");

      // Отправляем на логин
      window.location.href = "login1.html";
    }

    // Обновляем время активности
    localStorage.setItem("loginTime", Date.now());
  </script>

<script>

  // Время последней активности
  const LAST_ACTIVITY_KEY = "lastActivity";
  const MAX_IDLE_TIME = 6 * 60 * 60 * 1000; // 6 часов

  function updateActivity() {
    localStorage.setItem(LAST_ACTIVITY_KEY, Date.now().toString());
  }

  function checkIdleTime() {
    const last = parseInt(localStorage.getItem(LAST_ACTIVITY_KEY) || "0", 10);
    const now = Date.now();
    if (last && now - last > MAX_IDLE_TIME) {
      localStorage.removeItem("isAuth");
      window.location.href = "/demo.html";
    }
  }

  // Обновляем активность при действиях
  ["click", "keydown", "mousemove", "scroll", "touchstart"].forEach(evt => {
    document.addEventListener(evt, updateActivity, { passive: true });
  });

  // Проверка каждые 60 секунд
  setInterval(checkIdleTime, 30 * 60 * 1000);
  updateActivity();

  // Базовые переменные
  const list = document.getElementById("list");
  const searchInput = document.getElementById("search");
  const keyboard = document.getElementById("custom-keyboard");
  let allItems = [], activeInput = null;
  let sessionValues = {};

// Восстановление при загрузке страницы
window.addEventListener("DOMContentLoaded", () => {
  // 🔑 определяем ID локалки: берём docId из JSON, если нет — fallback по дате
  const currentLocalkaId = (window.localkaData && window.localkaData.docId)
    ? window.localkaData.docId
    : "loc_" + new Date().toISOString().slice(0,10);

  const sessionKey = "autosave_session_" + currentLocalkaId;

  // пробуем восстановить сохранённую сессию именно этой локалки
  const savedSession = localStorage.getItem(sessionKey);
  if (savedSession) {
    try {
      const session = JSON.parse(savedSession);
      allItems = session.items || [];
      sessionValues = session.values || {};
    } catch {
      allItems = [];
      sessionValues = {};
    }
  } else {
    allItems = [];
    sessionValues = {};
  }

  if (allItems.length > 0) {
    render(allItems);
  }
});

// Загрузка новой локалки
function loadLocalka(data) {
  // определяем ID локалки
  const currentLocalkaId = data.docId || "loc_" + new Date().toISOString().slice(0,10);
  const sessionKey = "autosave_session_" + currentLocalkaId;

  // ❌ очищаем автосейв для этой локалки (чистый старт)
  localStorage.removeItem(sessionKey);

  allItems = data;
  sessionValues = {};

  // сохраняем ссылку на текущую локалку глобально, чтобы autosave знал её ID
  window.localkaData = data;

  render(allItems);
}

// Автосохранение
function autosave() {
  const currentLocalkaId = (window.localkaData && window.localkaData.docId)
    ? window.localkaData.docId
    : "loc_" + new Date().toISOString().slice(0,10);

  const sessionKey = "autosave_session_" + currentLocalkaId;

  const session = {

  // Автосохранение при закрытии вкладки
  window.addEventListener("beforeunload", autosave);

  // Группировка текста по строкам PDF
  function groupByY(items) {
    const lines = {};
    items.forEach(item => {
      const y = Math.round(item.transform[5]);
      if (!lines[y]) lines[y] = [];
      lines[y].push({ str: item.str, x: item.transform[4] });
    });
    return Object.values(lines).map(words =>
      words.sort((a, b) => a.x - b.x).map(w => w.str).join(' ')
    );
  }

  // Парсинг строк в объекты товаров
  function parseLines(lines) {
    const items = [];
    for (let line of lines) {
      line = line.trim();
      if (!/^\d+\s+\d{4,6}/.test(line)) continue;

      const match = line.match(/^(\d+)\s+(\d{4,6})\s+(.+?)\s+(\d+\*\d+)?\s+([\d.,]+)\s+(.*)$/i);
      if (match) {
        const rawTail = match[6];
        const qtyMatches = [...rawTail.matchAll(/(\d+)\s*шт/gi)];
        const docQty = qtyMatches.length > 0 ? parseInt(qtyMatches[qtyMatches.length - 1][1]) : null;

        items.push({
          code: match[2],
          name: match[3].trim(),
          unit: match[4] || '',
          price: parseFloat(match[5].replace(',', '.')),
          docQty
        });
      }
    }
    return items;
  }

  // Обновление итогов
  function updateSummary(items) {
    let match = 0, missing = 0, excess = 0, delta = 0;
    items.forEach(item => {
      const input = document.querySelector(`input[data-code="${item.code}"]`);
      if (!input) return;
      const raw = input.value.trim();
      const actual = parseFloat(raw.replace(',', '.')) || 0;
      if (actual === item.docQty) match++;
      else if (actual < item.docQty) { missing++; delta += item.docQty - actual; }
      else { excess++; delta += actual - item.docQty; }
    });
  }
  // Рендер списка товаров

function render(items) {
  list.innerHTML = '';
  items.forEach(item => {
    const value = sessionValues[item.code] || localStorage.getItem("qty_" + item.code) || "";

        <input type="text" data-code="${item.code}" value="${value}" inputmode="none" readonly />
      </div>
    `;

    // начальная окраска при рендере
    let actual = 0;
    try { actual = Function("return " + value.replace(',', '.'))() || 0; } catch {}
    if (actual === item.docQty) div.classList.add("match");
    else if (actual < item.docQty) div.classList.add("missing");
    else if (actual > item.docQty) div.classList.add("excess");

    list.appendChild(div);
  });

}

// Подключение обработчиков для инпутов и клавиатуры
function attachInputHandlers() {
  document.querySelectorAll('input[data-code]').forEach(input => {
    input.addEventListener('focus', () => {
      activeInput = input;
      keyboard.classList.add("show");
      document.getElementById("content").classList.add("with-keyboard");
      setTimeout(() => input.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
    });
    input.addEventListener('click', () => {
      activeInput = input;
      keyboard.classList.add("show");
      document.getElementById("content").classList.add("with-keyboard");
      setTimeout(() => input.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
    });
  });

  // Клики по кнопкам клавиатуры
  keyboard.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => {
      if (!activeInput) return;
      const val = btn.textContent;
      if (val === "←") {
        activeInput.value = activeInput.value.slice(0, -1);
      } else {
        activeInput.value += val;
      }
      // 🔥 теперь событие всплывает и ловится глобальным обработчиком
      activeInput.dispatchEvent(new Event("input", { bubbles: true }));
    };
  });

  // Скрытие клавиатуры при клике вне
  document.addEventListener("click", e => {
    if (!e.target.closest("#custom-keyboard") && !e.target.matches("input[data-code]")) {
      keyboard.classList.remove("show");
      document.getElementById("content").classList.remove("with-keyboard");
      activeInput = null;
    }
  });
}

// Функция нормализации текста для поиска
function normalize(str) {
  return String(str || "")
    .toLowerCase()
    .replace(/ё/g, "е")   // ё → е
    .replace(/№/g, "")    // убираем символ №
    .replace(/\s+/g, " ") // схлопываем пробелы
    .trim();
}

// Проверка: все ли слова из запроса встречаются в строке
function matchesQuery(text, query) {
  const words = query.split(" ");
  return words.every(w => text.includes(w));
}

// Поиск
searchInput.addEventListener("input", () => {
  const q = normalize(searchInput.value);

  document.querySelectorAll("#list .item").forEach(div => {
    const code = normalize(div.dataset.code);
    const item = allItems.find(i => i.code === div.dataset.code);
    if (!item) { 
      div.classList.add("hidden"); 
      return; 
    }

    const name = normalize(item.name);

    // теперь ищем по частям: каждое слово из запроса должно встретиться
    const match = matchesQuery(name, q) || matchesQuery(code, q);

    div.classList.toggle("hidden", !match);
  });
});

// 🌌 Анимация фона (звёзды + кометы + клики)
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// --- Звёзды с параллаксом ---
let stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.5,
    alpha: Math.random(),
    speed: Math.random() * 0.2 + 0.05
  });
}

// --- Несколько комет ---
let comets = [];
function spawnComet() {
  comets.push({
    x: -100,
    y: Math.random() * canvas.height * 0.5,
    vx: 6 + Math.random() * 2,
    vy: 2 + Math.random(),
    life: 0,
    maxLife: 300
  });
}

// --- Частицы от кликов ---
let clickParticles = [];
canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  for (let i = 0; i < 20; i++) {
    clickParticles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 0,
      maxLife: 60,
      r: Math.random() * 2 + 1
    });
  }
});

function drawClickParticles() {
  clickParticles.forEach((p, i) => {
    ctx.fillStyle = `rgba(255,255,200,${1 - p.life / p.maxLife})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life++;

    if (p.life > p.maxLife) {
      clickParticles.splice(i, 1);
    }
  });
}

// --- Анимация ---
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Звёзды
  stars.forEach(s => {
    s.alpha += (Math.random() - 0.5) * 0.05;
    if (s.alpha < 0) s.alpha = 0;
    if (s.alpha > 1) s.alpha = 1;

    s.y += s.speed;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }

    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Случайный запуск кометы
  if (Math.random() < 0.005) {
    spawnComet();
  }

  // Кометы
  comets.forEach((c, i) => {
    let grad = ctx.createLinearGradient(c.x, c.y, c.x - 120, c.y - 60);
    grad.addColorStop(0, "rgba(255,255,255,0.8)");
    grad.addColorStop(1, "rgba(255,255,255,0)");

    ctx.strokeStyle = grad;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x - 120, c.y - 60);
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(c.x, c.y, 3.5, 0, Math.PI * 2);
    ctx.fill();

    c.x += c.vx;
    c.y += c.vy;
    c.life++;

    if (c.x > canvas.width + 150 || c.y > canvas.height + 150 || c.life > c.maxLife) {
      comets.splice(i, 1);
    }
  });

  // Частицы от кликов
  drawClickParticles();

  requestAnimationFrame(animate);
}
animate();

(function() {

  const NUMBER_WORDS = {
    "ноль":"0","один":"1","два":"2","три":"3","четыре":"4","пять":"5",
    "шесть":"6","семь":"7","восемь":"8","девять":"9","десять":"10",
    "одна":"1","две":"2","третий":"3","первый":"1","второй":"2"
  };

  function preprocessFinalText(s) {
    if (!s) return "";
    let t = String(s).toLowerCase().trim();

    // заменяем слова‑числительные на цифры
    t = t.replace(/\b([а-яё]+)\b/gi, (m) => {
      const w = m.toLowerCase();
      return NUMBER_WORDS[w] !== undefined ? NUMBER_WORDS[w] : m;
    });

    // удаляем служебные слова, которые мешают поиску
    t = t.replace(/\b(шт|штук|бут|бутылка|бутылки|бутылок|упак|упаковка|литр|л)\b/gi, ' ');

    t = t.replace(/[^0-9a-zа-яё\s\-]/gi, ' ').replace(/\s+/g, ' ').trim();

    return t;

  function normForCompare(s) {

      .toLowerCase()
      .replace(/ё/g, 'е')
      .replace(/[^a-z0-9а-яё]/gi, '')

  }

  // Левенштейн
  function levenshtein(a, b) {
    a = String(a); b = String(b);
    if (a === b) return 0;
    const al = a.length, bl = b.length;
    if (al === 0) return bl;
    if (bl === 0) return al;
    const v0 = new Array(bl + 1), v1 = new Array(bl + 1);
    for (let j = 0; j <= bl; j++) v0[j] = j;
    for (let i = 0; i < al; i++) {
      v1[0] = i + 1;
      for (let j = 0; j < bl; j++) {
        const cost = a[i] === b[j] ? 0 : 1;
        v1[j + 1] = Math.min(v1[j] + 1, v0[j + 1] + 1, v0[j] + cost);
      }
      for (let j = 0; j <= bl; j++) v0[j] = v1[j];

    return v1[bl];

  function similarityScore(a, b) {
    a = String(a || '');
    b = String(b || '');

    b = b.toLowerCase().replace(/ё/g, 'е').replace(/[^a-z0-9а-яё]/gi, '');
    if (!a || !b) return 0;

    const maxLen = Math.max(a.length, b.length);

<!-- Вставь этот один <script> в конец страницы (перед </body>).
     Это полный автономный скрипт: UI (плавающая кнопка + оверлей + тост),
     ультра‑быстрый сканер (BarcodeDetector → ZXing в воркере → OCR fallback),
     надёжный старт камеры (несколько constraints + deviceId fallback),
     и патч, гарантирующий, что кнопка всегда видна и кликабельна. -->

<script>
/* ============================================================
   FULL ULTRA-FAST SCANNER SCRIPT
   - BarcodeDetector first
   - ZXing decoding in WebWorker
   - createImageBitmap / OffscreenCanvas fast path
   - multi-position strips + preprocessing
   - OCR fallback (Tesseract.js digits-only) as last resort
   - robust startScanner with multiple constraints and deviceId fallback
   - pointer-events patch so floating button is always clickable
============================================================ */

/* =========================
   Worker: ZXing loader + decode
   ========================= */
const workerSrc = `self.onmessage = async function(e){
  const msg = e.data;
  if(msg.type === 'load'){
    try{
      importScripts('https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js');
      self.ZX = self.ZXing || null;
      self.postMessage({type:'loaded'});
    }catch(err){
      self.postMessage({type:'loaded', err: err && err.message});
    }
    return;
  }
  if(msg.type === 'decode'){
    const id = msg.id;
    try{
      const bitmap = msg.imageBitmap;
      let off;
      if(typeof OffscreenCanvas !== 'undefined'){
        off = new OffscreenCanvas(bitmap.width, bitmap.height);
      } else {
        off = new OffscreenCanvas(bitmap.width, bitmap.height);
      }
      const ctx = off.getContext('2d');
      ctx.drawImage(bitmap, 0, 0);
      let code = null;
      if(self.ZX){
        try{
          const luminanceSource = new self.ZX.HTMLCanvasElementLuminanceSource(off);
          const binaryBitmap = new self.ZX.BinaryBitmap(new self.ZX.HybridBinarizer(luminanceSource));
          const result = new self.ZX.MultiFormatReader().decode(binaryBitmap);
          if(result && result.text) code = result.text;
        }catch(e){}
      }
      try{ bitmap.close && bitmap.close(); }catch(e){}
      self.postMessage({type:'result', id, code: code || null});
    }catch(err){
      try{ msg.imageBitmap && msg.imageBitmap.close && msg.imageBitmap.close(); }catch(e){}
      self.postMessage({type:'result', id, code: null, err: err && err.message});
    }
  }
};`;
const workerBlob = new Blob([workerSrc], {type:'application/javascript'});
const workerUrl = URL.createObjectURL(workerBlob);
const decodeWorker = new Worker(workerUrl);
let workerReady = false;
const pendingResults = new Map();
let decodeIdCounter = 1;
decodeWorker.onmessage = (ev) => {
  const m = ev.data;
  if(m.type === 'loaded') workerReady = true;
  if(m.type === 'result' && pendingResults.has(m.id)){
    const {resolve} = pendingResults.get(m.id);
    pendingResults.delete(m.id);
    resolve(m.code || null);
  }
};
decodeWorker.postMessage({type:'load'});

/* =========================
   OCR (Tesseract) setup (lazy)
   ========================= */
let ocrWorker = null;
let ocrReady = false;
async function ensureOCR(){
  if(ocrReady) return;
  const scriptUrl = 'https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js';
  if(!window.Tesseract){
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = scriptUrl;
      s.onload = res;
      s.onerror = rej;
      document.head.appendChild(s);
    }).catch(()=>{});
  }
  if(window.Tesseract && !ocrWorker){
    ocrWorker = window.Tesseract.createWorker({ logger: m => {} });
    await ocrWorker.load();
    await ocrWorker.loadLanguage('eng');
    await ocrWorker.initialize('eng');
    await ocrWorker.setParameters({
      tessedit_char_whitelist: '0123456789',
      preserve_interword_spaces: '0'
    });
    ocrReady = true;
  }
}

/* =========================
   State and DB in memory
   ========================= */
let stream = null;
let scanning = false;
let targetInterval = 30; // ms between decode attempts
let lastAttempt = 0;
const DEBOUNCE_MS = 700;
let lastDetected = {code:null, ts:0};
let barcodeDB = {};
try{ barcodeDB = JSON.parse(localStorage.getItem('barcodeDB') || '{}'); }catch(e){ barcodeDB = {}; }

/* =========================
   Helpers: contrast stretch + binarize
   ========================= */
function contrastStretchImageData(imgData){
  const d = imgData.data;
  let min=255, max=0;
  for(let i=0;i<d.length;i+=4){
    const v = (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114)|0;
    if(v<min) min=v;
    if(v>max) max=v;
  }
  const range = max - min || 1;
  const mul = 255 / range;
  for(let i=0;i<d.length;i+=4){
    for(let k=0;k<3;k++){
      let v = d[i+k];
      v = (v - min) * mul;
      if(v<0) v=0; if(v>255) v=255;
      d[i+k]=v;
    }
  }
  return imgData;
}
function fastBinarize(ctx, w, h){
  try{
    const img = ctx.getImageData(0,0,w,h);
    const d = img.data;
    let sum=0, cnt=0;
    for(let i=0;i<d.length;i+=4){ sum += (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114); cnt++; }
    const mean = sum / cnt;
    const thresh = Math.max(100, Math.min(200, mean));
    for(let i=0;i<d.length;i+=4){
      const v = (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114);
      const val = v > thresh ? 255 : 0;
      d[i]=d[i+1]=d[i+2]=val;
    }
    ctx.putImageData(img,0,0);
  }catch(e){}
}

/* =========================
   Worker decode helper
   ========================= */
function decodeInWorker(imageBitmap){
  return new Promise((resolve)=>{
    const id = decodeIdCounter++;
    pendingResults.set(id, {resolve});
    try{
      decodeWorker.postMessage({type:'decode', id, imageBitmap}, [imageBitmap]);
    }catch(e){
      try{ imageBitmap.close && imageBitmap.close(); }catch(err){}
      pendingResults.delete(id);
      resolve(null);
    }
  });
}

/* =========================
   BarcodeDetector fast try
   ========================= */
async function tryBarcodeDetectorFromBitmap(bitmap){
  if(!('BarcodeDetector' in window)) return null;
  try{
    const c = document.createElement('canvas');
    c.width = bitmap.width;
    c.height = bitmap.height;
    const ctx = c.getContext('2d');
    ctx.drawImage(bitmap, 0, 0);
    const imageData = ctx.getImageData(0,0,c.width,c.height);
    const det = new BarcodeDetector({formats:["ean_13","ean_8","code_128","code_39","upc_a","upc_e","itf"]});
    const res = await det.detect(imageData);
    if(res && res.length) return res[0].rawValue;
  }catch(e){}
  return null;
}

/* =========================
   OCR fallback helper
   ========================= */
async function ocrRecognizeCanvas(canvas){
  try{
    await ensureOCR();
    if(!ocrReady || !ocrWorker) return null;
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const { data: { text } } = await ocrWorker.recognize(blob);
    const digits = (text || '').replace(/\D+/g, '');
    return digits || null;
  }catch(e){
    return null;
  }
}

/* =========================
   Smart decode pipeline with OCR fallback
   ========================= */
async function smartDecode(video){
  const now = performance.now();
  if(now - lastAttempt < targetInterval) return null;
  lastAttempt = now;

  const w = video.videoWidth, h = video.videoHeight;
  if(!w || !h) return null;

  try{
    const bitmapFull = await createImageBitmap(video);
    const scale = Math.max(1, Math.floor(Math.max(w,h)/900));
    const sw = Math.floor(w/scale), sh = Math.floor(h/scale);

    let smallBitmap;
    if(typeof OffscreenCanvas !== 'undefined'){
      const off = new OffscreenCanvas(sw, sh);
      const ctx = off.getContext('2d');
      ctx.drawImage(bitmapFull, 0, 0, w, h, 0, 0, sw, sh);
      try{ const img = ctx.getImageData(0,0,sw,sh); ctx.putImageData(contrastStretchImageData(img),0,0); }catch(e){}
      smallBitmap = off.transferToImageBitmap();
      bitmapFull.close && bitmapFull.close();
    }else{
      const c = document.createElement('canvas');
      c.width = sw; c.height = sh;
      const ctx = c.getContext('2d');
      ctx.drawImage(bitmapFull, 0, 0, w, h, 0, 0, sw, sh);
      try{ const img = ctx.getImageData(0,0,sw,sh); ctx.putImageData(contrastStretchImageData(img),0,0); }catch(e){}
      bitmapFull.close && bitmapFull.close();
      smallBitmap = await createImageBitmap(c);
    }

    if('BarcodeDetector' in window){
      try{
        const code = await tryBarcodeDetectorFromBitmap(smallBitmap);
        smallBitmap.close && smallBitmap.close();
        if(code) return code;
      }catch(e){}
    }

    if(workerReady){
      const code = await decodeInWorker(smallBitmap);
      if(code) return code;
    }else{
      try{
        if(window.ZXing){
          const c = document.createElement('canvas'); c.width = smallBitmap.width; c.height = smallBitmap.height;
          const ctx = c.getContext('2d'); ctx.drawImage(smallBitmap,0,0);
          smallBitmap.close && smallBitmap.close();
          const luminanceSource = new window.ZXing.HTMLCanvasElementLuminanceSource(c);
          const binaryBitmap = new window.ZXing.BinaryBitmap(new window.ZXing.HybridBinarizer(luminanceSource));
          const result = new window.ZXing.MultiFormatReader().decode(binaryBitmap);
          if(result && result.text) return result.text;
        }
      }catch(e){}
    }

    const positions = [
      {cx:0.5, cy:0.5, wFrac:1.0, hFrac:0.18},
      {cx:0.25, cy:0.35, wFrac:0.5, hFrac:0.14},
      {cx:0.75, cy:0.35, wFrac:0.5, hFrac:0.14},
      {cx:0.25, cy:0.65, wFrac:0.5, hFrac:0.14},
      {cx:0.75, cy:0.65, wFrac:0.5, hFrac:0.14}
    ];

    for(const p of positions){
      const stripW = Math.max(48, Math.floor(w * p.wFrac));
      const stripH = Math.max(28, Math.floor(h * p.hFrac));
      const sx = Math.max(0, Math.floor(w * p.cx - stripW/2));
      const sy = Math.max(0, Math.floor(h * p.cy - stripH/2));
      let regionBitmap;
      try{
        regionBitmap = await createImageBitmap(video, sx, sy, stripW, stripH);
      }catch(e){ continue; }
      const rScale = Math.max(1, Math.floor(Math.max(stripW,stripH)/900));
      const rsw = Math.max(1, Math.floor(stripW / rScale));
      const rsh = Math.max(1, Math.floor(stripH / rScale));
      let scaledRegion;
      if(typeof OffscreenCanvas !== 'undefined'){
        const off = new OffscreenCanvas(rsw, rsh);
        const ctx = off.getContext('2d');
        ctx.drawImage(regionBitmap, 0, 0, stripW, stripH, 0, 0, rsw, rsh);
        try{ const img = ctx.getImageData(0,0,rsw,rsh); ctx.putImageData(contrastStretchImageData(img),0,0); }catch(e){}
        fastBinarize(ctx, rsw, rsh);
        scaledRegion = off.transferToImageBitmap();
        regionBitmap.close && regionBitmap.close();
      }else{
        const c = document.createElement('canvas'); c.width = rsw; c.height = rsh;
        const ctx = c.getContext('2d'); ctx.drawImage(regionBitmap, 0, 0, stripW, stripH, 0, 0, rsw, rsh);
        try{ const img = ctx.getImageData(0,0,rsw,rsh); ctx.putImageData(contrastStretchImageData(img),0,0); }catch(e){}
        fastBinarize(ctx, rsw, rsh);
        regionBitmap.close && regionBitmap.close();
        scaledRegion = await createImageBitmap(c);
      }

      if(workerReady){
        const code = await decodeInWorker(scaledRegion);
        if(code) return code;
      }else{
        try{
          if(window.ZXing){
            const c = document.createElement('canvas'); c.width = scaledRegion.width; c.height = scaledRegion.height;
            const ctx = c.getContext('2d'); ctx.drawImage(scaledRegion,0,0);
            scaledRegion.close && scaledRegion.close();
            const luminanceSource = new window.ZXing.HTMLCanvasElementLuminanceSource(c);
            const binaryBitmap = new window.ZXing.BinaryBitmap(new window.ZXing.HybridBinarizer(luminanceSource));
            const result = new window.ZXing.MultiFormatReader().decode(binaryBitmap);
            if(result && result.text) return result.text;
          }
        }catch(e){}
      }

      try{
        const c = document.createElement('canvas'); c.width = rsw; c.height = rsh;
        const ctx = c.getContext('2d'); ctx.drawImage(scaledRegion,0,0);
        scaledRegion.close && scaledRegion.close();
        const digits = await ocrRecognizeCanvas(c);
        if(digits && digits.length >= 6) return digits;
      }catch(e){}
    }

  }catch(e){}
  return null;
}

/* =========================
   Detection handler
   ========================= */
async function handleDetected(code){
  const now = Date.now();
  if(code === lastDetected.code && (now - lastDetected.ts) < DEBOUNCE_MS) return;
  lastDetected = {code, ts: now};
  try{ navigator.vibrate && navigator.vibrate(40); }catch(e){}
  const name = barcodeDB[code] || null;
  const searchEl = document.getElementById('search');
  if(searchEl){
    searchEl.value = name || code;
    searchEl.dispatchEvent(new Event('input',{bubbles:true}));
    searchEl.dispatchEvent(new Event('change',{bubbles:true}));
  }
  if(name) showScannerToast('Товар найден: ' + name, 900);
  else showScannerToast('Штрих‑код найден: ' + code, 900);
  stopScanner();
}

/* =========================
   Robust startScanner
   ========================= */
async function startScanner(){
  if(scanning) return;
  stopScanner();
  scanning = true;

  const ov = document.getElementById('rot-scanner-overlay');
  if(ov) ov.classList.add('visible');
  showScannerToast('Запрос доступа к камере...');

  const constraintSets = [
    { video: { facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:60} }, audio:false },
    { video: { facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:30} }, audio:false },
    { video: { facingMode:{ideal:'environment'}, width:{ideal:640}, height:{ideal:480} }, audio:false },
    { video: true, audio:false }
  ];

  async function tryGetMedia(constraints, timeoutMs = 5000){
    try{
      const p = navigator.mediaDevices.getUserMedia(constraints);
      if(timeoutMs <= 0) return await p;
      const t = new Promise((_, rej) => setTimeout(()=> rej(new Error('getUserMedia timeout')), timeoutMs));
      return await Promise.race([p, t]);
    }catch(err){
      throw err;
    }
  }

  let lastErr = null;
  for(const c of constraintSets){
    try{
      const s = await tryGetMedia(c, 5000);
      stream = s;
      const video = document.getElementById('rot-scanner-video');
      if(!video){
        showScannerToast('Видео элемент не найден');
        stopScanner();
        return;
      }
      video.srcObject = stream;
      video.muted = true;
      video.playsInline = true;
      try{ await video.play(); }catch(playErr){
        try{ video.srcObject = stream; await video.play(); }catch(e){ throw playErr; }
      }
      targetInterval = (c.video && c.video.frameRate && c.video.frameRate.ideal >= 50) ? 25 : 40;
      scanning = true;
      ensureOCR().catch(()=>{});
      scanLoop();
      showScannerToast('Камера включена', 700);
      return;
    }catch(err){
      console.warn('getUserMedia failed for constraints', c, err);
      lastErr = err;
    }
  }

  try{
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    for(const dev of videoDevices){
      try{
        const s = await tryGetMedia({ video: { deviceId: { exact: dev.deviceId }, width:{ideal:1280}, height:{ideal:720} }, audio:false }, 5000);
        stream = s;
        const video = document.getElementById('rot-scanner-video');
        video.srcObject = stream;
        video.muted = true;
        video.playsInline = true;
        await video.play();
        targetInterval = 40;
        scanning = true;
        ensureOCR().catch(()=>{});
        scanLoop();
        showScannerToast('Камера включена (deviceId)', 700);
        return;
      }catch(err){
        console.warn('deviceId open failed', dev.deviceId, err);
      }
    }
  }catch(e){
    console.warn('enumerateDevices failed', e);
  }

  console.error('Не удалось открыть камеру. Последняя ошибка:', lastErr);
  showScannerToast('Не удалось открыть камеру. Проверь разрешения и HTTPS', 3000);
  scanning = false;
  if(ov) ov.classList.remove('visible');
}

/* =========================
   Stop scanner
   ========================= */
function stopScanner(){
  scanning = false;
  if(stream){
    try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){}
    stream = null;
  }
  const ov = document.getElementById('rot-scanner-overlay');
  if(ov) ov.classList.remove('visible');
  showScannerToast('Сканер остановлен', 700);
}

/* =========================
   Main loop
   ========================= */
async function scanLoop(){
  const video = document.getElementById('rot-scanner-video');
  while(scanning){
    try{
      const code = await smartDecode(video);
      if(code){
        await handleDetected(code);
        await new Promise(r=>setTimeout(r, 200));
      }
    }catch(e){}
    await new Promise(r=>requestAnimationFrame(r));
  }
}

/* =========================
   Expose helpers and DB control
   ========================= */
window.startScanner = startScanner;
window.stopScanner = stopScanner;
window.setBarcodeDB = function(obj){
  barcodeDB = obj || {};
  try{ localStorage.setItem('barcodeDB', JSON.stringify(barcodeDB)); }catch(e){}
};
window.addBarcode = function(code, name){
  barcodeDB[code] = name;
  try{ localStorage.setItem('barcodeDB', JSON.stringify(barcodeDB)); }catch(e){}
};

/* bind UI safety */
(function bindUI(){
  const btn = document.getElementById('rot-scanner-btn');
  if(btn) btn.addEventListener('click', startScanner);
  const close = document.querySelector('#rot-scanner-overlay .controls button');
  if(close) close.addEventListener('click', stopScanner);
})();
</script>
